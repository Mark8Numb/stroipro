/* ═══════════════════════════════════════════════════════
   СТРОИТЕЛЬ.ПРО v2.0 — Design System
   ═══════════════════════════════════════════════════════ */
:root{
  --bg:#0f0f0d; --bg2:#161614; --bg3:#1e1e1a;
  --card:#1a1a17; --card2:#222220;
  --border:#2c2c28; --border2:#383834;
  --text:#ede8dc; --text2:#a09880; --muted:#6a6050;
  --gold:#d4920a; --gold-l:rgba(212,146,10,0.13); --gold-b:rgba(212,146,10,0.28);
  --green:#3d9e5c; --red:#d95f4f; --blue:#4a9fd4;
  --shadow:rgba(0,0,0,0.42);
  --font:-apple-system,'Inter','Segoe UI',sans-serif;
  --nav-h:62px; --r:13px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);font-size:14px;line-height:1.45}
#app{height:100%;display:flex;flex-direction:column}
/* ── MAIN COLUMN WRAPPER (for desktop grid) ── */
.main-col{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0}

b,strong{font-weight:700}
s,small{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);display:block;margin-top:2px}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:max(14px,env(safe-area-inset-top)) 16px 11px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  box-shadow:0 2px 16px var(--shadow)}
.hdr-l{display:flex;flex-direction:column;gap:1px}
.logo{font-size:18px;font-weight:900;letter-spacing:1.2px;color:var(--text)}
.logo-dot{color:var(--gold)}
.logo-sub{font-size:9px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:10px}
.earn-pill{font-size:13px;font-weight:700;color:var(--gold);
  background:var(--gold-l);border:1px solid var(--gold-b);
  padding:5px 12px;border-radius:18px;letter-spacing:.3px}
.ico-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  width:33px;height:33px;border-radius:50%;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.ico-btn:active{opacity:.7}

/* ── UNDO BAR ── */
.ubar{background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:5px 12px;gap:6px;flex-shrink:0}
.ub{background:var(--gold-l);border:1px solid var(--gold-b);border-radius:14px;
  color:var(--gold);padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}
.ub-off{opacity:.2;cursor:default}
.usave{font-size:13px;color:var(--muted);transition:color .3s}
.usave.ok{color:var(--green)}
.ubar-dim{margin-left:auto;font-size:9px;letter-spacing:2px;color:var(--muted);font-weight:700;text-transform:uppercase}

/* ── PROJECT BAR ── */
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:7px 13px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.pbar::-webkit-scrollbar{display:none}
.ppill{background:var(--bg3);border:1.5px solid var(--border);border-radius:18px;
  color:var(--muted);padding:5px 15px;font-size:12px;font-weight:600;
  white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:var(--font)}
.ppill.on{background:var(--gold);color:#0a0800;border-color:var(--gold);font-weight:800;
  box-shadow:0 2px 10px rgba(212,146,10,.3)}
.ppill-add{border-style:dashed;font-weight:400}

/* ── BUILDING TABS ── */
.btabs{background:var(--bg2);border-bottom:1px solid var(--border2);
  display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px;flex-shrink:0}
.btabs::-webkit-scrollbar{display:none}
.btab{padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;color:var(--muted);flex-shrink:0;
  display:flex;align-items:center;gap:6px;transition:color .15s,border-color .15s;
  min-width:70px;font-family:var(--font);background:none;border-top:none;border-left:none;border-right:none}
.btab.on{color:var(--gold);border-bottom-color:var(--gold)}
.btab-pct{font-size:9px;color:var(--gold);font-weight:800;background:var(--gold-l);
  padding:1px 6px;border-radius:8px}
.btab-add{opacity:.3;font-size:16px;min-width:40px}
.btab-empty{padding:10px 16px;font-size:12px;color:var(--muted)}
.btab.pressing{background:var(--gold-l);border-radius:7px 7px 0 0}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;padding:14px 14px calc(var(--nav-h) + 14px);
  -webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding-bottom:env(safe-area-inset-bottom)}
.bnav-in{background:var(--bg2);border-top:1px solid var(--border);
  height:var(--nav-h);display:flex;align-items:flex-start;padding-top:7px;
  overflow-x:auto;scrollbar-width:none;
  box-shadow:0 -4px 24px var(--shadow)}
.bnav-in::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:58px;display:flex;flex-direction:column;align-items:center;
  gap:3px;background:none;border:none;cursor:pointer;padding:3px 0;font-family:var(--font)}
.ni{font-size:18px;line-height:1.2;transition:filter .15s}
.nl{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
.nb.on .nl{color:var(--gold)}
.nb.on .ni{filter:drop-shadow(0 0 5px var(--gold))}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--nav-h) + 12px);right:16px;z-index:200;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(145deg,#e0a010,#c47c08);
  box-shadow:0 4px 18px rgba(212,146,10,.45),0 2px 6px var(--shadow);
  border:none;color:#0a0800;font-size:25px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:900;
  transition:transform .15s,box-shadow .15s}
.fab:active{transform:scale(.91);box-shadow:0 2px 8px rgba(212,146,10,.3)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card-gold{border-color:var(--gold-b)}
.card-title{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;font-weight:700}
.sp{height:20px}

/* ══════════════════════════════════
   JOURNAL
   ══════════════════════════════════ */
.j-wrap{display:flex;flex-direction:column;gap:0}

/* Work-type progress grid */
.wt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.wtc{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:11px 12px;cursor:pointer;transition:border-color .15s;
  box-shadow:0 1px 6px rgba(0,0,0,.25)}
.wtc.wtc-open{border-color:var(--ac,var(--gold));background:var(--card2);grid-column:1/-1}
.wtc:active{opacity:.85}
.wtc-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.wtc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wtc-name{flex:1;font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wtc-pct{font-size:12px;font-weight:800;flex-shrink:0}
.wtc-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px}
.wtc-fill{height:100%;border-radius:3px;transition:width .5s}
.wtc-fill.done{background:var(--green)!important}
.wtc-nums{display:flex;justify-content:space-between;font-size:11px}
.wtc-earn{color:var(--text2)}
/* Detail panel (when open) */
.wtc-detail{border-top:1px solid var(--border);margin-top:8px;padding-top:10px}
.wtd-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.wtd-row{display:flex;flex-direction:column;gap:2px;background:var(--bg3);border-radius:7px;padding:8px 10px}
.wtd-row span{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600}
.wtd-row strong{font-size:15px;font-weight:800;line-height:1.1}
.wtd-hint{font-size:11px;color:var(--muted);background:rgba(212,146,10,.08);
  border:1px solid var(--gold-b);border-radius:7px;padding:7px 10px;margin-bottom:8px}
.wtc-acts{display:flex;gap:6px}
.act-s{background:var(--gold-l);border:1px solid var(--gold-b);color:var(--gold);
  padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:opacity .15s}
.act-s:active{opacity:.7}
.act-s-del{background:rgba(217,95,79,.12);border-color:rgba(217,95,79,.28);color:var(--red)}

/* Journal toolbar */
.j-bar{display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;margin-bottom:9px}
.j-cnt{font-size:11px;color:var(--muted);font-weight:600}
.sort-btn{background:var(--gold);color:#0a0800;border:none;border-radius:13px;
  padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}
.hid-bar{display:flex;align-items:center;gap:8px;width:100%;margin-bottom:8px}
.hid-btn{background:var(--bg3);border:1.5px solid var(--border);color:var(--muted);
  border-radius:13px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}
.hid-btn.on{background:var(--gold-l);border-color:var(--gold-b);color:var(--gold)}
.hid-del{background:rgba(217,95,79,.12);border:1px solid rgba(217,95,79,.28);
  color:var(--red);border-radius:13px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}

/* Timeline entries */
.tl{display:flex;flex-direction:column;gap:7px}
.ec{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.22)}
.ec.ec-hid{opacity:.48;border-style:dashed}
.ec.ec-ns{border-style:dashed}
.ec-h{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer}
.ec-h:active{background:var(--card2)}
.ec-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.ec-m{flex:1;min-width:0}
.ec-title{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ec-date{font-size:10px;color:var(--text2);margin-top:2px}
.ns-tag{font-size:9px;color:var(--muted);background:var(--bg3);
  padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:middle}
.ec-n{text-align:right;flex-shrink:0}
.ec-vol{font-size:15px;font-weight:800;color:var(--gold)}
.ec-unit{font-size:10px;font-weight:400;color:var(--muted)}
.ec-earn{font-size:11px;color:var(--text2)}
.act-del-ico{background:rgba(217,95,79,.14);border:1px solid rgba(217,95,79,.28);
  color:var(--red);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font)}
.ec-chev{font-size:10px;color:var(--muted);margin-left:4px;flex-shrink:0}
.ec-b{border-top:1px solid var(--border);padding:11px 12px;background:var(--card2)}
.ec-note{font-size:12px;color:var(--text2);display:flex;align-items:flex-start;gap:6px;
  margin-bottom:9px;background:var(--bg3);padding:7px 10px;border-radius:7px}
.mat-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.mc{font-size:11px;color:var(--text2);background:var(--bg3);
  border:1px solid var(--border);padding:3px 8px;border-radius:6px}
.mc b{color:var(--gold)}
.ec-ts{font-size:10px;color:var(--muted);margin-bottom:7px}
.ec-acts{display:flex;gap:6px}

/* ══════════════════════════════════
   WAREHOUSE
   ══════════════════════════════════ */
.wh-tabs{display:flex;gap:0;margin-bottom:12px;background:var(--bg3);border-radius:var(--r);padding:3px}
.wh-tb{flex:1;background:transparent;border:none;color:var(--muted);padding:8px 6px;
  font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);
  border-radius:11px;transition:all .15s;text-align:center}
.wh-tb.on{background:var(--card);color:var(--gold);box-shadow:0 1px 4px var(--shadow)}
.cat-tabs{display:flex;gap:8px;margin-bottom:12px}
.cat-tb{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;
  color:var(--muted);padding:8px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .15s;text-align:center}
.cat-tb.on{background:var(--gold-l);border-color:var(--gold-b);color:var(--gold)}
/* Stock row */
.wr{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:12px 13px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.wr-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.wr-inf{flex:1}
.wr-name{font-size:13px;font-weight:700}
.wr-sub{font-size:10px;color:var(--muted);margin-top:2px}
.wr-acts{display:flex;gap:5px;flex-shrink:0}
.wr-nums{display:flex;gap:14px;margin-bottom:9px;flex-wrap:wrap}
.wn{display:flex;flex-direction:column;gap:1px}
.wn b{font-size:18px;font-weight:800;line-height:1.1}
.wn s{font-size:9px;color:var(--muted)}
.wn-in  b{color:var(--green)}
.wn-out b{color:var(--red)}
.wn-ok  b{color:var(--gold)}
.wn-warn b{color:var(--gold)}
.wn-crit b{color:var(--red)}
.wr-empty{font-size:11px;color:var(--muted);padding:3px 0 8px}
.wr-by-bld{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.bld-chip{font-size:10px;color:var(--text2);background:var(--bg3);
  border:1px solid var(--border);padding:2px 7px;border-radius:5px}
.wr-add{display:flex;gap:8px;align-items:center}
.wr-inp{flex:1;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;
  font-size:14px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none}
.wr-inp:focus{border-color:var(--gold)}
.wr-btn{background:var(--gold-l);border:1px solid var(--gold-b);color:var(--gold);
  padding:8px 13px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);white-space:nowrap}
.hist-tog{background:none;border:none;color:var(--text2);font-size:11px;cursor:pointer;
  padding:5px 0;margin-top:5px;font-family:var(--font)}
.wh-hist{background:var(--bg3);border-radius:7px;padding:7px;margin-top:5px}
.wh-r{display:flex;align-items:center;gap:7px;font-size:11px;padding:4px 0;
  border-bottom:1px solid var(--border)}
.wh-r:last-child{border-bottom:none}
.wh-d{color:var(--text2);min-width:88px;flex-shrink:0}
.wh-q{color:var(--green);font-weight:700;flex:1}
.wh-bld{color:var(--muted);font-size:10px;background:var(--bg);
  padding:1px 5px;border-radius:4px}
/* History page */
.hist-day{margin-bottom:14px}
.hist-day-head{font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);font-weight:700;margin-bottom:6px;padding:0 2px}
.hist-row{display:flex;align-items:center;gap:8px;font-size:12px;
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:8px 11px;margin-bottom:4px}
.hist-time{color:var(--text2);min-width:44px;flex-shrink:0;font-weight:600}
.hist-mat{flex:1;font-weight:600}
.hist-qty{color:var(--green);font-weight:700;min-width:50px}
.hist-bld{color:var(--muted);font-size:10px}
/* Low stock */
.low-sec{margin-bottom:12px}
.low-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.low-crit{color:var(--red)}
.low-warn{color:var(--gold)}
.low-row{display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:9px 11px;margin-bottom:6px;flex-wrap:wrap}
.low-name{flex:1;font-size:13px;font-weight:700}
.low-val{font-size:12px;font-weight:700}
/* Alert banner */
.alert-b{background:rgba(217,95,79,.1);border:1px solid rgba(217,95,79,.3);
  border-radius:var(--rs);padding:10px 13px;margin-bottom:10px}
.alert-b .low-warn{margin-bottom:3px}

/* ══════════════════════════════════
   TASKS
   ══════════════════════════════════ */
.tasks-wrap{display:flex;flex-direction:column;gap:2px}
.ts{margin-bottom:12px}
.ts-h{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;
  margin-bottom:7px;padding:0 1px}
.s-red{color:var(--red)}
.s-gold{color:var(--gold)}
.s-green{color:var(--green)}
.s-dim{color:var(--muted)}
.tr{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:9px;
  box-shadow:0 1px 4px rgba(0,0,0,.18)}
.tr.tr-done{opacity:.55}
.tck{width:25px;height:25px;border-radius:50%;border:2px solid var(--gold);background:transparent;
  cursor:pointer;flex-shrink:0;font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-family:var(--font)}
.tck.tck-on{color:#fff}
.tr-b{flex:1;min-width:0}
.tr-txt{font-size:13px;font-weight:600;line-height:1.35}
.tr-meta{display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap}
.tr-meta span{font-size:10px;color:var(--text2)}
.tr-time{background:var(--bg3);padding:2px 6px;border-radius:4px;
  font-size:9px!important;font-weight:700;color:var(--gold)!important}
.tr-over{color:var(--red)!important;font-weight:700}
.tr-acts{display:flex;gap:5px;flex-shrink:0}
.note-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 12px;margin-bottom:5px;display:flex;align-items:flex-start;gap:9px}
.note-txt{flex:1;font-size:12px;color:var(--text2);line-height:1.4}
.note-meta{font-size:10px;color:var(--muted);margin-top:3px}

/* ══════════════════════════════════
   EARN
   ══════════════════════════════════ */
.earn-wrap{display:flex;flex-direction:column;gap:10px}
.earn-hero{background:linear-gradient(135deg,var(--card2),var(--card));
  border:1px solid var(--gold-b);border-radius:var(--r);padding:22px 18px;text-align:center}
.eh-val{font-size:30px;font-weight:900;color:var(--gold);letter-spacing:-.5px}
.eh-sub{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}
.earn-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}
.eg{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 7px;text-align:center}
.eg-v{font-size:12px;font-weight:800;color:var(--gold);margin-bottom:3px;line-height:1.1}
.eg-l{font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.earn-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.earn-row:last-child{border-bottom:none}
.er-r{display:flex;align-items:center;gap:6px}
.er-r b{color:var(--gold);font-size:14px;font-weight:800}
.er-r small{color:var(--muted);font-size:10px;text-transform:none;letter-spacing:0}
.sat-card{border-color:rgba(212,146,10,.18)}
.sat-note{font-size:12px;color:var(--text2);line-height:1.6}

/* ══════════════════════════════════
   SETTINGS
   ══════════════════════════════════ */
.settings-wrap{display:flex;flex-direction:column;gap:10px}
.spr{margin-bottom:6px}
.spr-h{display:flex;align-items:center;justify-content:space-between;
  font-size:15px;font-weight:800;margin-bottom:8px}
.sbld{display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 11px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;margin-bottom:5px}
.swt{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;margin-bottom:6px}
.swt-inf{flex:1}

/* ══════════════════════════════════
   FORMS / MODALS
   ══════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:18px 18px 0 0;
  width:100%;max-height:92vh;overflow-y:auto;
  padding-bottom:max(16px,env(safe-area-inset-bottom));animation:slideup .25s;
  box-shadow:0 -8px 32px var(--shadow)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shdl{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.shtitle{font-size:17px;font-weight:800;padding:13px 18px 11px;border-bottom:1px solid var(--border)}
.shbody{padding:14px 18px}
.shfoot{padding:11px 18px;border-top:1px solid var(--border);display:flex;gap:9px}
.fld{margin-bottom:12px}
.flbl{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;font-weight:700}
.fld input,.fld select,.fld textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);
  border-radius:var(--rs);font-size:15px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fld-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
/* Material inputs in entry form */
.mi-grid{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.mi-row{display:flex;align-items:center;gap:8px;background:var(--bg3);
  border:1px solid var(--border);border-radius:7px;padding:7px 10px}
.mi-lbl{flex:1;font-size:11px;color:var(--text2);line-height:1.3;min-width:0}
.mi-lbl small{font-size:9px;color:var(--gold);text-transform:none;letter-spacing:0;display:inline;margin:0}
.mi-flds{display:flex;gap:4px;flex-shrink:0}
.mi-qty{width:56px;border:1.5px solid var(--border);border-radius:6px;padding:5px 6px;
  font-size:14px;font-weight:700;text-align:right;background:var(--bg);color:var(--gold);
  outline:none;font-family:monospace}
.mi-sz{width:50px;border:1.5px solid var(--border);border-radius:6px;padding:5px 6px;
  font-size:12px;text-align:right;background:var(--bg);color:var(--text2);outline:none;font-family:monospace}
.mi-qty:focus,.mi-sz:focus{border-color:var(--gold)}
.sync-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg3);
  border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:13px;font-weight:600}
.sync-row label{display:flex;align-items:center;gap:8px;cursor:pointer}
.sync-row input{accent-color:var(--gold);width:17px;height:17px}
/* Color picker */
.clr-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.clr-sw{width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .15s}
.clr-sw.selected,.clr-sw:active{outline:3px solid white;transform:scale(1.1)}

/* ══════════════════════════════════
   BUTTONS
   ══════════════════════════════════ */
.btn{padding:12px 18px;border-radius:11px;border:none;font-size:14px;font-weight:700;
  cursor:pointer;font-family:var(--font);transition:opacity .15s}
.btn:active{opacity:.8}
.btn-gold{background:linear-gradient(145deg,#e0a010,#c47c08);color:#0a0800;
  box-shadow:0 2px 10px rgba(212,146,10,.28)}

.wrc-inf{flex:1;min-width:0}

.wrc-sub{font-size:11px;color:var(--muted);margin-top:2px}

.wn s, .wn-block s{text-decoration:none!important;display:block;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
.j-watermark{display:none!important}
/* compact card */
.wr-c{padding:0!important}
.wr-compact{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:10px}
.wrc-inf{flex:1;min-width:0}
.wrc-name{font-size:15px;font-weight:700;color:var(--text)}
.wrc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.wrc-right{display:flex;align-items:center;gap:10px}
.wrc-stock{font-size:22px;font-weight:900;line-height:1}
.wrc-unit{font-size:11px;font-weight:600;margin-left:2px;opacity:.7}
.wrc-arr{font-size:11px;color:var(--muted)}
.wr-acts-row{display:flex;gap:8px;padding:0 16px 10px}
.wr-acts-row .act-s{flex:1;font-size:12px;padding:8px}

  #app{height:auto;min-height:100vh}
  .scroll{overflow-y:visible;flex:none}
}

  
.btn-share{background:linear-gradient(135deg,#1a8a4a,#0e6035);color:#fff;border:none;border-radius:11px;padding:14px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);width:100%}
.pro-overlay{background:var(--card2);border:1px dashed var(--gold-b);border-radius:var(--r);padding:22px;text-align:center}
.pro-overlay-t{font-size:16px;font-weight:800;color:var(--gold);margin-bottom:8px}
.pro-overlay-s{font-size:12px;color:var(--text2);line-height:1.5;margin-bottom:14px}
.pro-cta{background:linear-gradient(135deg,#e8a020,#d4801a);color:#fff;border:none;border-radius:10px;padding:13px 22px;font-size:14px;font-weight:800;cursor:pointer;font-family:var(--font)}
.free-banner{background:var(--gold-l);border:1px solid var(--gold-b);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:var(--gold);text-align:center;font-weight:600}
.pro-promo{background:linear-gradient(160deg,var(--card2),var(--card));border:1.5px solid var(--gold-b)!important;padding:20px}
.pro-promo-top{font-size:18px;font-weight:900;color:var(--gold);text-align:center;letter-spacing:.5px}
.pro-promo-sub{font-size:12px;color:var(--text2);text-align:center;margin:6px 0 16px}
.pro-feats{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
.pro-feat{font-size:13px;color:var(--text);padding:10px 14px;background:var(--bg3);border-radius:9px;border-left:3px solid var(--gold)}
.btn-pro-big{width:100%;background:linear-gradient(135deg,#e8a020,#d4801a);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--font);box-shadow:0 4px 16px rgba(232,160,32,.3)}
.tg-link{display:block;text-align:center;margin-top:12px;color:var(--blue);font-size:13px;text-decoration:none;font-weight:600}
.task-bld-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px}
.tbld-btn{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:18px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font);white-space:nowrap}
.tbld-btn.on{background:var(--gold-l);border-color:var(--gold-b);color:var(--gold)}
.tr-bld{font-size:10px;color:var(--blue);background:rgba(74,159,212,.1);padding:1px 6px;border-radius:6px}
.chart-card{padding:14px}
.chart-legend{display:flex;gap:16px;justify-content:center;margin-bottom:8px;font-size:11px;color:var(--text2)}
.cl-item{display:flex;align-items:center;gap:5px}
.cl-dot{width:10px;height:10px;border-radius:2px;display:inline-block}
.cl-line{width:14px;height:3px;border-radius:2px;display:inline-block}
.mi-empty{padding:16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5}
.free-tag{display:inline-block;background:var(--bg3);color:var(--muted);font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:6px}
.report-preview{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:11px;line-height:1.5;color:var(--text);white-space:pre-wrap;max-height:280px;overflow-y:auto;font-family:ui-monospace,monospace;margin-bottom:12px}
.share-btns{display:flex;flex-direction:column;gap:8px}
.share-b{display:block;text-align:center;padding:13px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);border:none;text-decoration:none}
.share-copy{background:var(--gold-l);border:1px solid var(--gold-b);color:var(--gold)}
.share-wa{background:#25d366;color:#fff}
.share-tg{background:#0088cc;color:#fff}
.hdr-logo-svg{flex-shrink:0}
.team-tag{font-size:10px;color:var(--blue);background:rgba(74,159,212,.12);padding:1px 7px;border-radius:6px;font-weight:600}
.team-head{font-size:12px;font-weight:800;color:var(--gold);margin:10px 0 4px;letter-spacing:.3px}
.team-sum{font-size:11px;color:var(--text2);font-weight:600}
.free-limits{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:14px;text-align:left}
.fl-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:6px}
.fl-item{font-size:12px;color:var(--text2);line-height:1.7}
.ob-demo-btn{width:100%;max-width:280px;margin-top:12px;background:transparent;border:1.5px solid var(--gold-b);color:var(--gold);border-radius:11px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font)}

.tip-bar{position:fixed;left:12px;right:12px;bottom:74px;background:var(--card2);border:1px solid var(--gold-b);border-radius:12px;padding:12px 14px;display:flex;flex-wrap:wrap;align-items:center;gap:8px;z-index:200;box-shadow:0 6px 24px var(--shadow);opacity:0;transform:translateY(10px);pointer-events:none;transition:.25s}
.tip-bar.show{opacity:1;transform:translateY(0);pointer-events:auto}
.tip-msg{flex:1;min-width:180px;font-size:12px;color:var(--text);line-height:1.4}
.tip-close{background:var(--bg3);border:none;color:var(--text2);width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--font)}
.tip-never{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 10px;border-radius:8px;cursor:pointer;font-size:11px;font-family:var(--font);white-space:nowrap}

optgroup{font-weight:700;color:var(--gold)}optgroup option{color:var(--text);font-weight:400}

.logo-badge{display:inline-block;background:var(--gold);color:#0a0a0c;font-size:9px;font-weight:800;padding:1px 6px;border-radius:5px;margin-left:5px;letter-spacing:.5px;vertical-align:middle}
.chart-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.chart-toggle{display:flex;gap:4px}
.ct-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}
.ct-btn.on{background:var(--gold-l);border-color:var(--gold-b);color:var(--gold)}
.plan-btn{background:var(--gold-l);border:1px solid var(--gold-b);color:var(--gold);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;cursor:pointer;font-family:var(--font);margin-left:6px}
.workers-pick{display:flex;flex-direction:column;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px}
.wp-team{font-size:10px;font-weight:700;color:var(--gold);margin:4px 0 2px;text-transform:uppercase;letter-spacing:.3px}
.wp-row{display:flex;align-items:center;gap:8px}
.wp-lbl{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer}
.wp-chk{width:18px;height:18px;accent-color:var(--gold)}
.wp-pct{width:56px;padding:6px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:13px;text-align:center;font-family:var(--font)}
.wp-pct:disabled{opacity:.4}
.wp-hint{font-size:11px;color:var(--muted);margin-top:4px;min-height:14px}
.wp-hint.wp-warn{color:var(--red)}
.wp-hint.wp-ok{color:var(--green)}

@media (min-width:768px){
  /* ── DESKTOP: полный экран, боковая навигация ── */

  /* Body — нет центровки, занимает весь экран */
  body{font-size:15px;overflow:hidden}
  html,body{height:100%;overflow:hidden}

  /* App — grid: header full-width, sidebar + content */
  #app{
    display:grid;
    grid-template-columns:220px 1fr;
    grid-template-rows:auto 1fr;
    grid-template-areas:"header header" "sidebar main";
    height:100vh;
    max-width:none;
    border-radius:0;
    overflow:hidden;
    background:var(--bg);
  }

  /* Header занимает всю ширину (оба столбца) */
  .hdr{
    grid-area:header;
    padding:12px 24px;
    border-radius:0;
  }

  /* Боковая навигация */
  .bnav{
    position:static;
    grid-area:sidebar;
    padding-bottom:0;
    border-right:1px solid var(--border);
    border-top:none;
    display:flex;
    flex-direction:column;
    height:100%;
    overflow:hidden;
  }
  .bnav-in{
    flex-direction:column;
    height:100%;
    overflow-y:auto;
    overflow-x:hidden;
    align-items:stretch;
    padding-top:12px;
    padding-bottom:20px;
    justify-content:flex-start;
    border-top:none;
    box-shadow:none;
    border-right:none;
  }
  .nb{
    flex-direction:row;
    justify-content:flex-start;
    min-width:auto;
    padding:11px 20px;
    gap:12px;
    border-radius:10px;
    margin:2px 8px;
    flex:0 0 auto;
    transition:background .15s;
  }
  .nb:hover{background:var(--bg3)}
  .nb.on{background:var(--gold-l)}
  .ni{font-size:20px}
  .nl{font-size:13px;letter-spacing:0;text-transform:none;font-weight:600}

  /* Основная колонка — grid-area main */
  .main-col{
    grid-area:main;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  /* Основной контент */
  .scroll{
    padding:20px 24px 24px;
  }

  /* FAB — в основном контенте */
  .fab{
    bottom:24px;
    right:24px;
  }

  /* Project bar и building tabs — в основном контенте */
  .pbar,.btabs,.ubar{
    /* остаются в потоке grid */
  }

  /* Карточки — шире */
  .card{border-radius:14px;padding:18px}
  .wt-grid{grid-template-columns:repeat(3,1fr)}

  /* Модальные окна — центрированный диалог */
  .overlay{
    align-items:center;
    background:rgba(0,0,0,.65);
    padding:24px;
  }
  .sheet{
    width:100%;
    max-width:580px;
    max-height:88vh;
    border-radius:18px;
    animation:scalein .2s;
  }
  @keyframes scalein{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .shdl{display:none}

  /* Форма в 2 колонки где уместно */
  .shbody{padding:20px 24px}
  .shfoot{padding:14px 24px}
  .frow{gap:12px}

  /* Таблицы и списки шире */
  .j-card,.tr,.wr-card{max-width:none}
  .tl{gap:9px}
  .ec-h{padding:13px 16px}

  /* Журнал: 2 колонки для wt-grid */
  .wt-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
}

@media (min-width:768px){
  /* ── DESKTOP: полный экран, боковая навигация ── */

  /* Body — нет центровки, занимает весь экран */
  body{font-size:15px;overflow:hidden}
  html,body{height:100%;overflow:hidden}

  /* App — grid: header full-width, sidebar + content */
  #app{
    display:grid;
    grid-template-columns:220px 1fr;
    grid-template-rows:auto 1fr;
    grid-template-areas:"header header" "sidebar main";
    height:100vh;
    max-width:none;
    border-radius:0;
    overflow:hidden;
    background:var(--bg);
  }

  /* Header занимает всю ширину (оба столбца) */
  .hdr{
    grid-area:header;
    padding:12px 24px;
    border-radius:0;
  }

  /* Боковая навигация */
  .bnav{
    position:static;
    grid-area:sidebar;
    padding-bottom:0;
    border-right:1px solid var(--border);
    border-top:none;
    display:flex;
    flex-direction:column;
    height:100%;
    overflow:hidden;
  }
  .bnav-in{
    flex-direction:column;
    height:100%;
    overflow-y:auto;
    overflow-x:hidden;
    align-items:stretch;
    padding-top:12px;
    padding-bottom:20px;
    justify-content:flex-start;
    border-top:none;
    box-shadow:none;
    border-right:none;
  }
  .nb{
    flex-direction:row;
    justify-content:flex-start;
    min-width:auto;
    padding:11px 20px;
    gap:12px;
    border-radius:10px;
    margin:2px 8px;
    flex:0 0 auto;
    transition:background .15s;
  }
  .nb:hover{background:var(--bg3)}
  .nb.on{background:var(--gold-l)}
  .ni{font-size:20px}
  .nl{font-size:13px;letter-spacing:0;text-transform:none;font-weight:600}

  /* Основная колонка — grid-area main */
  .main-col{
    grid-area:main;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-width:0;
  }

  /* Основной контент */
  .scroll{
    padding:20px 24px 24px;
  }

  /* FAB — в основном контенте */
  .fab{
    bottom:24px;
    right:24px;
  }

  /* Project bar и building tabs — в основном контенте */
  .pbar,.btabs,.ubar{
    /* остаются в потоке grid */
  }

  /* Карточки — шире */
  .card{border-radius:14px;padding:18px}
  .wt-grid{grid-template-columns:repeat(3,1fr)}

  /* Модальные окна — центрированный диалог */
  .overlay{
    align-items:center;
    background:rgba(0,0,0,.65);
    padding:24px;
  }
  .sheet{
    width:100%;
    max-width:580px;
    max-height:88vh;
    border-radius:18px;
    animation:scalein .2s;
  }
  @keyframes scalein{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  .shdl{display:none}

  /* Форма в 2 колонки где уместно */
  .shbody{padding:20px 24px}
  .shfoot{padding:14px 24px}
  .frow{gap:12px}

  /* Таблицы и списки шире */
  .j-card,.tr,.wr-card{max-width:none}
  .tl{gap:9px}
  .ec-h{padding:13px 16px}

  /* Журнал: 2 колонки для wt-grid */
  .wt-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
}

function _sha256(ascii){
  function rightRotate(value,amount){return(value>>>amount)|(value<<(32-amount));}
  var mathPow=Math.pow;var maxWord=mathPow(2,32);var result='';
  var words=[];var asciiBitLength=ascii.length*8;
  var hash=_sha256.h=_sha256.h||[];var k=_sha256.k=_sha256.k||[];var primeCounter=k.length;
  var isComposite={};
  for(var candidate=2;primeCounter<64;candidate++){
    if(!isComposite[candidate]){
      for(var i=0;i<313;i+=candidate)isComposite[i]=candidate;
      hash[primeCounter]=(mathPow(candidate,.5)*maxWord)|0;
      k[primeCounter++]=(mathPow(candidate,1/3)*maxWord)|0;
    }
  }
  ascii+='\x80';
  while(ascii.length%64-56)ascii+='\x00';
  for(var i=0;i<ascii.length;i++){
    var j=ascii.charCodeAt(i);
    if(j>>8)return'';
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words.length]=((asciiBitLength/maxWord)|0);
  words[words.length]=(asciiBitLength);
  for(var j=0;j<words.length;){
    var w=words.slice(j,j+=16);var oldHash=hash;hash=hash.slice(0,8);
    for(var i=0;i<64;i++){
      var w15=w[i-15],w2=w[i-2];
      var a=hash[0],e=hash[4];
      var temp1=hash[7]+(rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]+
        (w[i]=i<16?w[i]:(w[i-16]+(rightRotate(w15,7)^rightRotate(w15,18)^(w15>>>3))+w[i-7]+(rightRotate(w2,17)^rightRotate(w2,19)^(w2>>>10)))|0);
      var temp2=(rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(temp1+temp2)|0].concat(hash);hash[4]=(hash[4]+temp1)|0;
    }
    for(var i=0;i<8;i++)hash[i]=(hash[i]+oldHash[i])|0;
  }
  for(var i=0;i<8;i++)for(var j=3;j+1;j--){var b=(hash[i]>>(j*8))&255;result+=((b<16)?0:'')+b.toString(16);}
  return result;
}

var LIC_SECRET='StroitelPRO_2026_S3cr3t_K3y';
function _b64dec(s){try{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return decodeURIComponent(escape(atob(s)));}catch(e){return'';}}
function _licSign(payload){return _sha256(payload+LIC_SECRET).slice(0,12);}

var LIC_TIERS={M:30,Q:90,H:180,Y:365};
function _tierSign(tier,rand){return _sha256(tier+rand+LIC_SECRET).slice(0,6);}
function _tierVerify(code){
  if(!code)return null;
  var p=code.trim().toUpperCase().split('-');
  if(p.length!==3)return null;
  var tier=p[0],rand=p[1],sig=p[2];
  if(!LIC_TIERS[tier])return null;
  if(_tierSign(tier,rand)!==sig.toLowerCase())return null;
  return {tier:tier,days:LIC_TIERS[tier]};
}

function _licVerify(key){
  if(!key)return{valid:false,reason:'no key'};
  var tc=_tierVerify(key);
  if(tc){
    var act='';try{act=localStorage.getItem('bpro_lic_act_'+key.trim().toUpperCase())||'';}catch(e){}
    if(!act){act=new Date().toISOString().slice(0,10);try{localStorage.setItem('bpro_lic_act_'+key.trim().toUpperCase(),act);}catch(e){}}
    var ed=new Date(act+'T12:00:00');ed.setDate(ed.getDate()+tc.days);
    var exp2=ed.toISOString().slice(0,10);
    var today2=new Date().toISOString().slice(0,10);
    return{valid:true,email:'код '+tc.tier,exp:exp2,expired:today2>exp2};
  }
  var raw=_b64dec(key.trim());
  if(!raw)return{valid:false,reason:'битый ключ'};
  var p=raw.split('|');
  if(p.length!==3)return{valid:false,reason:'битый ключ'};
  var email=p[0],exp=p[1],sig=p[2];
  if(_licSign(email+'|'+exp)!==sig)return{valid:false,reason:'поддельный ключ'};
  var today=new Date().toISOString().slice(0,10);
  return{valid:true,email:email,exp:exp,expired:today>exp};
}
function _licGet(){try{return localStorage.getItem('bpro_license')||'';}catch(e){return'';}}
function _licSet(k){try{localStorage.setItem('bpro_license',k);}catch(e){}}
function _licStatus(){
  var k=_licGet();if(!k)return{pro:false,state:'none'};
  var v=_licVerify(k);
  if(!v.valid)return{pro:false,state:'invalid'};
  if(v.expired)return{pro:false,state:'expired',email:v.email,exp:v.exp};
  // days left
  var d=Math.ceil((new Date(v.exp)-new Date())/864e5);
  return{pro:true,state:'active',email:v.email,exp:v.exp,daysLeft:d};
}
function _licActivate(){
  var k=prompt('\u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043b\u0438\u0446\u0435\u043d\u0437\u0438\u043e\u043d\u043d\u044b\u0439 \u043a\u043b\u044e\u0447:');
  if(k===null)return;
  var v=_licVerify(k);
  if(!v.valid){toast('\u2716 '+(v.reason||'\u041d\u0435\u0432\u0435\u0440\u043d\u044b\u0439 \u043a\u043b\u044e\u0447'));return;}
  if(v.expired){toast('\u26a0 \u041a\u043b\u044e\u0447 \u043f\u0440\u043e\u0441\u0440\u043e\u0447\u0435\u043d ('+v.exp+')');return;}
  _licSet(k.trim());
  toast('PRO \u0430\u043a\u0442\u0438\u0432\u0438\u0440\u043e\u0432\u0430\u043d \u0434\u043e '+v.exp);
  setTimeout(function(){location.reload();},1200);
}

let S,ui,undoStack=[],redoStack=[];
function mkUi(){
  let _savedSort='date_desc';try{_savedSort=localStorage.getItem('bpro_sort')||'date_desc';}catch(e){}return{tab:'journal',pid:'p1',bid:'b1',exp:null,sort:'date_desc',
  whSub:'list',whHist:null,whBid:'',whBldFilter:'',showHidden:false,showHiddenGoals:false,
  wtActive:null,onboarded:false,earnPeriod:'day',hdrPeriod:'all'};}

function migrate(s){
  // v1→v2: materials {key:'qty'} → {key:{qty,size}}
  (s.entries||[]).forEach(e=>{if(!e.materials)return;
    Object.keys(e.materials).forEach(k=>{const v=e.materials[k];
      if(typeof v==='string'||typeof v==='number')e.materials[k]={qty:String(v),size:''};
    });
  });
  // ensure workTypes have targetArea
  (s.buildings||[]).forEach(b=>{(b.workTypes||[]).forEach(wt=>{
    if(wt.targetArea===undefined)wt.targetArea=b.totalArea||0;
  });});
  // ensure matCfg has kg
  MATS.forEach(m=>{if(s.matCfg?.[m.key]&&!s.matCfg[m.key].kg)s.matCfg[m.key].kg=m.kg||0;});
  if(!s.goals)s.goals=[];
  if(!s.users)s.users=[];if(!s.notes)s.notes=[];if(!s.wlog)s.wlog=[];
  if(!s.matCfg)s.matCfg={};
  MATS.forEach(m=>{if(!s.matCfg[m.key])s.matCfg[m.key]={pack:m.pack,iLen:m.iLen||0,label:m.label,cat:m.cat,kg:m.kg||0};});
  // migrate old 'ushi' entries to keep compatibility
  if(!s.matCfg.ushi_120)s.matCfg.ushi_120={pack:100,iLen:0,label:'Уши 120 (RA4F)',cat:'main',kg:0.02};
  if(!s.matCfg.ushi_60)s.matCfg.ushi_60={pack:100,iLen:0,label:'Уши 60',cat:'main',kg:0.02};
  s.wlog.forEach(r=>{if(!r.time)r.time='';if(!r.buildingId)r.buildingId='';});
  if(!s.schema)s.schema=SCHEMA;
  if(s.openCount===undefined)s.openCount=0;
  if(!s.hiddenMats)s.hiddenMats=[];
  if(!s.photos)s.photos=[];
  if(!s.timesheet)s.timesheet=[];
  if(!s.dimUnit)s.dimUnit='mm';
  return s;
}

function load(){
  try{const raw=localStorage.getItem(KEY);if(raw)return migrate(JSON.parse(raw));}catch(e){}
  // Try to migrate from old key
  for(const oldKey of['bpro_v102','bpro_v11','bpro_v10']){
    try{const raw=localStorage.getItem(oldKey);if(raw){const s=migrate(JSON.parse(raw));s.schema=SCHEMA;return s;}}catch(e){}
  }
  return JSON.parse(JSON.stringify(DEF_STATE));
}

function initState(){
  S=load();ui=mkUi();
  S.openCount=(S.openCount||0)+1;
  const bs=getBldgs(ui.pid);if(bs.length)ui.bid=bs[0].id;
  // Auto-transfer overdue goals
  const td=today();(S.goals||[]).forEach(g=>{if(!g.done&&!g.hidden&&g.date<td)g.date=td;});
  applyTheme();
  // Export reminder every 7 opens
  if(S.openCount%7===0&&S.openCount>0){
    setTimeout(()=>toast('💾 Не забудьте экспортировать данные!',4000),1500);
  }
}

// ── HELPERS ────────────────────────────────────────────────────
const today=()=>new Date().toISOString().slice(0,10);
const nowTime=()=>new Date().toTimeString().slice(0,5);
const uid=()=>String(Date.now())+String(Math.floor(Math.random()*9999));
const fmtRub=n=>Number(n||0).toLocaleString('ru')+' ₽';
const fmtD=d=>{if(!d)return'';const[y,m,day]=d.split('-');return`${day}.${m}.${String(y).slice(2)}`;};
const fmtDt=(d,t)=>`${fmtD(d)}${t?' '+t:''}`;
const esc=s=>{let r=String(s||'');return r.split('&').join('&amp;').split('<').join('\x3c').split('>').join('\x3e').split('"').join('&quot;');};
const toDisp=mm=>{if(!mm)return'';if(S.dimUnit==='m')return(mm/1000).toFixed(2)+'м';if(S.dimUnit==='cm')return(mm/10).toFixed(0)+'см';return mm+'мм';};

function getBldgs(pid){return(S.buildings||[]).filter(b=>b.projectId===pid);}
function getEnts(bid){return(S.entries||[]).filter(e=>e.buildingId===bid);}
function getSortedEnts(bid){
  const e=getEnts(bid).slice();const s=ui.sort||'date_desc';
  if(s==='date_desc')return e.sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom));
  if(s==='date_asc') return e.sort((a,b)=>a.dateFrom.localeCompare(b.dateFrom));
  if(s==='vol_desc') return e.sort((a,b)=>b.volume-a.volume);
  if(s==='vol_asc')  return e.sort((a,b)=>a.volume-b.volume);
  if(s==='earn_desc')return e.sort((a,b)=>entEarn(b)-entEarn(a));
  return e;
}
function wtOf(bid,wtId){const b=S.buildings.find(x=>x.id===bid);return(b?.workTypes||DEF_WTS).find(w=>w.id===wtId)||DEF_WTS[0];}
function entEarn(e){const w=wtOf(e.buildingId,e.workTypeId);return Number(e.volume)*(w?.price||0);}
function volByWT(bid,wtId){return getEnts(bid).filter(e=>e.workTypeId===wtId).reduce((s,e)=>s+Number(e.volume),0);}
function pctWT(bid,wt){const t=Number(wt.targetArea)||0;if(!t)return null;return Math.min(100,volByWT(bid,wt.id)/t*100);}
function leftWT(bid,wt){const t=Number(wt.targetArea)||0;return Math.max(0,t-volByWT(bid,wt.id));}
function totalIn(k,bid){
  const filterBid=bid||ui?.whBldFilter||'';
  return(S.wlog||[]).filter(r=>r.key===k&&r.qty>0&&(!filterBid||!r.buildingId||r.buildingId===filterBid)).reduce((s,r)=>s+r.qty,0);
}
function totalExpense(k,bid){
  const filterBid=bid||ui?.whBldFilter||'';
  return Math.abs((S.wlog||[]).filter(r=>r.key===k&&r.qty<0&&(!filterBid||!r.buildingId||r.buildingId===filterBid)).reduce((s,r)=>s+r.qty,0));
}
function totalInRaw(k){return(S.wlog||[]).filter(r=>r.key===k).reduce((s,r)=>s+r.qty,0);}
function totalOut(k,bid){
  const filterBid=bid||ui?.whBldFilter||'';
  return(S.entries||[]).filter(e=>!e.noStock&&(!filterBid||e.buildingId===filterBid)).reduce((s,e)=>{const m=e.materials?.[k];const q=m&&typeof m==='object'?m.qty:m;return s+(Number(q)||0);},0);
}
function rem(k,bid){const v=totalIn(k,bid)-totalExpense(k,bid);return isNaN(v)?0:v;}
function getPack(k){return S.matCfg?.[k]?.pack||MATS.find(m=>m.key===k)?.pack||100;}
function getILen(k){
  // Сначала из пользовательских настроек, потом из справочника
  var cfgLen=S.matCfg?.[k]?.iLen;
  if(cfgLen!=null&&cfgLen>0)return cfgLen;
  var matDef=MATS.find(function(m){return m.key===k;});
  return (matDef&&matDef.iLen>0)?matDef.iLen:0;
}

function getDayEarn(){

function _isPrepEntry(e){
  var b=(S.buildings||[]).find(function(x){return x.id===e.buildingId;});
  if(!b)return false;
  var wt=(b.workTypes||[]).find(function(w){return w.id===e.workTypeId;});

}
function getDayVol(){
  var byDay={};
  (S.entries||[]).filter(function(e){return !_isPrepEntry(e);}).forEach(function(e){

    byDay[e.dateFrom]=(byDay[e.dateFrom]||0)+Number(e.volume);
  });
  var days=Object.keys(byDay).length||1;
  return (S.entries||[]).filter(function(e){return !_isPrepEntry(e);}).reduce(function(s,e){return s+Number(e.volume);},0)/days;

function _prepStats(){
  var days={};var vol=0;var byType={};
  (S.entries||[]).filter(function(e){return _isPrepEntry(e);}).forEach(function(e){
    var d=new Date(e.dateFrom+'T12:00:00');if(d.getDay()!==0)days[e.dateFrom]=1;
    vol+=Number(e.volume);

    var nm=wt?wt.name:'Подготовка';
    byType[nm]=(byType[nm]||0)+Number(e.volume);
  });

}

function getHdrEarn(){
  const p=ui?.hdrPeriod||'all';const now=new Date();const td=today();
  return S.entries.filter(e=>{
    if(p==='all')return true;
    if(p==='day')return e.dateFrom===td;
    if(p==='week'){const d=new Date(e.dateFrom+'T12:00');return(now-d)/864e5<7;}
    if(p==='month'){const d=new Date(e.dateFrom+'T12:00');return(now-d)/864e5<30;}
    return true;
  }).reduce((s,e)=>s+entEarn(e),0);
}

  else if(Math.abs(sum-100)>0.5){hint.textContent='\u0421\u0443\u043c\u043c\u0430: '+sum.toFixed(0)+'% (\u043d\u0443\u0436\u043d\u043e 100%)';hint.className='wp-hint wp-warn';}

}

function _matCalcHTML(f){
  var b=S.buildings.find(function(x){return x.id===ui.bid;});if(!b)return '';
  var wtId=(document.getElementById('ew')||{}).value||(f.workTypeId)||((b.workTypes||[])[0]||{}).id;
  var wt=(b.workTypes||[]).find(function(w){return w.id===wtId;});
  if(!wt||!wt.mats)return '';
  var vol=parseFloat((document.getElementById('ev')||{}).value||f.volume||0)||0;
  if(vol<=0)return '\x3cdiv class="mc-hint">Введите объём — покажу сколько нужно материалов\x3c/div>';
  var target=Number(wt.targetArea)||0;
  var keys=Object.keys(wt.mats);
  if(!keys.length)return '';
  var rows=keys.map(function(k){
    var norm=Number(wt.mats[k].qty)||0;
    var iLen2=(typeof getILen==='function')?getILen(k):0;
    var need=0;
    if(target>0&&norm>0){
      need=Math.ceil(norm/target*vol);
    } else if(iLen2>0&&norm<=0){
      // Нет нормы — считаем из пог.м: объём*1000мм / длина штуки
      var unit2=wt.unit||'м²';
      if(unit2.includes('пог')||unit2==='м'||unit2.includes('м')){
        need=Math.ceil(vol*1000/iLen2);
      }
    }
    if(!need)return '';
    var have=(typeof rem==='function')?rem(k):0;
    var lbl=(typeof getMatLabel==='function')?getMatLabel(k):k;
    var enough=have>=need;
    return '\x3cdiv class="mc-row '+(enough?'mc-ok':'mc-low')+'">'
      +'\x3cspan class="mc-name">'+esc(lbl)+'\x3c/span>'
      +'\x3cspan class="mc-need">нужно '+need+' шт\x3c/span>'
      +'\x3cspan class="mc-have">'+(enough?'✓ есть '+have:'⚠ только '+have)+'\x3c/span>'
      +'\x3c/div>';
  }).filter(Boolean).join('');
  if(!rows)return '';
  return '\x3cdiv class="mc-title">🧮 Расчёт: '+vol+' '+(wt.unit||'м²')+'\x3c/div>'+rows;
}

function _matCalcUpdate(){
  var box=document.getElementById('mat-calc');if(!box)return;
  box.innerHTML=_matCalcHTML({});
  // Автозаполняем поля кол-ва материала исходя из объёма и норм
  var b=S.buildings.find(function(x){return x.id===ui.bid;});if(!b)return;
  var wtId=(document.getElementById('ew')||{}).value||((b.workTypes||[])[0]||{}).id;
  var wt=(b.workTypes||[]).find(function(w){return w.id===wtId;});
  if(!wt||!wt.mats)return;
  var vol=parseFloat((document.getElementById('ev')||{}).value||0)||0;
  if(vol<=0)return;
  var target=Number(wt.targetArea)||0;
  Object.keys(wt.mats).forEach(function(k){
    var inp=document.getElementById('m_'+k);if(!inp||inp.value)return; // не перезаписываем ручной ввод
    var norm=Number(wt.mats[k].qty)||0;
    if(!norm)return;
    var iLen=getILen(k)||0;
    var need;
    if(target>0){
      // Норма на targetArea единиц объёма
      need=Math.ceil(norm/target*vol);
    } else if(iLen>0 && wt.unit&&(wt.unit.includes('пог')||wt.unit.includes('м'))) {
      // Объём в пог.м -> перевести в мм -> разделить на длину штуки
      var volMm=vol*1000; // пог.м → мм
      need=Math.ceil(volMm/iLen);
    } else {
      need=Math.ceil(norm*vol);
    }
    if(need>0)inp.value=need;
  });
}

function _addPhoto(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';inp.style.display='none';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var rd=new FileReader();
    rd.onload=function(ev){
      // compress via canvas
      var img=new Image();
      img.onload=function(){
        var max=1000;var w=img.width,hh=img.height;
        if(w>max||hh>max){if(w>hh){hh=hh*max/w;w=max;}else{w=w*max/hh;hh=max;}}
        var cv=document.createElement('canvas');cv.width=w;cv.height=hh;
        cv.getContext('2d').drawImage(img,0,0,w,hh);
        var data=cv.toDataURL('image/jpeg',0.7);
        act(function(){if(!S.photos)S.photos=[];S.photos.push({id:uid(),data:data,caption:'',buildingId:ui.bid,date:today()});});
        toast('\ud83d\udcf7 \u0424\u043e\u0442\u043e \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u043e');
      };
      img.src=ev.target.result;
    };
    rd.readAsDataURL(file);
  };
  document.body.appendChild(inp);inp.click();setTimeout(function(){inp.remove();},1000);
}

// ─── ANALYTICS TRACKER (Telegram) ───────────────
// Заполните своими данными от @BotFather и @userinfobot:
var TRACK_BOT_TOKEN=''; // токен бота от @BotFather
var TRACK_CHAT_ID='';   // @имя_канала (бот должен быть админом канала)
var TRACK_ON=true;      // false чтобы выключить трекер
function _trackId(){
  try{var id=localStorage.getItem('bpro_uid');if(!id){id='u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);localStorage.setItem('bpro_uid',id);}return id;}catch(e){return 'anon';}
}
function _track(event,extra){
  if(!TRACK_ON||!TRACK_BOT_TOKEN||!TRACK_CHAT_ID)return;
  var uid=_trackId();
  var msg='📊 '+VER+' | '+uid+'\n'+event+(extra?' · '+extra:'');
  _trackQueue(msg);
  _trackFlush();
}
function _trackQueue(msg){
  try{var q=JSON.parse(localStorage.getItem('bpro_tq')||'[]');q.push(msg);if(q.length>50)q=q.slice(-50);localStorage.setItem('bpro_tq',JSON.stringify(q));}catch(e){}
}
function _trackFlush(){
  if(navigator.onLine===false)return;
  var q=[];try{q=JSON.parse(localStorage.getItem('bpro_tq')||'[]');}catch(e){}
  if(!q.length)return;
  var msg=q.shift();
  try{localStorage.setItem('bpro_tq',JSON.stringify(q));}catch(e){}
  var url='https://api.telegram.org/bot'+TRACK_BOT_TOKEN+'/sendMessage';
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TRACK_CHAT_ID,text:msg})}).then(function(){if(q.length)setTimeout(_trackFlush,400);}).catch(function(){_trackQueue(msg);});
}

function _trackVisit(){
  try{
    var k='bpro_last_visit';var now=Date.now();var last=Number(localStorage.getItem(k)||0);
    localStorage.setItem(k,now);
    var first=!localStorage.getItem('bpro_first_done');
    if(first){localStorage.setItem('bpro_first_done','1');_track('🆕 Первый запуск');}
    else if(now-last>3600000){_track('🔄 Возврат (заход)');}
  }catch(e){}
}

  return false;
}

// ── ТАБЕЛЬ (timesheet) ──
// status: 'p'=присутствовал, 'h'=полдня, 'a'=отсутствовал/прогул
function _tsGet(uid,date){var r=(S.timesheet||[]).find(function(x){return x.uid===uid&&x.date===date;});return r?r.status:null;}
function _tsSet(uid,date,status){
  if(!S.timesheet)S.timesheet=[];
  var r=S.timesheet.find(function(x){return x.uid===uid&&x.date===date;});
  if(r){if(status===null){S.timesheet=S.timesheet.filter(function(x){return x!==r;});}else r.status=status;}
  else if(status!==null)S.timesheet.push({uid:uid,date:date,status:status});
}
// attendance stats for a worker over last N days
function _tsStats(uid,days){
  days=days||30;var now=new Date();var present=0,half=0,absent=0,marked=0;
  for(var i=0;i<days;i++){
    var d=new Date(now);d.setDate(now.getDate()-i);
    if(d.getDay()===0)continue; // skip Sundays
    var dt=_ymdLocal(d);var st=_tsGet(uid,dt);
    if(st==='p'){present++;marked++;}
    else if(st==='h'){half++;marked++;}
    else if(st==='a'){absent++;marked++;}
    else if(st==='b'){absent++;marked++;}
  }
  var workDays=present+half*0.5;
  var attendance=marked>0?Math.round((present+half*0.5)/(present+half+absent)*100):null;
  return {present:present,half:half,absent:absent,marked:marked,workDays:workDays,attendance:attendance};
}
function _ymdLocal(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
// Worker rating 0-10: combines productivity (vs best) + attendance
function _workerRating(dayVol,maxDayVol,attendance){
  var prod=maxDayVol>0?(dayVol/maxDayVol):0;
  var att=(attendance!=null&&!isNaN(attendance))?Math.min(1,Math.max(0,attendance)):0.8;
  var score=(prod*0.6+att*0.4)*10;
  var s=Math.max(1,Math.min(10,score));
  return isNaN(s)?1:Math.round(s);
}

// Зарплата работников по корпусу (с учётом долей _wShare)
function _salaryByBuilding(bid){
  var byU={};
  // Fast: iterate entries, then only involved workers (not all 200)
  (S.entries||[]).filter(function(e){return e.buildingId===bid;}).forEach(function(e){
    var earn=entEarn(e);var vol=Number(e.volume||0);
    var workers=e.workers&&e.workers.length?e.workers:(e.worker?[{id:e.worker,pct:100}]:[]);
    var tot=workers.reduce(function(s,x){return s+(x.pct||0);},0)||100;
    workers.forEach(function(w){
      var sh=(w.pct||0)/tot;if(sh<=0)return;
      var u=(S.users||[]).find(function(x){return x.id===w.id;});
      if(!u)return;
      if(!byU[u.id])byU[u.id]={id:u.id,name:u.name,team:u.team||'',earn:0,vol:0};
      byU[u.id].earn+=earn*sh;
      byU[u.id].vol+=vol*sh;
    });
  });
  return Object.values(byU).sort(function(a,b){return b.earn-a.earn;});
}
// Зарплата по бригадам (по всем объектам)
function _salaryByBrigade(){
  var byT={};
  (S.entries||[]).forEach(function(e){
    var earn=entEarn(e);var vol=Number(e.volume||0);
    var workers=e.workers&&e.workers.length?e.workers:(e.worker?[{id:e.worker,pct:100}]:[]);
    var tot=workers.reduce(function(s,x){return s+(x.pct||0);},0)||100;
    workers.forEach(function(w){
      var sh=(w.pct||0)/tot;if(sh<=0)return;
      var u=(S.users||[]).find(function(x){return x.id===w.id;});
      if(!u)return;
      var t=u.team||'Без бригады';
      if(!byT[t])byT[t]={team:t,earn:0,vol:0,members:{}};
      byT[t].earn+=earn*sh;
      byT[t].vol+=vol*sh;
      byT[t].members[u.id]=1;
    });
  });
  return Object.values(byT).map(function(t){t.headcount=Object.keys(t.members).length;return t;}).sort(function(a,b){return b.earn-a.earn;});
}

function _showJournalHistory(){
  const entries=(S.entries||[]).slice().sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom));
  if(!entries.length){toast('Нет записей');return;}
  // Группируем по дате
  const byDate={};
  entries.forEach(e=>{
    const d=e.dateFrom||'?';
    if(!byDate[d])byDate[d]=[];
    byDate[d].push(e);
  });
  let html='<div class="sheet" style="max-height:90vh"><div class="shdl"></div>';
  html+='<div class="shtitle">📋 История журнала</div>';
  html+='<div class="shbody" style="overflow-y:auto;max-height:70vh">';
  Object.keys(byDate).sort().reverse().forEach(dt=>{
    html+=`\x3cdiv class="ts-h s-dim" style="font-size:12px;padding:6px 0">${dt}\x3c/div>`;
    byDate[dt].forEach(e=>{
      const bld=S.buildings.find(b=>b.id===e.buildingId);
      const wt=bld?(bld.workTypes||[]).find(w=>w.id===e.workTypeId):null;
      const wtName=wt?wt.name:(e.workTypeId||'—');
      const clr=wt?wt.color:'var(--text-dim)';
      const wNames=(e.workers&&e.workers.length)
        ?e.workers.map(w=>{const u=(S.users||[]).find(x=>x.id===w.id);return u?u.name.split(' ')[0]:'?';}).join(', ')
        :(e.worker?(S.users||[]).find(x=>x.id===e.worker)?.name||'?':'—');
      const earn=entEarn(e);
      html+=`\x3cdiv style="display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--border)">
        \x3cdiv style="flex:1">
          \x3cdiv style="font-weight:600;color:${clr};font-size:13px">${esc(wtName)}\x3c/div>
          \x3cdiv style="font-size:12px;color:var(--text-dim)">${esc(bld?bld.name:'?')} · ${Number(e.volume||0).toFixed(1)} м² · ${esc(wNames)}\x3c/div>
          ${e.notes?`\x3cdiv style="font-size:11px;color:var(--text-dim);font-style:italic">${esc(e.notes)}\x3c/div>`:''}
        \x3c/div>
        \x3cdiv style="font-weight:700;color:var(--green);white-space:nowrap;padding-left:8px">${fmtRub(Math.round(earn))}\x3c/div>
      \x3c/div>`;
    });
  });
  html+='</div>';
  html+='<div class="shfoot"><button class="btn btn-ghost" data-a="close-modal">Закрыть</button></div></div>';
  showModal(html);
}

function renderShifts(){
  const today=_ymdLocal(new Date());
  const rateUsers=(S.users||[]).filter(u=>u.mode==='rate'||u.team==='Уборка/Ставка');
  const allUsers=rateUsers.length?rateUsers:(S.users||[]);

  // Быстрый табель сегодня
  let tsHtml='<div class="card"><div class="card-title">📋 Табель сегодня</div>';
  tsHtml+='<div class="ts-scroll"><table class="ts-table"><tr><th class="ts-name-h"></th><th>Сегодня</th></tr>';
  allUsers.forEach(u=>{
    const st=_tsGet(u.id,today);
    const cls=st==='p'?'ts-cell ts-p':st==='h'?'ts-cell ts-h':st==='a'?'ts-cell ts-a':st==='b'?'ts-cell ts-b':'ts-cell';
    const lbl=st==='p'?'П':st==='h'?'½':st==='a'?'Х':st==='b'?'Б':'';
    tsHtml+=`\x3ctr>\x3ctd class="ts-name">${esc(u.name.split(' ')[0])}\x3c/td>\x3ctd class="${cls}" data-a="ts-tap" data-uid="${u.id}" data-date="${today}">${lbl}\x3c/td>\x3c/tr>`;
  });
  tsHtml+='</table></div><div class="ts-legend" style="margin-top:8px">П — пришёл · ½ — полдня · Х — прогул · Б — больничный</div></div>';

  // Наряды — записи журнала с mode=rate или из b_rate1
  const rateEntries=(S.entries||[]).filter(e=>e.mode==='rate'||e.buildingId==='b_rate1')
    .sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom));

  // Группируем по дате
  const byDate={};
  rateEntries.forEach(e=>{
    if(!byDate[e.dateFrom])byDate[e.dateFrom]=[];
    byDate[e.dateFrom].push(e);
  });

  let naryadHtml='<div class="card"><div class="card-title">🧾 Наряды</div>';
  const dates=Object.keys(byDate).sort().reverse().slice(0,30);
  if(!dates.length){
    naryadHtml+='<div style="color:var(--text-dim);font-size:13px;padding:8px 0">Нет записей. Добавьте через Журнал.</div>';
  } else {
    dates.forEach(dt=>{
      naryadHtml+=`\x3cdiv class="ts-h s-dim" style="margin-top:10px;font-size:12px">${dt}\x3c/div>`;
      byDate[dt].forEach(e=>{
        const bld=S.buildings.find(b=>b.id===e.buildingId);
        const wt=bld?(bld.workTypes||[]).find(w=>w.id===e.workTypeId):null;
        const wtName=wt?wt.name:e.workTypeId;
        const earnTotal=entEarn(e);
        const wNames=(e.workers||[]).map(w=>{const u=S.users.find(x=>x.id===w.id);return u?u.name.split(' ')[0]:'?';}).join(', ');
        const shift=e.shift?` · ${e.shift}`:'';
        const times=(e.timeFrom&&e.timeTo)?` ${e.timeFrom}–${e.timeTo}`:'';
        naryadHtml+=`\x3cdiv class="entry-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          \x3cdiv style="display:flex;justify-content:space-between;width:100%">
            \x3cspan style="font-weight:600">${esc(wtName)}${shift}${times}\x3c/span>
            \x3cspan class="earn-val">${fmtRub(Math.round(earnTotal))}\x3c/span>
          \x3c/div>
          \x3cdiv style="font-size:12px;color:var(--text-dim)">${esc(wNames)}${e.notes?' · '+esc(e.notes):''}\x3c/div>
        \x3c/div>`;
      });
    });
  }
  naryadHtml+='</div>';

  return `\x3cdiv class="scroll-pad">${tsHtml}${naryadHtml}\x3c/div>`;
}

function renderWh(){
  const sub=ui.whSub||'list';
  const bldFilter=ui.whBldFilter||'';
  const _projBlds=(S.buildings||[]);
  const bldBar=`\x3cdiv class="wh-bld-bar">\x3cbutton class="wh-bld-btn${!bldFilter?' on':''}" data-a="wh-bld" data-bid="">\u0412\u0441\u0435 \u043a\u043e\u0440\u043f\u0443\u0441\u0430\x3c/button>${_projBlds.map(function(b){return `\x3cbutton class="wh-bld-btn${bldFilter===b.id?' on':''}" data-a="wh-bld" data-bid="${b.id}">${esc(b.name)}\x3c/button>`;}).join('')}\x3c/div>`;
    const tabBar=`\x3cdiv class="wh-tabs">
    \x3cbutton class="wh-tb${sub==='list'?' on':''}" data-a="wh-sub" data-s="list">📦 Склад\x3c/button>
    \x3cbutton class="wh-tb${sub==='history'?' on':''}" data-a="wh-sub" data-s="history">📅 История\x3c/button>
    \x3c/div>`;

  if(sub==='history') return bldBar+tabBar+renderWhHistory();
  if(sub==='low')     return bldBar+tabBar+renderWhLow();

  // Main stock list — tabs by material category
  const catTab=ui.whCat||'main';
  const compact=ui.whCompact!==false;// default compact
  const _hidden=S.hiddenMats||[];
  const _lastTs=(k)=>{const rs=(S.wlog||[]).filter(r=>r.key===k);if(!rs.length)return 0;return Math.max(...rs.map(r=>new Date((r.date||'2000-01-01')+'T'+(r.time||'00:00')).getTime()||0));};
  const _stdKeys=new Set(MATS.map(m=>m.key));
  const _customMats=Object.entries(S.matCfg||{}).filter(([k,v])=>!_stdKeys.has(k)&&(catTab==='main'?v.cat!=='consumable':v.cat==='consumable')&&!_hidden.includes(k)).map(([k,v])=>({key:k}));
  const mats=[...(catTab==='main'?MATS_MAIN:MATS_CONSUMABLES).filter(m=>!_hidden.includes(m.key)&&_matActive(m.key)),..._customMats.filter(m=>_matActive(m.key))].slice().sort((a,b)=>_lastTs(b.key)-_lastTs(a.key));

  const matRows=mats.map(m=>{
    const inn=totalIn(m.key,bldFilter),out=totalOut(m.key,bldFilter),left=rem(m.key,bldFilter);
    const pSz=getPack(m.key),iLen=getILen(m.key),kgUnit=getKg(m.key);
    const crit=left<0,warn=inn>0&&left>=0&&left<pSz*2;
    const leftKg=(left*kgUnit).toFixed(2);
    const wlogK=(S.wlog||[]).filter(r=>r.key===m.key).slice().reverse();
    const isOpen=ui.whOpen===m.key;
    const leftM=iLen>0?left*iLen/1000:left;
    const stColor=crit?'var(--red)':leftM<10?'#e74c3c':leftM<50?'#f39c12':leftM<100?'#27ae60':leftM>=500?'#3498db':'var(--green)';
    const compactHead=`\x3cdiv class="wr-compact" data-a="toggle-wr" data-key="${m.key}">
      \x3cdiv class="wrc-inf">
        \x3cdiv class="wrc-name">${esc(getMatLabel(m.key))}\x3c/div>
        \x3cdiv class="wrc-sub">${iLen>0?toDisp(iLen)+'/шт':'пачка '+pSz+'шт'}\x3c/div>
      \x3c/div>
      \x3cdiv class="wrc-right">
        \x3cdiv class="wrc-stock" style="color:${stColor}">${iLen>0?((left*iLen/1000).toFixed(left*iLen%1000===0?0:1)):left}\x3cspan class="wrc-unit">${iLen>0?'пог.м':'шт'}\x3c/span>\x3c/div>
        \x3cspan class="wrc-arr">${isOpen?'▲':'▼'}\x3c/span>
      \x3c/div>
    \x3c/div>`;
    if(!isOpen){
      return`\x3cdiv class="wr wr-c" style="border-left:3px solid ${stColor}">${compactHead}\x3c/div>`;
    }
    return`\x3cdiv class="wr" style="border-left:3px solid ${stColor}">
      ${compactHead}
      \x3cdiv class="wr-acts-row">
        \x3cbutton class="act-s" data-a="edit-mat" data-key="${m.key}">⚙ Настр.\x3c/button>
        ${(inn>0||out>0)?`\x3cbutton class="act-s" data-a="del-mat-all" data-key="${m.key}">🧹 Очистить\x3c/button>`:''}
        \x3cbutton class="act-s act-s-del" data-a="del-mat-pos" data-key="${m.key}">🗑 Удалить\x3c/button>
      \x3c/div>
      ${inn>0||out>0?`\x3cdiv class="wr-nums">
        \x3cdiv class="wn"><b class="wn-in">+${inn}\x3c/b><s>Приход\x3c/s>\x3c/div>
        \x3cdiv class="wn"><b class="wn-out">−${out}\x3c/b><s>Расход\x3c/s>\x3c/div>
        \x3cdiv class="wn"><b class="${crit?'wn-crit':warn?'wn-warn':'wn-ok'}">${left}\x3c/b><s>Остаток\x3c/s>\x3c/div>
        \x3cdiv class="wn"><b>${(left/pSz).toFixed(1)}\x3c/b><s>Пачек\x3c/s>\x3c/div>
        ${kgUnit>0?`\x3cdiv class="wn"><b>${leftKg}\x3c/b><s>кг\x3c/s>\x3c/div>`:''}
        ${iLen>0&&left>0?`\x3cdiv class="wn"><b>${(left*iLen/1000).toFixed(1)}\x3c/b><s>м\x3c/s>\x3c/div>`:''}
      \x3c/div>`:`\x3cdiv class="wr-empty">Нет данных — добавьте приход\x3c/div>`}

        \x3cbutton class="wr-btn wr-move" data-a="move-mat" data-key="${m.key}">\ud83d\udd04 Перем\x3c/button>
        \x3cbutton class="wr-btn wr-adj" data-a="adj-mat" data-key="${m.key}">\u270f \u041e\u0441\u0442\u0430\u0442\u043e\u043a\x3c/button>
        \x3cbutton class="wr-btn wr-exp" data-a="sub-wh" data-key="${m.key}">− Расход\x3c/button>
      \x3c/div>
      ${wlogK.length?`\x3cdiv class="wh-hist">
        ${wlogK.map(r=>`\x3cdiv class="wh-r">
          \x3cspan class="wh-d">${fmtDt(r.date,r.time)}\x3c/span>
          \x3cspan class="wh-q ${r.qty<0?'wh-q-out':''}">${r.qty<0?'−'+Math.abs(r.qty):'+'+r.qty}шт\x3c/span>
          ${r.buildingId?`\x3cspan class="wh-bld">${esc((S.buildings.find(b=>b.id===r.buildingId)||{name:'?'}).name)}\x3c/span>`:''}
          \x3cbutton class="act-s act-s-del" data-a="del-wlog" data-id="${r.id}">✕\x3c/button>
        \x3c/div>`).join('')}
      \x3c/div>`:''}
    \x3c/div>`;
  }).join('');

  return bldBar+tabBar+`\x3cdiv class="cat-tabs">
    \x3cbutton class="cat-tb${catTab==='main'?' on':''}" data-a="wh-cat" data-c="main">🔩 Основные\x3c/button>
    \x3cbutton class="cat-tb${catTab==='consumable'?' on':''}" data-a="wh-cat" data-c="consumable">🔄 Расходники\x3c/button>
  \x3c/div>${matRows}\x3cdiv class="sp">\x3c/div>`;
}


function renderWorkerCard(uid){
  const u=(S.users||[]).find(x=>x.id===uid);
  if(!u)return;
  const uEntries=(S.entries||[]).filter(e=>(e.workers||[]).some(w=>w.id===uid)||(e.worker===uid));
  const totalEarn=uEntries.reduce((s,e)=>{
    const w=(e.workers||[]).find(x=>x.id===uid);
    const pct=w?w.pct/100:1;
    return s+entEarn(e)*pct;
  },0);
  const totalVol=uEntries.reduce((s,e)=>{
    const w=(e.workers||[]).find(x=>x.id===uid);
    const pct=w?w.pct/100:1;
    return s+Number(e.volume||0)*pct;
  },0);
  const workDays=new Set(uEntries.map(e=>e.dateFrom)).size;
  const lastEntry=uEntries.slice().sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom))[0];
  const avgDay=workDays?totalVol/workDays:0;
  const initials=u.avatar||((u.name||'?').split(' ').map(p=>p[0]||'').join('').slice(0,2).toUpperCase()||'?');
  // По видам работ
  const wtBreak={};
  uEntries.forEach(e=>{
    const bld=S.buildings.find(b=>b.id===e.buildingId);
    const wt=bld?(bld.workTypes||[]).find(w=>w.id===e.workTypeId):null;
    const name=wt?wt.name:e.workTypeId;
    if(!wtBreak[name])wtBreak[name]={earn:0,vol:0};
    const w=(e.workers||[]).find(x=>x.id===uid);
    const pct=w?w.pct/100:1;
    wtBreak[name].earn+=entEarn(e)*pct;
    wtBreak[name].vol+=Number(e.volume||0)*pct;
  });
  const topWts=Object.entries(wtBreak).sort((a,b)=>b[1].earn-a[1].earn).slice(0,5);
  // Последние записи
  const recent=uEntries.slice().sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom)).slice(0,8);
  const ratingScore=_workerRating(avgDay,avgDay*1.5||1,workDays/(workDays+3||1));

  showModal(`<div class="sheet"><div class="shdl"></div>
    <div class="shtitle">Досье работника</div>
    <div class="shbody"><div class="worker-card-modal">
      <div class="wc-header">
        <div class="wc-avatar">${initials}</div>
        <div><div class="wc-name">${esc(u.name)}</div>
        <div class="wc-team">${esc(u.team||'Без бригады')}</div>
        <div class="wc-rating">${'★'.repeat(Math.round(+ratingScore||0))}${'☆'.repeat(10-Math.round(+ratingScore||0))} <span style="font-size:11px;color:var(--text-dim)">${(+ratingScore||0).toFixed(1)}/10</span></div></div>
      </div>
      <div class="wc-stats">
        <div class="wc-stat" style="background:rgba(52,152,219,.13);border:1px solid rgba(52,152,219,.3)"><div class="wc-stat-v" style="color:#3498db">${fmtRub(Math.round(totalEarn))}</div><div class="wc-stat-l">Заработок</div></div>
        <div class="wc-stat" style="background:rgba(39,174,96,.13);border:1px solid rgba(39,174,96,.3)"><div class="wc-stat-v" style="color:#27ae60">${fmtRub(Math.round(totalEarn*_taxMul()))}</div><div class="wc-stat-l">${_taxPctLbl()} (на руки)</div></div>
        <div class="wc-stat"><div class="wc-stat-v">${totalVol.toFixed(1)} <span style="font-size:13px">м²</span></div><div class="wc-stat-l">Выработка</div></div>
        <div class="wc-stat"><div class="wc-stat-v">${workDays}</div><div class="wc-stat-l">Рабочих дней</div></div>
        <div class="wc-stat"><div class="wc-stat-v">${avgDay.toFixed(1)}</div><div class="wc-stat-l">м²/день</div></div>
        <div class="wc-stat"><div class="wc-stat-v">${uEntries.length}</div><div class="wc-stat-l">Записей</div></div>
      </div>
      ${topWts.length?`<div class="wc-section">Виды работ</div>${topWts.map(([n,w])=>{
        const bld2=S.buildings.find(b=>(b.workTypes||[]).some(wt=>wt.name===n));
        const wtObj=bld2?(bld2.workTypes||[]).find(wt=>wt.name===n):null;
        const clr=wtObj?wtObj.color:'var(--gold)';
        return `<div class="wc-entry-row" style="border-left:3px solid ${clr};padding-left:8px"><span>${esc(n)}</span><span class="wc-entry-earn" style="color:${clr}">${fmtRub(Math.round(w.earn))}</span></div>`;
      }).join('')}`:''}
      <div class="wc-section">Примечание</div>
      <div style="position:relative">
        <textarea id="wc-note-${uid}" placeholder="Заметки о работнике..." style="width:100%;min-height:70px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:13px;font-family:var(--font);resize:vertical;box-sizing:border-box">${esc((S.userNotes&&S.userNotes[uid])||'')}</textarea>
        <button onclick="_saveWorkerNote('${uid}')" style="margin-top:4px;background:var(--gold);color:#1a1a1a;border:none;border-radius:8px;padding:6px 16px;font-weight:700;cursor:pointer;font-size:13px;font-family:var(--font)">💾 Сохранить</button>
      </div>
      ${recent.length?`<div class="wc-section">Последние записи</div>${recent.map(e=>{const bld=S.buildings.find(b=>b.id===e.buildingId);const wt=bld?(bld.workTypes||[]).find(w=>w.id===e.workTypeId):null;const pw=(e.workers||[]).find(x=>x.id===uid);const pct=pw?pw.pct/100:1;return `<div class="wc-entry-row"><div><div>${esc(wt?wt.name:e.workTypeId)} · ${Number(e.volume||0).toFixed(1)} м²</div><div class="wc-entry-date">${e.dateFrom}${bld?' · '+esc(bld.name):''}</div></div><span class="wc-entry-earn">${fmtRub(Math.round(entEarn(e)*pct))}</span></div>`;}).join('')}`:'<div style="color:var(--text-dim);font-size:13px;padding:8px 0">Нет записей</div>'}
    </div></div>
    <div class="shfoot"><button class="btn btn-ghost" data-a="close-modal">Закрыть</button></div>
  </div>`);
}

function _bindUserBtns(){

  document.querySelectorAll('[data-bind-del-user]').forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var uid=btn.dataset.bindDelUser;
      var u=(S.users||[]).find(function(x){return x.id===uid;});
      if(!u)return;
      if(!confirm('Удалить '+u.name+'?'))return;
      act(function(){S.users=(S.users||[]).filter(function(x){return x.id!==uid;});});
      toast('🗑 Удалён');
    };

  document.querySelectorAll('[data-bind-edit-user]').forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var uid=btn.dataset.bindEditUser;
      var u=(S.users||[]).find(function(x){return x.id===uid;});
      if(u)_showUserForm(u);

  });

function renderWhLow(){
  const deficit=MATS.filter(m=>rem(m.key)<0);
  const warning=MATS.filter(m=>{const r=rem(m.key),p=getPack(m.key);return totalIn(m.key)>0&&r>=0&&r<p*2;});
  if(!deficit.length&&!warning.length)return`\x3cdiv class="sp">\x3c/div>`+emptyScreen('✅','Всё в норме','Дефицита нет');
  const rows=(grp,title,cls)=>!grp.length?'':
    `\x3cdiv class="low-sec">
      \x3cdiv class="low-title ${cls}">${title}\x3c/div>
      \x3cdiv class="low-hdr">
        \x3cspan>Материал\x3c/span>
        \x3cspan>В наличии\x3c/span>
        \x3cspan>Пачек\x3c/span>
        \x3cspan>\x3c/span>
      \x3c/div>
      ${grp.map(m=>{
        const left=rem(m.key),inn=totalIn(m.key),out=totalOut(m.key);
        const pSz=getPack(m.key);
        const packs=(left/pSz).toFixed(1);
        const iLen=getILen(m.key);
        const meters=iLen>0&&left>0?' · '+(left*iLen/1000).toFixed(1)+'м':'';
        const crit=left<0;
        return`\x3cdiv class="low-row">
          \x3cdiv class="low-name">${esc(getMatLabel(m.key))}\x3c/div>
          \x3cdiv class="low-stock">
            \x3cspan class="low-num ${cls}">${left<0?'−'+Math.abs(left):'+'+inn+' − '+out+' = '+left}\x3c/span>
            \x3cspan class="low-unit">шт${meters}\x3c/span>
          \x3c/div>
          \x3cdiv class="low-packs ${crit?'low-crit':'low-warn'}">${left<0?'дефицит':packs+' пач'}\x3c/div>
          \x3cdiv style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
            \x3cbutton class="wr-btn" style="padding:5px 10px;font-size:11px" data-a="add-wh-for" data-key="${m.key}">+ Приход\x3c/button>
            \x3cbutton class="low-edit-btn" data-a="edit-mat" data-key="${m.key}">✏ Ред.\x3c/button>
          \x3c/div>
        \x3c/div>`;
      }).join('')}
    \x3c/div>`;
  return rows(deficit,'❌ Закончилось','low-crit')+rows(warning,'⚠ Заканчивается','low-warn')+`\x3cdiv class="sp">\x3c/div>`;
}

function renderTasks(){
  const td=today();
  const taskBld=ui.taskBld===undefined?ui.bid:ui.taskBld;// '' = all
  const active=(S.goals||[]).filter(g=>!g.hidden&&(!taskBld||!g.buildingId||g.buildingId===taskBld));
  const sections=[
    {label:'⚠ Просрочено',cls:'s-red',  items:active.filter(g=>!g.done&&g.date<td)},
    {label:'📅 Сегодня',  cls:'s-gold', items:active.filter(g=>!g.done&&g.date===td)},
    {label:'📆 Позже',    cls:'s-dim',  items:active.filter(g=>!g.done&&g.date>td)},
    {label:'✅ Выполнено',cls:'s-green',items:active.filter(g=>g.done&&g.date===td)},
  ];
  const hidCnt=(S.goals||[]).filter(g=>g.hidden).length;
  const notes=(S.notes||[]).filter(n=>!taskBld||!n.buildingId||n.buildingId===taskBld).slice().sort((a,b)=>b.date.localeCompare(a.date));

  const bldTabs=`\x3cdiv class="task-bld-bar">\x3cbutton class="tbld-btn${taskBld===''?' on':''}" data-a="task-bld" data-bid="">Все этажи\x3c/button>${getBldgs(ui.pid).map(b=>`\x3cbutton class="tbld-btn${taskBld===b.id?' on':''}" data-a="task-bld" data-bid="${b.id}">${esc(b.name)}\x3c/button>`).join('')}\x3c/div>`;
  const taskRows=g=>{
    const over=!g.done&&g.date<td;const clr=g.done?'var(--green)':over?'var(--red)':'var(--gold)';
  return`\x3cdiv class="tr${g.done?' tr-done':''}">
      \x3cbutton class="tck${g.done?' tck-on':''}" data-a="toggle-goal" data-id="${g.id}" style="border-color:${clr};${g.done?'background:'+clr+';color:#fff;':''}">
        ${g.done?'✓':''}
      \x3c/button>
      \x3cdiv class="tr-b">
        \x3cdiv class="tr-txt">${esc(g.text)}\x3c/div>
        \x3cdiv class="tr-meta">
          \x3cspan style="color:${over?'var(--red)':'var(--text2)'}">${fmtD(g.date)}\x3c/span>
          ${g.time?`\x3cspan class="tr-time">⏰ ${g.time}\x3c/span>`:''}
          ${g.buildingId?`\x3cspan class="tr-bld">📍 ${esc((S.buildings.find(b=>b.id===g.buildingId)||{name:'?'}).name)}\x3c/span>`:''}
          ${over?'\x3cspan class="tr-over">просрочено\x3c/span>':''}
        \x3c/div>
      \x3c/div>
      \x3cdiv class="tr-acts">
        \x3cbutton class="act-s" data-a="edit-goal" data-id="${g.id}">✏\x3c/button>
        \x3cbutton class="act-s act-s-del" data-a="del-goal" data-id="${g.id}">×\x3c/button>
      \x3c/div>
    \x3c/div>`;
  };

  const sectHtml=sections.filter(s=>s.items.length).map(s=>
    `\x3cdiv class="ts">\x3cdiv class="ts-h ${s.cls}">${s.label}\x3c/div>${s.items.map(taskRows).join('')}\x3c/div>`
  ).join('');

  const notesHtml=notes.length?`\x3cdiv class="ts">\x3cdiv class="ts-h s-dim">📝 Примечания из журнала\x3c/div>
    ${notes.map(n=>`\x3cdiv class="note-row">
      \x3cdiv class="note-txt">${esc(n.text)}\x3c/div>
      \x3cdiv class="note-meta">${fmtD(n.date)} · ${esc(n.source||'')}\x3c/div>
      \x3cbutton class="act-s act-s-del" data-a="del-note" data-id="${n.id}">×\x3c/button>
    \x3c/div>`).join('')}\x3c/div>`:'';
