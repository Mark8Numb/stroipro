function _earnChartData(){
  const mode=ui.chartMode||'month';
  const now=new Date();
  const _ymd=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd;};
  let days=[];
  if(mode==='all'){
    // group by month across all data
    const months={};
    (S.entries||[]).forEach(e=>{if(e.dateFrom){const mk=e.dateFrom.slice(0,7);if(!months[mk])months[mk]={vol:0,earn:0};months[mk].vol+=Number(e.volume||0);months[mk].earn+=entEarn(e);}});
    const keys=Object.keys(months).sort();
    let cum=0;
    return keys.map(mk=>{cum+=months[mk].earn;const[y,m]=mk.split('-');return{date:m+'.'+y.slice(2),vol:months[mk].vol,earn:Math.round(months[mk].earn),cum:Math.round(cum),isMonth:true};});
  }
  // month mode = last 30 days by day
  const N=30;
  for(let i=N-1;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(_ymd(d));}
  const startYmd=days[0];
  let cum=(S.entries||[]).reduce((s,e)=>(e.dateFrom&&e.dateFrom<startYmd)?s+entEarn(e):s,0);
  return days.map(dt=>{
    const ents=S.entries.filter(e=>e.dateFrom===dt);
    const vol=ents.reduce((s,e)=>s+Number(e.volume),0);
    const earn=ents.reduce((s,e)=>s+entEarn(e),0);
    cum+=earn;
    return{date:dt.slice(8,10)+'.'+dt.slice(5,7),vol,earn,cum};
  });
}

function renderEarnChart(){
  const data=_earnChartData();
  const hasData=data.some(d=>d.vol>0||d.earn>0);
  if(!hasData)return'';
  const W=320,H=180,padL=34,padR=44,padT=14,padB=28;
  const cw=W-padL-padR,ch=H-padT-padB;
  const maxVol=Math.max(...data.map(d=>d.vol),1);
  const maxCum=Math.max(...data.map(d=>d.cum),1);
  const n=data.length;
  const bw=cw/n*0.6;
  const xAt=i=>padL+cw/n*(i+0.5);
  const barH=v=>v/maxVol*ch;
  const yLine=v=>padT+ch-(v/maxCum*ch);
  // Bars (vol)
  const bars=data.map((d,i)=>{
    const h=barH(d.vol);const x=xAt(i)-bw/2;const y=padT+ch-h;
    return`\x3crect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="2" fill="#4a9fd4" opacity="0.85"/>`;
  }).join('');
  // Cumulative line
  const pts=data.map((d,i)=>`${xAt(i).toFixed(1)},${yLine(d.cum).toFixed(1)}`).join(' ');
  const dots=data.map((d,i)=>`\x3ccircle cx="${xAt(i).toFixed(1)}" cy="${yLine(d.cum).toFixed(1)}" r="3" fill="#d4920a"/>`).join('');
  // X labels (every other day to avoid clutter)
  const xlabels=data.map((d,i)=>{
    if(n>14&&i%3!==0)return'';if(n>8&&n<=14&&i%2!==0)return'';
    return`\x3ctext x="${xAt(i).toFixed(1)}" y="${H-8}" font-size="8" fill="var(--muted)" text-anchor="middle">${d.date}\x3c/text>`;
  }).join('');
  // Y axis left (vol) — 3 ticks
  const ylabelsL=[0,0.5,1].map(f=>{
    const v=(maxVol*f);const y=padT+ch-(f*ch);
    return`\x3ctext x="${padL-4}" y="${(y+3).toFixed(1)}" font-size="8" fill="#4a9fd4" text-anchor="end">${v.toFixed(0)}\x3c/text>`
      +`\x3cline x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.5" opacity="0.5"/>`;
  }).join('');
  // Y axis right (cum)
  const ylabelsR=[0,0.5,1].map(f=>{
    const v=(maxCum*f);const y=padT+ch-(f*ch);
    const lbl=v>=1000?(v/1000).toFixed(0)+'к':v.toFixed(0);
    return`\x3ctext x="${W-padR+4}" y="${(y+3).toFixed(1)}" font-size="8" fill="#d4920a" text-anchor="start">${lbl}\x3c/text>`;
  }).join('');
  const svg=`\x3csvg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    ${ylabelsL}${ylabelsR}${bars}
    \x3cpolyline points="${pts}" fill="none" stroke="#d4920a" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${xlabels}
  \x3c/svg>`;
  return`\x3cdiv class="card chart-card">
    \x3cdiv class="card-title">📊 Динамика за 14 дней\x3c/div>
    \x3cdiv class="chart-legend">
      \x3cspan class="cl-item">\x3cspan class="cl-dot" style="background:#4a9fd4">\x3c/span>Выработка м²\x3c/span>
      \x3cspan class="cl-item">\x3cspan class="cl-line" style="background:#d4920a">\x3c/span>Накоплено ₽\x3c/span>
    \x3c/div>
    ${svg}
  \x3c/div>`;
}

      if(left<=0)return null;

      // Entries for this WT
      var wtEnts=getEnts(b.id).filter(function(e){return e.workTypeId===wt.id;});
      // Prep entries for this building (price=0)
      var prepEnts=getEnts(b.id).filter(function(e){return _isPrepEntry(e);});
      var prepDays={};
      prepEnts.forEach(function(e){if(new Date(e.dateFrom+'T12:00').getDay()!==0)prepDays[e.dateFrom]=1;});
      var nPrep=Object.keys(prepDays).length;

      // Working days on this WT (exclude prep days and sundays)
      var wtDays={};
      wtEnts.forEach(function(e){
        var ds=e.dateFrom;
        if(new Date(ds+'T12:00').getDay()!==0&&!prepDays[ds])wtDays[ds]=1;
      });
      var nWtDays=Object.keys(wtDays).length||1;

      // Vol done on this WT (excluding prep entries)
      var wtVol=wtEnts.reduce(function(s,e){return s+Number(e.volume);},0);

      // Per-worker daily rate on this WT
      var wRates={};var wNames=[];
      wtEnts.forEach(function(e){
        (S.users||[]).forEach(function(u){
          var sh=_wShare(e,u.id);if(sh<=0)return;
          if(!wRates[u.id])wRates[u.id]={vol:0,days:{}};
          wRates[u.id].vol+=Number(e.volume)*sh;
          if(!prepDays[e.dateFrom])wRates[u.id].days[e.dateFrom]=1;
        });
      });
      var teamRate=0;
      Object.keys(wRates).forEach(function(uid){
        var dCnt=Object.keys(wRates[uid].days).length||1;
        var pDv=wRates[uid].vol/dCnt;
        var att=_tsStats(uid,30);
        var attF=att.attendance!==null?Math.max(0.5,att.attendance/100):0.85;
        teamRate+=pDv*attF;
        var u=(S.users||[]).find(function(x){return x.id===uid;});
        if(u&&pDv>0)wNames.push(u.name.split(' ')[0]+' '+pDv.toFixed(1)+'м/д');
      });
      if(teamRate<=0){
        var gDv=getDayVol();
        teamRate=gDv>0?gDv*0.8:5;
      }

      var dLeft=Math.ceil(left/teamRate);
      var fin=addBD(today,dLeft);
      var urgency=dLeft<=3?'fc-red':dLeft<=10?'fc-gold':'fc-green';
      var pct=Math.min(100,Math.round(done/(target||1)*100));

      return {
        bname:b.name,wname:wt.name,color:wt.color,
        left:left,done:done,pct:pct,
        dLeft:dLeft,finS:fmtD(fin),
        earnLeft:left*wt.price,
        rate:teamRate,wNames:wNames,
        urgency:urgency,nPrep:nPrep
      };
    }).filter(function(x){return x;});
  }).sort(function(a,b){return a.dLeft-b.dLeft;});

  if(!rows.length)return '';
  var h='<div class="card">';
  h+='<div class="card-title">📆 Прогноз сдачи видов работ</div>';
  if(rows.some(function(r){return r.nPrep>0;}))
    h+='<div class="fc-note">⚙ Подготовительные дни учтены в выработке</div>';
  rows.slice(0,10).forEach(function(f){
    h+='<div class="fc-row">';
      h+='<div class="fc-head">';
        h+='<span class="fc-dot" style="background:'+f.color+'"></span>';
        h+='<span class="fc-name">'+esc(f.bname)+' / '+esc(f.wname)+'</span>';
        h+='<span class="fc-date '+f.urgency+'">📅 '+f.finS+' (~'+f.dLeft+' дн.)</span>';
      h+='</div>';
      h+='<div class="fc-bar-bg"><div class="fc-bar-fill" style="width:'+f.pct+'%"></div></div>';
      h+='<div class="fc-meta">';
        h+='<span>Осталось '+f.left.toFixed(1)+' м² · '+fmtRub(Math.round(f.earnLeft))+'</span>';
        if(f.wNames.length)h+='<span class="fc-workers">👷 '+f.wNames.slice(0,3).join(', ')+'</span>';
      h+='</div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function renderAI(){
  // Stats
  var total=S.entries.reduce(function(s,e){return s+entEarn(e);},0);
  var totalVol=S.entries.reduce(function(s,e){return s+Number(e.volume);},0);
  var de=getDayEarn(),dv=getDayVol();
  var now=new Date(),td=today();

  // Period selector
  var per=ui.earnPeriod||'day';
  var _inPeriod=function(ds,p){
    if(p==='day')return ds===td;
    var d=new Date(ds+'T12:00:00');
    if(p==='week'){var diff=(now-d)/864e5;return diff>=0&&diff<7;}
    if(p==='month'){return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
    return true;
  };
  var pEnts=S.entries.filter(function(e){return _inPeriod(e.dateFrom,per);});
  var pEarn=pEnts.reduce(function(s,e){return s+entEarn(e);},0);
  var pVol=pEnts.reduce(function(s,e){return s+Number(e.volume);},0);

  // Work days count (no Sundays)
  var wdCnt=Object.keys((function(){var d={};S.entries.forEach(function(e){if(new Date(e.dateFrom+'T12:00').getDay()!==0)d[e.dateFrom]=1;});return d;})()).length||1;
  var avgDayEarn=total/wdCnt;
  var avgDayVol=totalVol/wdCnt;

  // Period buttons
  var perBtns=['day','week','month'].map(function(pid){
    return '<button class="psw'+(per===pid?' psw-on':'')+'" data-a="earn-period" data-p="'+pid+'">'+
      {day:'День',week:'Неделя',month:'Месяц'}[pid]+'</button>';
  }).join('');

  // By work type stats
  var wtStats={};
  S.buildings.forEach(function(b){
    (b.workTypes||[]).forEach(function(wt){
      var ents=S.entries.filter(function(e){return e.buildingId===b.id&&e.workTypeId===wt.id;});
      if(!ents.length)return;
      var k=wt.name;
      if(!wtStats[k])wtStats[k]={earn:0,vol:0,unit:wt.unit||'м²',color:wt.color||'#d4920a'};
      wtStats[k].earn+=ents.reduce(function(s,e){return s+entEarn(e);},0);
      wtStats[k].vol+=ents.reduce(function(s,e){return s+Number(e.volume);},0);
    });
  });

  // Worker stats
  var wStats=[];
  if(S.users&&S.users.length){
    var maxDv=1;
    wStats=(S.users||[]).map(function(u){
      var ents=S.entries.filter(function(e){return _wShare(e,u.id)>0;});
      var days={};ents.forEach(function(e){if(new Date(e.dateFrom+'T12:00').getDay()!==0)days[e.dateFrom]=1;});
      var dCnt=Object.keys(days).length||1;
      var vol=ents.reduce(function(s,e){return s+Number(e.volume);},0);
      var earn=ents.reduce(function(s,e){return s+entEarn(e);},0);
      var ts=_tsStats(u.id,30);
      return{name:u.name,uid:u.id,vol:vol,earn:earn,dayVol:vol/dCnt,cnt:ents.length,attendance:ts.attendance};
    }).filter(function(w){return w.cnt>0;}).sort(function(a,b){return b.dayVol-a.dayVol;});
    if(wStats.length)maxDv=Math.max.apply(null,wStats.map(function(w){return w.dayVol;}));

    wStats._maxDv=maxDv;
  }

  var h='';

  // ── Period switcher + KPI grid
  h+='<div class="card card-gold">';
  h+='<div class="card-title">📊 Аналитика</div>';
  h+='<div class="psw-row">'+perBtns+'</div>';
  h+='<div class="ai-grid" style="margin-top:10px">';
  h+='<div class="ai-stat"><span class="ai-sv ai-green">'+fmtRub(Math.round(pEarn))+'</span><span class="ai-sl">за период</span></div>';
  h+='<div class="ai-stat"><span class="ai-sv">'+pVol.toFixed(1)+'</span><span class="ai-sl">м² за период</span></div>';
  h+='<div class="ai-stat"><span class="ai-sv ai-orange">'+fmtRub(Math.round(de))+'</span><span class="ai-sl">сегодня</span></div>';
  h+='<div class="ai-stat"><span class="ai-sv">'+dv.toFixed(1)+'</span><span class="ai-sl">м²/день ср.</span></div>';
  h+='</div>';
  h+='</div>';

  // ── Chart
  h+=renderEarnChart();

  // ── All-time totals
  h+='<div class="card">';
  h+='<div class="card-title">💰 Итого за всё время</div>';
  h+='<div class="ai-grid">';
  h+='<div class="ai-stat"><span class="ai-sv ai-green">'+fmtRub(Math.round(total))+'</span><span class="ai-sl">заработок</span></div>';
  h+='<div class="ai-stat"><span class="ai-sv">'+totalVol.toFixed(1)+'</span><span class="ai-sl">всего м²</span></div>';
  h+='<div class="ai-stat"><span class="ai-sv">'+fmtRub(Math.round(avgDayEarn))+'</span><span class="ai-sl">в день (ср.)</span></div>';
  h+='<div class="ai-stat"><span class="ai-sv">'+avgDayVol.toFixed(1)+'</span><span class="ai-sl">м²/день (ср.)</span></div>';
  h+='</div>';
  h+='</div>';

  // ── By work type
  var wtKeys=Object.keys(wtStats);
  if(wtKeys.length){
    h+='<div class="card">';
    h+='<div class="card-title">🔨 По видам работ</div>';
    wtKeys.forEach(function(n){
      var w=wtStats[n];
      h+='<div class="earn-row"><div class="er-l"><span class="er-dot" style="background:'+w.color+'"></span><span class="er-n">'+esc(n)+'</span></div>';
      h+='<div class="er-r"><b>'+fmtRub(Math.round(w.earn))+'</b><span class="er-vol">'+w.vol.toFixed(1)+' '+w.unit+'</span></div></div>';
    });
    h+='</div>';
  }

  h+=_renderForecast();
  // ── Worker comparison
  if(wStats.length){
    var maxDv2=wStats._maxDv||1;
    h+='<div class="card">';
    h+='<div class="card-title">👥 Работники</div>';
    wStats.forEach(function(w,i){
      var pct=Math.round(w.dayVol/maxDv2*100);
      var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      var rating=_workerRating(w.dayVol,maxDv2,w.attendance);
      var attStr=w.attendance!==null?' · 📋 '+w.attendance+'%':'';
      h+='<div class="wcmp-row">';
      h+='<div class="wcmp-head"><span class="wcmp-name">'+medal+' '+esc(w.name)+'</span>';
      h+='<span class="wcmp-dv">'+w.dayVol.toFixed(1)+' м²/день</span></div>';
      h+='<div class="wcmp-bar-bg"><div class="wcmp-bar" style="width:'+pct+'%"></div></div>';
      h+='<div class="wcmp-rating">⭐ Оценка: '+Math.round(rating)+'/10'+attStr+'</div>';
      h+='<div class="wcmp-sub">'+w.vol.toFixed(1)+' м² · '+fmtRub(Math.round(w.earn))+' · '+w.cnt+' зап.</div>';
      h+='</div>';
    });
    h+='</div>';
  }

  // ── Share report
  h+='<div class="card">';
  h+='<div class="card-title" style="color:var(--blue)">📤 Поделиться отчётом</div>';
  h+=renderTimesheet();
  h+='<div class="ai-share-note">Выработка, заработок, прогноз — в WhatsApp/Telegram.</div>';
  h+='<button class="btn-share" data-a="share-report">📤 Поделиться</button>';
  h+='</div>';

  h+='<div class="sp"></div>';
  return '<div class="scroll-pad">'+h+'</div>';
}

function shareReport(){
  var td=today();
  var total=S.entries.reduce(function(s,e){return s+entEarn(e);},0);
  var totalVol=S.entries.reduce(function(s,e){return s+Number(e.volume||0);},0);
  var de=getDayEarn(),dv=getDayVol();
  var pn=(S.projects.find(function(p){return p.id===ui.pid;})||{}).name||'Объект';
  var lines=[];
  lines.push('📊 СТРОИТЕЛЬ.ПРО — ' + pn);
  lines.push('📅 ' + td.split('-').reverse().join('.'));
  lines.push('');
  lines.push('💰 Итого: ' + Math.round(total).toLocaleString('ru') + ' ₽');
  lines.push('📐 Объём: ' + totalVol.toFixed(1) + ' м²');
  lines.push('⚡ Сегодня: ' + fmtRub(Math.round(de)) + ' · ' + dv.toFixed(1) + ' м²');
  lines.push('');
  // By building
  var blds=S.buildings.filter(function(b){return b.projectId===ui.pid;});
  blds.forEach(function(b){
    var ents=S.entries.filter(function(e){return e.buildingId===b.id;});
    if(!ents.length)return;
    var earn=ents.reduce(function(s,e){return s+entEarn(e);},0);
    var vol=ents.reduce(function(s,e){return s+Number(e.volume||0);},0);
    lines.push('🏗 ' + b.name + ': ' + vol.toFixed(1) + ' м² · ' + Math.round(earn).toLocaleString('ru') + ' ₽');
  });
  lines.push('');
  lines.push('📱 Строитель.ПРО');
  var text=lines.join('\n');
  if(navigator.share){
    navigator.share({title:'Отчёт '+pn,text:text}).catch(function(){});
  } else {
    var a=document.createElement('textarea');
    a.value=text;document.body.appendChild(a);a.select();
    try{document.execCommand('copy');toast('📋 Отчёт скопирован');}catch(e){}
    document.body.removeChild(a);
  }
  if(typeof _track==='function')_track('📤 Share');
}

function sheetEntry(prefill){
  const b=S.buildings.find(x=>x.id===ui.bid);if(!b)return;
  // Все виды работ: сначала текущий корпус, потом с других корпусов
  const _bWts=b.workTypes||DEF_WTS;
  const _otherWts=[];
  S.buildings.filter(x=>x.id!==ui.bid).forEach(ob=>{
    (ob.workTypes||[]).forEach(owt=>{
      if(!_bWts.find(w=>w.name===owt.name))
        _otherWts.push({...owt,_fromBld:ob.name});
    });
  });
  const wts=[..._bWts,..._otherWts];
  const f=prefill||{};const td=today();
  const isEdit=!!f._editId;const defNoStock=isEdit?f.noStock:(S.lastNoStock!=null?S.lastNoStock:false);
  const inpSt='width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none';
  // Show only materials bound to the selected work type
  const _selWt=wts.find(w=>w.id===(f.workTypeId||wts[0]?.id))||wts[0];
  const _wtMatKeys=_selWt&&_selWt.mats?Object.keys(_selWt.mats):[];
  // Build display list: WT mats + ALL active warehouse materials
  const _wtKeySet=new Set(_wtMatKeys);
  const _allActiveMats=[];
  // First: WT-bound materials
  _wtMatKeys.forEach(k=>{const known=MATS.find(m=>m.key===k);_allActiveMats.push(known||{key:k,label:getMatLabel(k),iLen:getILen(k)||0,cat:(S.matCfg&&S.matCfg[k]&&S.matCfg[k].cat)||'main'});});
  // Then: all other active materials (have wlog receipts = were added to warehouse)
  const _wlogKeys=new Set((S.wlog||[]).filter(r=>r.qty>0).map(r=>r.key));
  _wlogKeys.forEach(k=>{if(!_wtKeySet.has(k)){const known=MATS.find(m=>m.key===k);_allActiveMats.push(known||{key:k,label:getMatLabel(k),iLen:getILen(k)||0,cat:(S.matCfg&&S.matCfg[k]&&S.matCfg[k].cat)||'main'});}});
  // Also custom matCfg materials
  Object.keys(S.matCfg||{}).forEach(k=>{if(!_wtKeySet.has(k)&&!_wlogKeys.has(k)){_allActiveMats.push({key:k,label:getMatLabel(k),iLen:getILen(k)||0,cat:(S.matCfg[k].cat)||'main'});}});
  // Фильтр: показываем только WT-материалы + те что есть на складе (остаток > 0)
  // WT-материалы всегда показываем (привязаны к виду работ)
  const _matsToShow=_allActiveMats.filter(m=>{
    if(_wtKeySet.has(m.key))return true; // привязанный к виду работ — всегда
    const stock=rem(m.key,ui.bid); // остаток по корпусу
    const stockAll=rem(m.key);     // остаток всего
    return stockAll>0;             // только если есть на складе

  // Group by cat
  const _mMain=_matsToShow.filter(m=>(m.cat||'main')==='main');

  const _allMatOpts=(function(){

    var opts='<option value="">— выбрать —</option>';
    // На складе первыми
    var stockMats=MATS.filter(m=>warehouseKeys.has(m.key));
    var customStock=Object.entries(S.matCfg||{}).filter(([k,v])=>warehouseKeys.has(k)&&!MATS.find(m=>m.key===k));
    if(stockMats.length||customStock.length){
      opts+='<optgroup label="✓ На складе">';

        opts+='<option value="'+m.key+'">'+esc(getMatLabel(m.key))+(iL>0?' '+toDisp(iL):'')+rmStr+'</option>';

    }

  })();
  window._allMatOptsCache=_allMatOpts;

  // Строим строки материалов как DROPDOWN
  function _miRowDp(m,v,cat){
    var qty=v&&typeof v==='object'?(v.qty||''):(v||'');
    var sz=v&&typeof v==='object'?(v.size||''):'';

    if(qty&&iLen>0&&!sz){qtyVal=Math.round(parseFloat(qty)*iLen/1000*100)/100||qty;}
    var stock=rem(m.key);

    return '<div class="mi-row" data-mkey="'+m.key+'">'

  }

  // Начальные строки: WT-материалы + склад
  var _initRows=[..._mMain.map(m=>({m,cat:'main'})),..._mCon.map(m=>({m,cat:'consumable'}))];

  showModal(`\x3cdiv class="sheet">

        \x3c/div>

        ${wts.length<=3

function _pickEntPhoto(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.multiple=true;
  inp.onchange=function(){
    var files=Array.from(inp.files||[]);
    if(!files.length)return;
    var existing=[];
    try{existing=JSON.parse(document.getElementById('ent-photos')?.value||'[]');}catch(e){}
    var preview=document.getElementById('ent-photo-preview');
    var pending=files.length;
    files.forEach(function(f){
      var r=new FileReader();
      r.onload=function(e){
        existing.push(e.target.result);
        var img=document.createElement('img');
        img.src=e.target.result;
        img.style.cssText='width:64px;height:64px;object-fit:cover;border-radius:8px';
        if(preview)preview.appendChild(img);
        pending--;
        if(pending===0){
          var ph=document.getElementById('ent-photos');
          if(ph)ph.value=JSON.stringify(existing);
        }
      };
      r.readAsDataURL(f);
    });
  };
  inp.click();
}

function _wmRowHtml(m,i){
  const inpS='padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none';
  const warehouseKeys=new Set((S.wlog||[]).filter(r=>r.qty>0).map(r=>r.key));
  const stockMats=MATS.filter(x=>warehouseKeys.has(x.key));
  const customStockMats=Object.entries(S.matCfg||{}).filter(function(e){return warehouseKeys.has(e[0])&&!MATS.find(function(x){return x.key===e[0];});}).map(function(e){return {key:e[0]};});
  const otherMats=MATS.filter(function(x){return !warehouseKeys.has(x.key);});
  var opts='<option value="">— выбрать —</option>';
  if(stockMats.length||customStockMats.length){
    opts+='<optgroup label="✓ На складе">';
    stockMats.concat(customStockMats).forEach(function(x){
      var lbl=getMatLabel(x.key);
      var iL=getILen(x.key);
      var rem2=rem(x.key);
      opts+='<option value="'+x.key+'"'+(m.key===x.key?' selected':'')+'>'+lbl+(iL>0?' '+toDisp(iL):'')+(rem2>0?' ['+rem2+']':'')+' ✓</option>';
    });
    opts+='</optgroup>';
  }

  var iL=getILen(m.key);
  return '<div class="wm-row">'
    +'<select style="'+inpS+';flex:1;min-width:0" data-i="'+i+'" data-f="key" onchange="_wmSelChange(this)">'
    +opts
    +'</select>'
    +(iL>0?'<span class="wm-sz-tag">'+toDisp(iL)+'</span>':'')
    +'<input type="number" class="mi-qty" placeholder="кол" inputmode="numeric" value="'+(m.qty||'')+'" style="width:50px" data-i="'+i+'" data-f="qty">'
    +'<button class="wm-del-btn" onclick="_wmDel('+i+')" title="Удалить">\u2715</button>'
    +'</div>';
}

function _wmSelChange(sel){
  var i=parseInt(sel.dataset.i);
  var key=sel.value;
  if(window._wtMats&&window._wtMats[i]){
    window._wtMats[i].key=key;
    window._wtMats[i].label=getMatLabel(key);
    window._wtMats[i].iLen=getILen(key)||0;
  }
  var row=sel.closest('.wm-row');
  if(row){
    var tag=row.querySelector('.wm-sz-tag');
    var iL=getILen(key);
    if(iL>0){
      if(!tag){tag=document.createElement('span');tag.className='wm-sz-tag';sel.after(tag);}
      tag.textContent=toDisp(iL);
    } else if(tag){tag.remove();}
  }
}

function _wmDel(i){

function exportData(){
  const blob=new Blob([JSON.stringify({app:'Строитель.ПРО',ver:VER,schema:SCHEMA,at:new Date().toISOString(),...S},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const _d=new Date();const _fn='СтроительPRO-'+String(_d.getDate()).padStart(2,'0')+'.'+String(_d.getMonth()+1).padStart(2,'0')+'.'+String(_d.getFullYear()).slice(2);
  if(typeof _track==='function'){var _s=(S.entries||[]).length;_track('💾 Экспорт','записей: '+_s);}
  a.href=url;a.download=_fn+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  S.lastExportReminder=today();persist();toast('📤 Файл сохранён');
}
function importData(){
  const inp=document.createElement("input");
  inp.type="file";inp.accept=".json";inp.style.display="none";
  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      if(!d.projects&&!d.entries&&!d.wlog){toast("⚠ Неверный формат");return;}
      undoStack.push(JSON.stringify({S:JSON.parse(JSON.stringify(S)),ui:JSON.parse(JSON.stringify(ui))}));
      const newS=migrate(d);
      localStorage.setItem(KEY,JSON.stringify(newS));
      S=newS;ui=mkUi();
      if(S.projects.length)ui.pid=S.projects[0].id;
      const bs=getBldgs(ui.pid);if(bs.length)ui.bid=bs[0].id;
      render();toast("📥 Загружено: "+S.entries.length+" записей");
    }catch(ex){toast("⚠ Ошибка: "+ex.message);}}
    rd.readAsText(f);
  };
  document.body.appendChild(inp);
  setTimeout(()=>inp.click(),100);
  setTimeout(()=>{if(document.body.contains(inp))document.body.removeChild(inp);},10000);
}

function showOnboard(){
  try{if(localStorage.getItem('bpro_skip_onboard')==='1')return;}catch(e){}
  const ob=document.createElement('div');ob.id='onboard';ob.className='onboard';
  document.body.appendChild(ob);renderOb();
}
function renderOb(){
  const ob=document.getElementById('onboard');if(!ob)return;
  const s=OB_STEPS[obStep];const last=obStep===OB_STEPS.length-1;
  ob.innerHTML=`<div class="ob-icon">${s.icon}</div>
    <div class="ob-title">${s.title}</div>
    <div class="ob-sub">${s.sub}</div>
    <div class="ob-dots">${OB_STEPS.map((_,i)=>`<div class="ob-dot${i===obStep?' on':''}"></div>`).join('')}</div>
    <button class="btn btn-gold" style="width:100%;max-width:280px" onclick="nextOb()">${last?'Начать →':'Далее →'}</button>
    ${last?`<button class="ob-demo-btn" onclick="loadDemo()">👁 Посмотреть как работает</button>`:''}
    ${last?`<button onclick="skipOnboard()" style="margin-top:10px;background:none;border:none;color:var(--text-dim);font-size:13px;cursor:pointer;padding:4px">Не показывать больше</button>`:''}`;
}
function nextOb(){
  obStep++;
  if(obStep>=OB_STEPS.length){
    obStep=0;
    document.getElementById('onboard')?.remove();
    render();
    return;
  }
  renderOb();
}
function skipOnboard(){
  try{localStorage.setItem('bpro_skip_onboard','1');}catch(e){}

  render();
}
