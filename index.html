  <meta name="theme-color" content="#0c0c0a"/>
  <title>СТРОИТЕЛЬ.ПРО v2.3</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0c0c0a;color:#e8dcc8;line-height:1.4}
    .container{max-width:600px;margin:0 auto;padding:16px}
    .card{background:#181816;border:1px solid #2a2a24;border-radius:16px;padding:16px;margin-bottom:12px}
    .btn{background:#e8a020;color:#0c0c0a;border:none;padding:10px 20px;border-radius:40px;font-weight:700;cursor:pointer}
    .btn-outline{background:transparent;border:1px solid #e8a020;color:#e8a020}
    .flex{display:flex;gap:8px;flex-wrap:wrap}
    .text-gold{color:#e8a020}
    .text-muted{color:#706858;font-size:12px}
    .text-green{color:#4caf74}
    .text-red{color:#e05050}
    .mt-2{margin-top:8px}
    .mb-2{margin-bottom:8px}
    .text-center{text-align:center}
  </style>
</head>
<body>
<div id="app" class="container"></div>
<script>
// ========== ТРЕКИНГ ==========
function track(event, value = null) {
  try {
    let log = JSON.parse(localStorage.getItem('track') || '[]');
    log.push({ e: event, v: value, t: Date.now() });
    if (log.length > 500) log.shift();
    localStorage.setItem('track', JSON.stringify(log));
  } catch(e) {}
}

// ========== STATE ==========
let S = {
  entries: [],
  wlog: [],
  goals: [],
  notes: [],
  buildings: [{ id: 'b1', name: 'ПК 1 этаж', totalArea: 0, workTypes: [{ id: 'wt1', name: 'Каркас Clip-in', price: 350, unit: 'м²', color: '#e8a020', targetArea: 0 }] }],
  projects: [{ id: 'p1', name: 'Госпиталь' }],
  matCfg: {},
  dimUnit: 'cm',
  theme: 'dark',
  lastNoStock: true,
  openCount: 0
};

let ui = { tab: 'journal', pid: 'p1', bid: 'b1', exp: null, sort: 'date_desc', showHidden: false };

// ========== HELPERS ==========
const today = () => new Date().toISOString().slice(0,10);
const uid = () => String(Date.now()) + String(Math.floor(Math.random()*9999));
const fmtRub = n => Number(n||0).toLocaleString('ru') + ' ₽';
const esc = s => String(s||'').replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
const getBldgs = () => S.buildings;
const getEnts = () => S.entries.filter(e => e.buildingId === ui.bid);
const entEarn = e => (S.buildings.find(b=>b.id===e.buildingId)?.workTypes.find(w=>w.id===e.workTypeId)?.price||0) * e.volume;
const totalIn = k => S.wlog.filter(r=>r.key===k).reduce((s,r)=>s+r.qty,0);
const totalOut = k => S.entries.filter(e=>!e.noStock).reduce((s,e)=>s+(Number(e.materials?.[k]?.qty)||0),0);
const rem = k => totalIn(k) - totalOut(k);
const getMatLabel = k => S.matCfg[k]?.label || k;
const isProActive = () => false; // пока все функции бесплатны, заглушка

function persist() {
  try { localStorage.setItem('stroipro', JSON.stringify(S)); track('persist'); } catch(e) {}
}

function load() {
  try {
    const raw = localStorage.getItem('stroipro');
    if (raw) S = JSON.parse(raw);
  } catch(e) {}
  if (!S.entries) S.entries = [];
  if (!S.wlog) S.wlog = [];
  if (!S.goals) S.goals = [];
  if (!S.notes) S.notes = [];
  if (!S.buildings) S.buildings = [];
  if (!S.projects) S.projects = [{ id: 'p1', name: 'Госпиталь' }];
  if (!S.matCfg) S.matCfg = {};
  if (!S.dimUnit) S.dimUnit = 'cm';
  if (S.openCount === undefined) S.openCount = 0;
  S.openCount++;
  track('app_open', S.openCount);
}

function render() {
  const app = document.getElementById('app');
  if (!app) return;
  
  const entries = getEnts();
  const hiddenCount = entries.filter(e=>e.hidden).length;
  const visibleEntries = entries.filter(e=>!e.hidden || ui.showHidden);
  
  app.innerHTML = `
    <div class="flex" style="justify-content:space-between; align-items:center; margin-bottom:16px">
      <h2 style="color:#e8a020">СТРОИТЕЛЬ.ПРО</h2>
      <div class="flex">
        <button class="btn-outline" style="padding:6px 12px" onclick="track('tab_click', 'settings'); ui.tab='settings'; render()">⚙️</button>
        <button class="btn-outline" style="padding:6px 12px" onclick="track('toggle_theme'); S.theme=S.theme==='dark'?'light':'dark'; render()">${S.theme==='dark'?'☀️':'🌙'}</button>
      </div>
    </div>
    
    <div class="flex" style="margin-bottom:16px; gap:4px; flex-wrap:wrap">
      <button class="btn-outline ${ui.tab==='journal'?'btn':''}" style="padding:8px 12px" onclick="track('tab_click', 'journal'); ui.tab='journal'; render()">📋 Журнал</button>
      <button class="btn-outline ${ui.tab==='warehouse'?'btn':''}" style="padding:8px 12px" onclick="track('tab_click', 'warehouse'); ui.tab='warehouse'; render()">🏗 Склад</button>
      <button class="btn-outline ${ui.tab==='goals'?'btn':''}" style="padding:8px 12px" onclick="track('tab_click', 'goals'); ui.tab='goals'; render()">✅ Задачи</button>
      <button class="btn-outline ${ui.tab==='earn'?'btn':''}" style="padding:8px 12px" onclick="track('tab_click', 'earn'); ui.tab='earn'; render()">💰 Заработок</button>
      <button class="btn-outline ${ui.tab==='stats'?'btn':''}" style="padding:8px 12px" onclick="track('tab_click', 'stats'); ui.tab='stats'; render()">📊 Статы</button>
    </div>
    
    ${ui.tab === 'journal' ? `
      <div class="flex" style="justify-content:space-between; margin-bottom:12px">
        <span>${visibleEntries.length} записей</span>
        <button class="btn-outline" style="padding:4px 12px" onclick="track('sort'); const s=['date_desc','date_asc','vol_desc','vol_asc','earn_desc']; const i=s.indexOf(ui.sort||'date_desc'); ui.sort=s[(i+1)%s.length]; render()">↕️ ${ui.sort||'date_desc'}</button>
      </div>
      ${hiddenCount > 0 ? `<button class="btn-outline" style="margin-bottom:12px; padding:4px 12px" onclick="track('toggle_hidden'); ui.showHidden=!ui.showHidden; render()">${ui.showHidden ? '▲ Скрыть' : '👁 Скрытые ('+hiddenCount+')'}</button>` : ''}
      ${visibleEntries.map(e => `
        <div class="card" style="border-left:4px solid ${S.buildings.find(b=>b.id===e.buildingId)?.workTypes.find(w=>w.id===e.workTypeId)?.color || '#e8a020'}">
          <div onclick="track('entry_expand', '${e.id}'); ui.exp = ui.exp === '${e.id}' ? null : '${e.id}'; render()">
            <div class="flex" style="justify-content:space-between">
              <div><strong>${esc(e.workTypeId)}</strong><br><span class="text-muted">${e.dateFrom} → ${e.dateTo}</span></div>
              <div><span class="text-gold">${e.volume} м²</span><br>${fmtRub(entEarn(e))}</div>
            </div>
          </div>
          ${ui.exp === String(e.id) ? `
            <div class="mt-2">
              <div class="text-muted">📝 ${esc(e.notes || '—')}</div>
              ${e.materials ? `<div class="text-muted mt-2">📦 ${Object.entries(e.materials).map(([k,v])=>`${getMatLabel(k)}: ${v?.qty || v}${v?.size ? ` (${v.size}мм)` : ''}`).join(' · ')}</div>` : ''}
              <div class="flex mt-2">
                <button class="btn-outline" style="padding:4px 10px; font-size:12px" onclick="track('edit_entry', '${e.id}'); alert('Редактирование в разработке')">✏ Ред.</button>
                <button class="btn-outline" style="padding:4px 10px; font-size:12px" onclick="track('hide_entry', '${e.id}'); e.hidden=true; persist(); render()">🙈 Скрыть</button>
                <button class="btn-outline" style="padding:4px 10px; font-size:12px; border-color:#e05050; color:#e05050" onclick="track('delete_entry', '${e.id}'); if(confirm('Удалить?')){ S.entries = S.entries.filter(x=>x.id!==e.id); persist(); render() }">🗑 Уд.</button>
              </div>
            </div>
          ` : ''}
        </div>
      `).join('')}
      <button class="btn" style="width:100%; margin-top:8px" onclick="track('add_entry'); const v=prompt('Объём м²:'); if(v){ S.entries.push({ id:uid(), buildingId:ui.bid, workTypeId:'wt1', volume:parseFloat(v), dateFrom:today(), dateTo:today(), notes:'', materials:{}, noStock:false, hidden:false }); persist(); render(); track('entry_added', v); }">+ Добавить работу</button>
    ` : ''}
    
    ${ui.tab === 'warehouse' ? `
      <div class="card"><div class="text-muted">📦 Приходы: ${S.wlog.length}</div></div>
      <button class="btn" style="width:100%" onclick="track('add_stock'); const m=prompt('Материал:'); const q=prompt('Кол-во шт:'); if(m&&q){ S.wlog.push({ id:uid(), key:m, qty:parseInt(q), date:today() }); persist(); render(); track('stock_added', m); }">+ Добавить приход</button>
    ` : ''}
    
    ${ui.tab === 'goals' ? `
      ${S.goals.filter(g=>!g.done).map(g => `
        <div class="card flex" style="justify-content:space-between; align-items:center">
          <span>${esc(g.text)} <span class="text-muted">${g.date}</span></span>
          <button class="btn-outline" style="padding:4px 12px" onclick="track('goal_done', '${g.id}'); g.done=true; persist(); render()">✓</button>
        </div>
      `).join('')}
      <button class="btn" style="width:100%" onclick="track('add_goal'); const t=prompt('Задача:'); if(t){ S.goals.push({ id:uid(), text:t, date:today(), done:false }); persist(); render(); }">+ Добавить задачу</button>
    ` : ''}
    
    ${ui.tab === 'earn' ? `
      <div class="card text-center">
        <div class="text-gold" style="font-size:32px; font-weight:800">${fmtRub(S.entries.reduce((s,e)=>s+entEarn(e),0))}</div>
        <div class="text-muted">Общий заработок</div>
      </div>
    ` : ''}
    
    ${ui.tab === 'stats' ? `
      <div class="card">
        <div class="text-gold" style="font-weight:700">📊 Аналитика (сбор с ${new Date(S.openCount ? S.openCount*1000 : Date.now() - 7*86400000).toISOString().slice(0,10)})</div>
        <div class="mt-2">📱 Открытий приложения: ${S.openCount || 1}</div>
        <div>📋 Записей в журнале: ${S.entries.length}</div>
        <div>🏗 Приходов на склад: ${S.wlog.length}</div>
        <div>✅ Задач: ${S.goals.length}</div>
        <div class="text-muted mt-2">Трекер активен. Данные в localStorage → track</div>
      </div>
    ` : ''}
  `;
}

load();
render();
track('app_loaded');
</script>
</body>
</html>
