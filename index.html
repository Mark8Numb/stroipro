function _collectEntryForm(){
  const mats={};
  document.querySelectorAll('.mi-row[data-mkey]').forEach(function(row){
    const k=row.dataset.mkey;if(!k||k.startsWith('_new_'))return;
    const q=document.getElementById('m_'+k)?.value||'';
    const sz=document.getElementById('ms_'+k)?.value||'';
    if(q)mats[k]={qty:q,size:sz};
  });
  return{dateFrom:document.getElementById("ef")?.value,dateTo:document.getElementById("et")?.value,workTypeId:document.getElementById("ew")?.value,volume:document.getElementById("ev")?.value,notes:document.getElementById("en")?.value,worker:document.getElementById("eworker")?.value,materials:mats};
}
function sheetEntry(prefill){
  const b=S.buildings.find(x=>x.id===ui.bid);if(!b)return;
  // Все виды работ: сначала текущий корпус, потом с других корпусов
  const _bWts=b.workTypes||DEF_WTS;
  const _otherWts=[];
  S.buildings.filter(x=>x.id!==ui.bid).forEach(ob=>{
    (ob.workTypes||[]).forEach(owt=>{
      if(!_bWts.find(w=>w.name===owt.name))
        _otherWts.push({...owt,_fromBld:ob.name});
    });
  });
  const wts=[..._bWts,..._otherWts];
  const f=prefill||{};const td=today();
  const isEdit=!!f._editId;const defNoStock=isEdit?f.noStock:(S.lastNoStock!=null?S.lastNoStock:false);
  const inpSt='width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none';
  // Show only materials bound to the selected work type
  const _selWt=wts.find(w=>w.id===(f.workTypeId||wts[0]?.id))||wts[0];
  const _wtMatKeys=_selWt&&_selWt.mats?Object.keys(_selWt.mats):[];
  // Build display list: WT mats + ALL active warehouse materials
  const _wtKeySet=new Set(_wtMatKeys);
  const _allActiveMats=[];
  // First: WT-bound materials
  _wtMatKeys.forEach(k=>{const known=MATS.find(m=>m.key===k);_allActiveMats.push(known||{key:k,label:getMatLabel(k),iLen:getILen(k)||0,cat:(S.matCfg&&S.matCfg[k]&&S.matCfg[k].cat)||'main'});});
  // Then: all other active materials (have wlog receipts = were added to warehouse)
  const _wlogKeys=new Set((S.wlog||[]).filter(r=>r.qty>0).map(r=>r.key));
  _wlogKeys.forEach(k=>{if(!_wtKeySet.has(k)){const known=MATS.find(m=>m.key===k);_allActiveMats.push(known||{key:k,label:getMatLabel(k),iLen:getILen(k)||0,cat:(S.matCfg&&S.matCfg[k]&&S.matCfg[k].cat)||'main'});}});
  // Also custom matCfg materials
  Object.keys(S.matCfg||{}).forEach(k=>{if(!_wtKeySet.has(k)&&!_wlogKeys.has(k)){_allActiveMats.push({key:k,label:getMatLabel(k),iLen:getILen(k)||0,cat:(S.matCfg[k].cat)||'main'});}});
  // Фильтр: показываем только WT-материалы + те что есть на складе (остаток > 0)
  // WT-материалы всегда показываем (привязаны к виду работ)
  const _matsToShow=_allActiveMats.filter(m=>{
    if(_wtKeySet.has(m.key))return true; // привязанный к виду работ — всегда
    const stock=rem(m.key,ui.bid); // остаток по корпусу
    const stockAll=rem(m.key);     // остаток всего
    return stockAll>0;             // только если есть на складе
  });
  // Group by cat
  const _mMain=_matsToShow.filter(m=>(m.cat||'main')==='main');
  const _mCon=_matsToShow.filter(m=>m.cat==='consumable');
  const _mGrouped=[..._mMain,..._mCon];
  // Все доступные материалы для выпадающих списков
  const _allMatOpts=(function(){
    var warehouseKeys=new Set((S.wlog||[]).filter(r=>r.qty>0).map(r=>r.key));
    var opts='<option value="">— выбрать —</option>';
    // На складе первыми
    var stockMats=MATS.filter(m=>warehouseKeys.has(m.key));
    var customStock=Object.entries(S.matCfg||{}).filter(([k,v])=>warehouseKeys.has(k)&&!MATS.find(m=>m.key===k));
    if(stockMats.length||customStock.length){
      opts+='<optgroup label="✓ На складе">';
      [...stockMats,...customStock.map(([k,v])=>({key:k}))].forEach(m=>{
        var iL=getILen(m.key);var r2=rem(m.key);
        var rmStr=r2>0?(iL>0?' ['+fmtLen(r2,iL)+']':' ['+r2+' шт]'):'';
        opts+='<option value="'+m.key+'">'+esc(getMatLabel(m.key))+(iL>0?' '+toDisp(iL):'')+rmStr+'</option>';
      });
      opts+='</optgroup>';
    }
    return opts;
  })();
  window._allMatOptsCache=_allMatOpts;

  // Строим строки материалов как DROPDOWN
  function _miRowDp(m,v,cat){
    var qty=v&&typeof v==='object'?(v.qty||''):(v||'');
    var sz=v&&typeof v==='object'?(v.size||''):'';
    var iLen=getILen(m.key);
    // Показываем в метрах если iLen задан
    var _unit=getMatUnit(m.key);var placeholderQty=(_unit&&_unit!=='шт')?_unit:(iLen>0?'пог.м':'шт');
    var qtyVal=qty;
    // Если qty в штуках и iLen задан — показываем как метры
    if(qty&&iLen>0&&!sz){qtyVal=Math.round(parseFloat(qty)*iLen/1000*100)/100||qty;}
    var stock=rem(m.key);
    var stockStr=stock>0?(iLen>0?' / склад: '+fmtLen(stock,iLen):' / склад: '+stock+' шт'):'';
    return '<div class="mi-row" data-mkey="'+m.key+'">'
      +'<select class="mi-sel" onchange="_miSelChg(this)" data-key="'+m.key+'" data-cat="'+cat+'">'
      +_allMatOpts.replace('value="'+m.key+'"','value="'+m.key+'" selected')

      +'<div class="mi-flds" style="min-width:0">'
      +'<input type="number" id="m_'+m.key+'" value="'+esc(String(qty))+'" placeholder="'+placeholderQty+'" inputmode="decimal" class="mi-qty" data-mkey="'+m.key+'" oninput="_miQtyInp(this,this.dataset.mkey)">'
      +(cat==='main'?'<span class="mi-sz-lbl" id="mrem_'+m.key+'" style="font-size:11px;color:var(--text-dim);white-space:nowrap">'+stockStr+'</span>':'')
      +'<input type="hidden" id="ms_'+m.key+'" value="'+esc(String(sz))+'">'
      +'</div>'
      +'<button type="button" class="wm-del-btn" onclick="_miDelRow(this)" style="flex-shrink:0">✕</button>'
      +'</div>';
  }

  // Начальные строки: WT-материалы + склад
  var _initRows=[..._mMain.map(m=>({m,cat:'main'})),..._mCon.map(m=>({m,cat:'consumable'}))];
  var _mainRows=_mMain.map(m=>{var v=f.materials?.[m.key];return _miRowDp(m,v,'main');});
  var _conRows=_mCon.map(m=>{var v=f.materials?.[m.key];return _miRowDp(m,v,'consumable');});
  
  var matRows=(_mMain.length?'<div class="mi-hdr">Основные</div>':'')+_mainRows.join('')
    +(_mCon.length?'<div class="mi-hdr">Расходники</div>':'')+_conRows.join('');

  const _matCount=_mGrouped.length;
  const _matShowBtn=_matCount>3?`\x3cbutton type="button" class="btn-ghost" style="width:100%;margin-top:4px;font-size:12px" onclick="_toggleMatList(this)">▶ Показать все материалы (${_matCount})\x3c/button>`:'';

  showModal(`\x3cdiv class="sheet">
    \x3cdiv class="shdl">\x3c/div>
    \x3cdiv class="shtitle">${isEdit?'Редактировать':'Новая запись'} — ${esc(b.name)}\x3c/div>
    \x3cdiv class="shbody">
      \x3cinput type="hidden" id="_editId" value="${f._editId||''}">
      \x3cdiv class="frow">
        \x3cdiv class="fld">\x3cdiv class="flbl">С даты\x3c/div>\x3cinput type="date" id="ef" value="${f.dateFrom||td}">\x3c/div>
        \x3cdiv class="fld">\x3cdiv class="flbl">По дату\x3c/div>\x3cinput type="date" id="et" value="${f.dateTo||f.dateFrom||td}">\x3c/div>
      \x3c/div>
      \x3cdiv class="fld">
        \x3cdiv class="fld-hdr">\x3cdiv class="flbl" style="margin:0">Вид работ\x3c/div>
          \x3cbutton style="background:var(--gold-l);border:1px solid var(--gold-b);color:var(--gold);border-radius:7px;padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)" data-a="add-wt-inline">+ Вид работ\x3c/button>
        \x3c/div>
        \x3cinput type="hidden" id="ew" value="${(f.workTypeId||wts[0]?.id||'')}">
        ${wts.length<=3
          ? `\x3cselect id="ew_native" onchange="document.getElementById('ew').value=this.value;document.getElementById('ew').dispatchEvent(new Event('change'));_matCalcUpdate&&_matCalcUpdate()" style="width:100%;padding:10px;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:14px">${wts.map(wt=>`\x3coption value="${wt.id}"${(f.workTypeId||wts[0].id)===wt.id?' selected':''}>${esc(wt.name)} (${wt.price}₽/${wt.unit})${wt._fromBld?' · '+esc(wt._fromBld):''}\x3c/option>`).join('')}\x3c/select>`
          : `\x3cdiv class="dp-wrap" id="dp_wt" onclick="_dpOpen('dp_wt')">
              \x3cdiv class="dp-sel">\x3cspan class="dp-sel-text">${esc((wts.find(w=>w.id===(f.workTypeId||wts[0]?.id))||wts[0])?.name||'')} (${(wts.find(w=>w.id===(f.workTypeId||wts[0]?.id))||wts[0])?.price||0}₽)\x3c/span>\x3c/div>
              \x3cdiv class="dp-list">${wts.map(wt=>`\x3cdiv class="dp-item${(f.workTypeId||wts[0]?.id)===wt.id?' active':''}" data-val="${wt.id}" data-wrap="dp_wt" data-inp="ew" onclick="_dpSelectEl(this);_matCalcUpdate&&_matCalcUpdate()">\x3cspan>${esc(wt.name)}\x3c/span>\x3cspan class="dp-sub">${wt.price}₽/${wt.unit}\x3c/span>\x3c/div>`).join('')}\x3c/div>
            \x3c/div>`
        }
      \x3c/div>
      \x3cdiv class="fld">
        \x3cdiv class="flbl">Объём\x3c/div>
        \x3cdiv style="display:flex;gap:8px;align-items:center">
          \x3cinput type="number" id="ev" placeholder="0" value="${f.volume||''}" inputmode="decimal" oninput="_matCalcUpdate()" style="${inpSt};flex:1">
          \x3cdiv id="eprev" style="font-size:14px;color:var(--green);font-weight:700;white-space:nowrap;min-width:80px">\x3c/div>
        \x3c/div>
      \x3c/div>
      \x3cdiv style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">\x3cspan class="flbl" style="margin:0">Материалы \x3csmall style="color:var(--muted)">(шт / м² / мм)\x3c/small>\x3c/span>\x3clabel style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer">\x3cinput type="checkbox" id="estock"${defNoStock?'':' checked'}>\x3cspan>📦 Списать со склада\x3c/span>\x3c/label>\x3c/div>
      \x3cdiv class="mi-grid" id="mi-grid-main">${matRows||''}\x3c/div>
      \x3cbutton type="button" class="btn-ghost" style="width:100%;font-size:12px;padding:6px;margin-top:4px" onclick="_miAddRow('main')">+ Добавить материал\x3c/button>

      ${_workersPickHTML(f)}
      \x3cdiv class="fld">\x3cdiv class="flbl">Примечание\x3c/div>
        \x3cbutton type="button" class="voice-btn" data-target="en" onclick="_voiceInput('en')" title="\u0413\u043e\u043b\u043e\u0441">\ud83c\udf99\x3c/button>\x3cinput type="text" id="en" placeholder="\u0447\u0442\u043e \u043d\u0435 \u0443\u0441\u043f\u0435\u043b... (\u0438\u043b\u0438 \u0433\u043e\u043b\u043e\u0441\u043e\u043c)" value="${esc(f.notes||'')}">
      \x3c/div>
      \x3cdiv class="fld">\x3cdiv class="flbl">⏱ Время на доделку \x3csmall style="color:var(--muted)">(если осталось что доделать)\x3c/small>\x3c/div>
        \x3cinput type="text" id="efix" placeholder="напр. 30 мин, 2 часа" value="${esc(f.fixEta||'')}">
      \x3c/div>
      \x3cdiv class="fld">\x3cdiv class="flbl">📷 Фото\x3c/div>
        \x3cdiv id="ent-photo-preview" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px">${_entPhotoThumbsHtml(f.photos||[])}\x3c/div>
        \x3cbutton type="button" class="btn-ghost" style="width:100%;font-size:12px;padding:8px" onclick="_pickEntPhoto()">📷 Добавить фото\x3c/button>
        \x3cinput type="hidden" id="ent-photos" value='${JSON.stringify(f.photos||[])}'>
      \x3c/div>
    \x3cdiv class="shfoot">
      \x3cbutton class="btn btn-ghost" data-a="close-modal">Отмена\x3c/button>
      \x3cbutton class="btn btn-gold" data-a="save-entry">${isEdit?'✓ Сохранить':'+ Добавить'}\x3c/button>
    \x3c/div>
  \x3c/div>`);
  const vol=document.getElementById('ev'),wsel=document.getElementById('ew'),prev=document.getElementById('eprev');
  const upd=()=>{const v=parseFloat(vol?.value)||0;const wt=wts.find(w=>w.id===wsel?.value);if(v>0&&wt)prev.textContent='= '+fmtRub(v*wt.price);else prev.textContent='';};

function _entPhotoThumbsHtml(arr){
  return (arr||[]).map(function(src,i){

  }).join('');

function _renderEntPhotoPreview(arr){var preview=document.getElementById('ent-photo-preview');if(preview)preview.innerHTML=_entPhotoThumbsHtml(arr);}
function _removeEntPhoto(idx){
  var existing=[];try{existing=JSON.parse(document.getElementById('ent-photos')?.value||'[]');}catch(e){}
  existing.splice(idx,1);
  var ph=document.getElementById('ent-photos');if(ph)ph.value=JSON.stringify(existing);
  _renderEntPhotoPreview(existing);
}
function _pickEntPhoto(){
  var existing=[];
  try{existing=JSON.parse(document.getElementById('ent-photos')?.value||'[]');}catch(e){}
  _showCamDialog(function(mode){
    if(!mode)return; // отмена
    var inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';inp.multiple=(mode==='gallery');
    if(mode==='camera')inp.capture='environment';
    inp.onchange=function(){
      var files=Array.from(inp.files||[]);if(!files.length)return;
      var pending=files.length;
      files.forEach(function(f){
        _compressImg(f,function(dataUrl){
          if(dataUrl)existing.push(dataUrl);pending--;
          if(pending===0){
            var ph=document.getElementById('ent-photos');
            if(ph)ph.value=JSON.stringify(existing);
            _renderEntPhotoPreview(existing);
          }
        });
      });
    };
    inp.click();
  });
}

function _showCamDialog(cb){
  // Мини-диалог поверх любого контента — НЕ ломает форму
  var d=document.createElement('div');
  d.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;animation:fadein .15s';
  d.innerHTML=`<div style="background:var(--bg2);border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:20px 16px 32px;box-shadow:0 -8px 32px rgba(0,0,0,.5)">
    <div style="width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px"></div>
    <div style="font-size:15px;font-weight:700;color:var(--text);text-align:center;margin-bottom:16px">Добавить фото</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button id="cd-cam" style="padding:14px;background:var(--gold-l);border:1.5px solid var(--gold-b);color:var(--gold);border-radius:12px;font-size:15px;font-weight:700;font-family:var(--font);cursor:pointer">📷 Сфотографировать</button>
      <button id="cd-gal" style="padding:14px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:12px;font-size:15px;font-family:var(--font);cursor:pointer">🖼 Из галереи</button>
      <button id="cd-cancel" style="padding:12px;background:none;border:none;color:var(--muted);font-size:13px;font-family:var(--font);cursor:pointer">Отмена</button>
    </div>
  </div>`;
  document.body.appendChild(d);
  function close(mode){document.body.removeChild(d);cb(mode);}
  d.querySelector('#cd-cam').onclick=function(){close('camera');};
  d.querySelector('#cd-gal').onclick=function(){close('gallery');};
  d.querySelector('#cd-cancel').onclick=function(){close(null);};
  d.onclick=function(e){if(e.target===d)close(null);};
}

function _wmRowHtml(m,i){
  const inpS='padding:6px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:12px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none';
  const warehouseKeys=new Set((S.wlog||[]).filter(r=>r.qty>0).map(r=>r.key));
  const stockMats=MATS.filter(x=>warehouseKeys.has(x.key));
  const customStockMats=Object.entries(S.matCfg||{}).filter(function(e){return warehouseKeys.has(e[0])&&!MATS.find(function(x){return x.key===e[0];});}).map(function(e){return {key:e[0]};});
  const otherMats=MATS.filter(function(x){return !warehouseKeys.has(x.key);});
  var opts='<option value="">— выбрать —</option>';
  if(stockMats.length||customStockMats.length){
    opts+='<optgroup label="✓ На складе">';
    stockMats.concat(customStockMats).forEach(function(x){
      var lbl=getMatLabel(x.key);
      var iL=getILen(x.key);
      var rem2=rem(x.key);
      opts+='<option value="'+x.key+'"'+(m.key===x.key?' selected':'')+'>'+lbl+(iL>0?' '+toDisp(iL):'')+(rem2>0?' ['+rem2+']':'')+' ✓</option>';
    });
    opts+='</optgroup>';
  }

  var iL=getILen(m.key);
  return '<div class="wm-row">'
    +'<select style="'+inpS+';flex:1;min-width:0" data-i="'+i+'" data-f="key" onchange="_wmSelChange(this)">'
    +opts
    +'</select>'
    +(iL>0?'<span class="wm-sz-tag">'+toDisp(iL)+'</span>':'')
    +'<input type="number" class="mi-qty" placeholder="кол" inputmode="numeric" value="'+(m.qty||'')+'" style="width:50px" data-i="'+i+'" data-f="qty">'
    +'<button class="wm-del-btn" onclick="_wmDel('+i+')" title="Удалить">\u2715</button>'
    +'</div>';
}

function _wmSelChange(sel){
  var i=parseInt(sel.dataset.i);
  var key=sel.value;
  if(window._wtMats&&window._wtMats[i]){
    window._wtMats[i].key=key;
    window._wtMats[i].label=getMatLabel(key);
    window._wtMats[i].iLen=getILen(key)||0;
  }
  var row=sel.closest('.wm-row');
  if(row){
    var tag=row.querySelector('.wm-sz-tag');
    var iL=getILen(key);
    if(iL>0){
      if(!tag){tag=document.createElement('span');tag.className='wm-sz-tag';sel.after(tag);}
      tag.textContent=toDisp(iL);
    } else if(tag){tag.remove();}
  }
}

function _wmDel(i){
  if(window._wtMats)window._wtMats.splice(i,1);
  const el=document.getElementById('wm-rows');
  if(el)el.innerHTML=(window._wtMats||[]).map((m,j)=>_wmRowHtml(m,j)).join('');
  _wmWire();
}

function _wmAdd(){
  if(!window._wtMats)window._wtMats=[];
  window._wtMats.push({key:'mat_'+Date.now(),label:'',iLen:0,qty:'',size:''});
  const el=document.getElementById('wm-rows');
  if(el)el.innerHTML=(window._wtMats||[]).map((m,j)=>_wmRowHtml(m,j)).join('');
  _wmWire();
  el?.lastElementChild?.querySelector('[data-f="label"]')?.focus();
}

function _wmWire(){
  document.querySelectorAll('#wm-rows [data-f]').forEach(inp=>{
    const ev=inp.tagName==='SELECT'?'change':'input';
    inp.addEventListener(ev,function(){
      const i=parseInt(inp.dataset.i);const f=inp.dataset.f;
      if(window._wtMats&&window._wtMats[i])window._wtMats[i][f]=inp.value;
    });
  });
}

function exportData(){
  const blob=new Blob([JSON.stringify({app:'Строитель.ПРО',ver:VER,schema:SCHEMA,at:new Date().toISOString(),...S},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  const _d=new Date();const _fn='СтроительPRO-'+String(_d.getDate()).padStart(2,'0')+'.'+String(_d.getMonth()+1).padStart(2,'0')+'.'+String(_d.getFullYear()).slice(2);
  if(typeof _track==='function'){var _s=(S.entries||[]).length;_track('💾 Экспорт','записей: '+_s);}
  a.href=url;a.download=_fn+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);

  S=JSON.parse(JSON.stringify(DEF_STATE));
  S.mode=mode||'deal';
  ui=mkUi();
  if(S.projects.length)ui.pid=S.projects[0].id;
  const bs=getBldgs(ui.pid);if(bs.length)ui.bid=bs[0].id;
  persist();document.getElementById('onboard')?.remove();render();
  toast('\ud83d\udc40 Демо загружено',2500);
}
function showOnboard(){
  try{if(localStorage.getItem('bpro_skip_onboard')==='1')return;}catch(e){}
  const ob=document.createElement('div');ob.id='onboard';ob.className='onboard';
  document.body.appendChild(ob);renderOb();
}
function renderOb(){
  const ob=document.getElementById('onboard');if(!ob)return;
  const s=OB_STEPS[obStep];const last=obStep===OB_STEPS.length-1;const first=obStep===0;
  ob.innerHTML=`
    <div class="ob-icon">${s.icon}</div>
    <div class="ob-title">${s.title}</div>
    <div class="ob-sub" style="${s.sub.includes('\\n')?'white-space:pre-line;text-align:left':''}">${s.sub}</div>
    <div class="ob-dots">${OB_STEPS.map((_,i)=>`<div class="ob-dot${i===obStep?' on':''}"></div>`).join('')}</div>
    <div class="ob-actions">
      <button class="btn btn-gold" style="width:100%;max-width:300px;padding:14px" onclick="nextOb()">${last?'Начать работу ✓':'Далее →'}</button>
      ${last?`<button class="ob-guide-btn" onclick="skipOnboard();sheetGuide()">📖 Открыть руководство</button>`:''}
      ${last?`<button class="ob-demo-btn" onclick="loadDemo()">👁 Посмотреть демо-данные</button>`:''}
      ${last?`<button class="ob-skip-btn" onclick="skipOnboard()">Не показывать снова</button>`:
        first?`<button class="ob-skip-btn" onclick="skipOnboard()">Пропустить</button>`:
        `<button class="ob-skip-btn" onclick="obStep--;renderOb()">← Назад</button>`}
    </div>`;
}
function nextOb(){
  obStep++;
  if(obStep>=OB_STEPS.length){
    obStep=0;
    document.getElementById('onboard')?.remove();
    render();
    return;
  }
  renderOb();
}
function skipOnboard(){
  try{localStorage.setItem('bpro_skip_onboard','1');}catch(e){}
  obStep=0;
  document.getElementById('onboard')?.remove();
  render();
}
