<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>СТРОИТЕЛЬ.ПРО v2.3</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0c0c0a;color:#e8dcc8;font-family:monospace;padding:16px}
    .stat{background:#1a1a17;border:1px solid #d4920a;border-radius:12px;padding:12px;margin-bottom:12px}
    .stat-title{color:#d4920a;font-weight:700;margin-bottom:8px}
    table{width:100%;border-collapse:collapse}
    td,th{padding:4px;border-bottom:1px solid #2a2a24;text-align:left}
    .btn{background:#d4920a;color:#0c0c0a;border:none;padding:8px 16px;border-radius:20px;font-weight:700;margin:8px 4px}
    .gold{color:#d4920a}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const KEY = 'bpro_v20';
const VER = 'v2.3';

// ========== ОСНОВНЫЕ ДАННЫЕ ==========
let S = {
  projects: [{id:'p1',name:'Госпиталь'}],
  buildings: [{id:'b1',projectId:'p1',name:'ПК 1 этаж',totalArea:257.2,workTypes:[]}],
  entries: [],
  wlog: [],
  goals: [],
  notes: [],
  matCfg: {},
  dimUnit: 'cm',
  theme: 'dark'
};

// ========== ТРЕКЕР ==========
function track(event, val) {
  try {
    let log = JSON.parse(localStorage.getItem('track_log') || '[]');
    log.push({ e: event, v: val || null, t: Date.now(), d: new Date().toISOString().slice(0,10) });
    if (log.length > 500) log.shift();
    localStorage.setItem('track_log', JSON.stringify(log));
  } catch(e) {}
}

// ========== СОХРАНЕНИЕ ==========
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(S)); } catch(e) {}
  track('save');
}

function load() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) S = JSON.parse(raw);
  } catch(e) {}
  if (!S.projects) S.projects = [{id:'p1',name:'Госпиталь'}];
  if (!S.buildings) S.buildings = [{id:'b1',projectId:'p1',name:'ПК 1 этаж',totalArea:257.2,workTypes:[]}];
  if (!S.entries) S.entries = [];
  if (!S.wlog) S.wlog = [];
  if (!S.goals) S.goals = [];
  if (!S.notes) S.notes = [];
  if (!S.matCfg) S.matCfg = {};
  track('load');
}

// ========== СТАТИСТИКА ИЗ ТРЕКЕРА ==========
function getStats() {
  const log = JSON.parse(localStorage.getItem('track_log') || '[]');
  const uniqueDays = [...new Set(log.map(l => l.d))].length;
  const events = {};
  log.forEach(l => { events[l.e] = (events[l.e] || 0) + 1; });
  const entriesAdded = log.filter(l => l.e === 'entry_added').length;
  const proClicks = log.filter(l => l.e === 'pro_click').length;
  const exports = log.filter(l => l.e === 'export_json').length;
  const imports = log.filter(l => l.e === 'import_json').length;
  const goalsAdded = log.filter(l => l.e === 'add_goal').length;
  const stockAdded = log.filter(l => l.e === 'stock_added').length;
  const firstOpen = log.length ? new Date(log[0].t).toLocaleDateString() : '—';
  const lastOpen = log.length ? new Date(log[log.length-1].t).toLocaleDateString() : '—';
  return { uniqueDays, events, entriesAdded, proClicks, exports, imports, goalsAdded, stockAdded, firstOpen, lastOpen, totalEvents: log.length };
}

// ========== РЕНДЕР СТАТИСТИКИ ==========
function renderStats() {
  const stats = getStats();
  const eventList = Object.entries(stats.events).sort((a,b) => b[1] - a[1]);
  return `
    <div class="stat">
      <div class="stat-title">📊 ОБЩАЯ СТАТИСТИКА</div>
      <table>
        <tr><td>Всего событий:</td><td><b class="gold">${stats.totalEvents}</b></td></tr>
        <tr><td>Уникальных дней:</td><td><b>${stats.uniqueDays}</b></td></tr>
        <tr><td>Первый запуск:</td><td>${stats.firstOpen}</td></tr>
        <tr><td>Последний запуск:</td><td>${stats.lastOpen}</td></tr>
        <tr><td>➕ Добавлено работ:</td><td><b class="gold">${stats.entriesAdded}</b></td></tr>
        <tr><td>➕ Добавлено задач:</td><td>${stats.goalsAdded}</td></tr>
        <tr><td>📦 Приходов на склад:</td><td>${stats.stockAdded}</td></tr>
        <tr><td>💎 Нажатий «Купить PRO»:</td><td><b>${stats.proClicks}</b></td></tr>
        <tr><td>📤 Экспортов JSON:</td><td>${stats.exports}</td></tr>
        <tr><td>📥 Импортов JSON:</td><td>${stats.imports}</td></tr>
      </table>
    </div>
    <div class="stat">
      <div class="stat-title">🔍 ДЕТАЛИЗАЦИЯ СОБЫТИЙ</div>
      <table>
        ${eventList.map(([name,count]) => `<tr><td>${name}</td><td><b>${count}</b></td></tr>`).join('')}
      </table>
    </div>
    <div class="stat">
      <div class="stat-title">⚙️ ДЕЙСТВИЯ</div>
      <button class="btn" onclick="clearTrackLog()">🗑 Очистить лог трекера</button>
      <button class="btn" onclick="exportTrackLog()">📤 Экспорт лога (JSON)</button>
      <button class="btn" onclick="location.reload()">🔄 Обновить</button>
    </div>
  `;
}

// ========== ОЧИСТКА ==========
function clearTrackLog() {
  if(confirm('Очистить историю событий? Данные приложения останутся.')) {
    localStorage.setItem('track_log', '[]');
    location.reload();
  }
}

function exportTrackLog() {
  const log = localStorage.getItem('track_log') || '[]';
  const blob = new Blob([log], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `track_log_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(blob);
}

// ========== ОСТАЛЬНЫЕ ВКЛАДКИ (упрощённо) ==========
function renderJournal() {
  return `<div class="stat"><div class="stat-title">📋 ЖУРНАЛ РАБОТ</div><div class="gold">${S.entries.length} записей</div><button class="btn" onclick="addTestEntry()">+ Добавить тестовую работу</button></div>`;
}

function addTestEntry() {
  const vol = Math.floor(Math.random() * 30) + 5;
  S.entries.push({ id: Date.now(), buildingId: 'b1', workTypeId: 'carcass', volume: vol, dateFrom: new Date().toISOString().slice(0,10), notes: '', materials: {}, noStock: false });
  save();
  track('entry_added', vol);
  render();
}

function renderWarehouse() {
  return `<div class="stat"><div class="stat-title">📦 СКЛАД</div><div>${S.wlog.length} приходов</div><button class="btn" onclick="addTestStock()">+ Добавить приход</button></div>`;
}

function addTestStock() {
  S.wlog.push({ id: Date.now(), key: 'travers', qty: 10, date: new Date().toISOString().slice(0,10), time: new Date().toTimeString().slice(0,5) });
  save();
  track('stock_added', 'travers');
  render();
}

function renderTasks() {
  return `<div class="stat"><div class="stat-title">✅ ЗАДАЧИ</div><div>${S.goals.filter(g=>!g.done).length} активных</div><button class="btn" onclick="addTestGoal()">+ Добавить задачу</button></div>`;
}

function addTestGoal() {
  S.goals.push({ id: Date.now(), text: 'Сделать ' + (Math.floor(Math.random()*20)+5) + ' м²', date: new Date().toISOString().slice(0,10), done: false, hidden: false });
  save();
  track('add_goal');
  render();
}

function renderEarn() {
  const total = S.entries.reduce((s,e) => s + e.volume * 350, 0);
  return `<div class="stat"><div class="stat-title">💰 ЗАРАБОТОК</div><div class="gold">${total.toLocaleString()} ₽</div><button class="btn" onclick="track('pro_click'); alert('PRO: @Mark8Numb')">💎 Купить PRO</button></div>`;
}

// ========== НАВИГАЦИЯ ==========
let tab = 'stats';

function render() {
  const tabs = [
    { id: 'stats', icon: '📊', name: 'Статы' },
    { id: 'journal', icon: '📋', name: 'Журнал' },
    { id: 'warehouse', icon: '📦', name: 'Склад' },
    { id: 'tasks', icon: '✅', name: 'Задачи' },
    { id: 'earn', icon: '💰', name: 'Заработок' }
  ];
  
  const content = {
    stats: renderStats(),
    journal: renderJournal(),
    warehouse: renderWarehouse(),
    tasks: renderTasks(),
    earn: renderEarn()
  }[tab];
  
  document.getElementById('app').innerHTML = `
    <div style="display:flex; gap:4px; flex-wrap:wrap; margin-bottom:16px">
      ${tabs.map(t => `<button class="btn" style="background:${tab===t.id?'#d4920a':'#2a2a24'}; color:${tab===t.id?'#0c0c0a':'#e8dcc8'}" onclick="switchTab('${t.id}')">${t.icon} ${t.name}</button>`).join('')}
    </div>
    ${content}
    <div style="margin-top:16px; text-align:center; font-size:10px; color:#6a6050">СТРОИТЕЛЬ.ПРО ${VER} · Аналитика</div>
  `;
  track('tab_'+tab);
}

window.switchTab = (t) => { tab = t; render(); };
window.addTestEntry = addTestEntry;
window.addTestStock = addTestStock;
window.addTestGoal = addTestGoal;
window.clearTrackLog = clearTrackLog;
window.exportTrackLog = exportTrackLog;
window.track = track;

load();
render();
track('app_ready');
</script>
</body>
</html>
