<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>СТРОИТЕЛЬ.ПРО v3.0</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0c0c0a;color:#e8dcc8;line-height:1.5}
    .container{max-width:600px;margin:0 auto;padding:12px}
    .card{background:#1a1a17;border:1px solid #2a2a24;border-radius:14px;padding:14px;margin-bottom:10px}
    .card-title{font-size:10px;letter-spacing:2px;color:#d4920a;text-transform:uppercase;margin-bottom:10px}
    .btn{background:#d4920a;color:#0c0c0a;border:none;padding:8px 14px;border-radius:30px;font-weight:700;cursor:pointer;font-size:13px}
    .btn-outline{background:transparent;border:1px solid #d4920a;color:#d4920a}
    .btn-sm{background:#2a2a24;border:1px solid #3a3a34;color:#e8dcc8;padding:6px 10px;border-radius:20px;font-size:11px}
    .flex{display:flex;gap:8px;flex-wrap:wrap}
    .header{background:#141412;border-bottom:2px solid #d4920a;padding:12px;display:flex;justify-content:space-between;align-items:center}
    .logo{font-size:20px;font-weight:900}
    .logo span{color:#d4920a}
    .badge{background:#d4920a10;border:1px solid #d4920a30;border-radius:20px;padding:4px 10px;font-size:10px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .earn{color:#3d9e5c;font-weight:700}
    .prod{color:#e8a020;font-weight:700}
    .progress-bar{height:4px;background:#2a2a24;border-radius:4px;margin-top:6px}
    .progress-fill{height:100%;border-radius:4px;background:#d4920a;width:0%}
    @keyframes toast{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#d4920a;color:#0c0c0a;padding:8px 16px;border-radius:30px;font-size:12px;font-weight:700;animation:toast 0.3s;z-index:1000}
  </style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════
// СТРОИТЕЛЬ.ПРО v3.0 — ФИКСЫ ВСЕХ БАГОВ + PRO/FREE
// ═══════════════════════════════════════════════════════════════

// ========== РЕЖИМ: 'pro' или 'free' ==========
const MODE = 'pro';  // поменяй на 'free' для ограниченной версии

// ========== БАЗОВЫЕ ДАННЫЕ ==========
let S = {
  projects: [{id:'p1',name:'Госпиталь'}],
  buildings: [{id:'b1',projectId:'p1',name:'ПК 1 этаж',totalArea:257.2,workTypes:[]}],
  entries: [],
  wlog: [],
  goals: [],
  notes: [],
  matCfg: {},
  dimUnit: 'cm',
  theme: 'dark',
  isPro: MODE === 'pro',
  freeEntryLimit: 50
};

// ========== ТРЕКЕР ==========
function track(e,v){try{let l=JSON.parse(localStorage.getItem('track_log')||'[]');l.push({e:e,v:v||null,t:Date.now(),d:new Date().toISOString().slice(0,10)});if(l.length>500)l.shift();localStorage.setItem('track_log',JSON.stringify(l));}catch(e){}}

// ========== СОХРАНЕНИЕ ==========
function save(){try{localStorage.setItem('stroipro_v3',JSON.stringify(S));track('save');}catch(e){}}
function load(){
  try{let raw=localStorage.getItem('stroipro_v3');if(raw){let d=JSON.parse(raw);S={...S,...d};if(!S.projects)S.projects=[{id:'p1',name:'Госпиталь'}];if(!S.buildings)S.buildings=[];if(!S.entries)S.entries=[];if(!S.wlog)S.wlog=[];if(!S.goals)S.goals=[];if(!S.notes)S.notes=[];if(!S.matCfg)S.matCfg={};}}catch(e){}
  if(!S.buildings.length)S.buildings=[{id:'b1',projectId:'p1',name:'ПК 1 этаж',totalArea:257.2,workTypes:[]}];
  track('load');
}
load();

// ========== ХЕЛПЕРЫ ==========
const today=()=>new Date().toISOString().slice(0,10);
const uid=()=>String(Date.now())+String(Math.floor(Math.random()*9999));
const fmtRub=n=>Number(n||0).toLocaleString('ru')+' ₽';
const esc=s=>String(s||'').replace(/[&<>]/g,m=>({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m]));
const getBld=()=>S.buildings.find(b=>b.id===ui.bid)||S.buildings[0];
const getEnts=()=>S.entries.filter(e=>e.buildingId===ui.bid);
const entEarn=e=>(getWT(e.workTypeId)?.price||0)*e.volume;
const getWT=(wtId)=>(getBld()?.workTypes||[]).find(w=>w.id===wtId);
const volByWT=(wtId)=>getEnts().filter(e=>e.workTypeId===wtId).reduce((s,e)=>s+e.volume,0);
const totalIn=k=>S.wlog.filter(r=>r.key===k).reduce((s,r)=>s+r.qty,0);
const totalOut=k=>S.entries.filter(e=>!e.noStock).reduce((s,e)=>s+(Number(e.materials?.[k]?.qty)||0),0);
const rem=k=>totalIn(k)-totalOut(k);
const getMatLabel=k=>S.matCfg[k]?.label||k;

let ui={tab:'journal',pid:'p1',bid:'b1',exp:null,whHist:null,showHidden:false,wtMats:null};

// ========== ФИКС: УДАЛЕНИЕ ПОЗИЦИЙ НА СКЛАДЕ ==========
function deleteMaterial(materialKey){
  if(confirm(`Удалить все данные о материале «${getMatLabel(materialKey)}»? Это удалит ВСЕ приходы.`)){
    S.wlog=S.wlog.filter(r=>r.key!==materialKey);
    if(S.matCfg[materialKey])delete S.matCfg[materialKey];
    save();
    toast(`🗑 Материал «${getMatLabel(materialKey)}» удалён`);
    render();
  }
}

// ========== ФИКС: НОВЫЙ ВИД РАБОТ — ЧИСТЫЕ МАТЕРИАЛЫ ==========
function showAddWorkType(){
  ui.wtMats={main:{},consumable:{}};
  renderWorkTypeModal(false,null);
}

function showEditWorkType(wt){
  ui.wtMats=wt.materials?JSON.parse(JSON.stringify(wt.materials)):{main:{},consumable:{}};
  renderWorkTypeModal(true,wt);
}

function renderWorkTypeModal(isEdit,wt){
  const colors=['#d4920a','#4a9fd4','#3d9e5c','#d95f4f','#9b59b6'];
  const mainMats=['travers','yubka','shpilka','ushi','perim','kronshteyn','tsanga','bolt','gayka','shayba_usl','shayba_ob'];
  const consumableMats=['disk_cut','bit_ph2','screw_35','disk_grind','marker'];
  
  const matsHtml=mainMats.map(k=>{
    const qty=ui.wtMats.main[k]?.qty||'';
    const size=ui.wtMats.main[k]?.size||'';
    return `<div class="flex" style="align-items:center;margin-bottom:6px"><span style="width:100px;font-size:12px">${getMatLabel(k)}</span>
      <input type="number" id="mat_${k}" value="${qty}" placeholder="шт" style="width:55px;padding:5px;background:#222;border:1px solid #333;color:#fff;border-radius:6px">
      <input type="number" id="sz_${k}" value="${size}" placeholder="мм" style="width:55px;padding:5px;background:#222;border:1px solid #333;color:#fff;border-radius:6px">
      <button class="btn-sm" onclick="deleteMaterialFromModal('${k}','main')">✕</button></div>`;
  }).join('');
  
  const consumHtml=consumableMats.map(k=>{
    const qty=ui.wtMats.consumable[k]?.qty||'';
    return `<div class="flex" style="align-items:center;margin-bottom:6px"><span style="width:100px;font-size:12px">${getMatLabel(k)}</span>
      <input type="number" id="cons_${k}" value="${qty}" placeholder="шт" style="width:55px;padding:5px;background:#222;border:1px solid #333;color:#fff;border-radius:6px">
      <button class="btn-sm" onclick="deleteMaterialFromModal('${k}','consumable')">✕</button></div>`;
  }).join('');
  
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:flex;align-items:flex-end;justify-content:center';
  modal.innerHTML=`<div style="background:#141412;width:100%;max-height:85vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:20px">
    <div style="font-size:18px;font-weight:800;margin-bottom:16px">${isEdit?'Редактировать вид':'Новый вид работ'}</div>
    <input type="text" id="wtName" placeholder="Название" value="${wt?.name||''}" style="width:100%;padding:10px;background:#222;border:1px solid #333;color:#fff;border-radius:8px;margin-bottom:12px">
    <div class="flex" style="margin-bottom:12px">
      <input type="number" id="wtPrice" placeholder="Цена ₽" value="${wt?.price||350}" style="flex:1;padding:10px;background:#222;border:1px solid #333;color:#fff;border-radius:8px">
      <select id="wtUnit" style="padding:10px;background:#222;border:1px solid #333;color:#fff;border-radius:8px">
        <option ${wt?.unit==='м²'?'selected':''}>м²</option><option ${wt?.unit==='пог.м'?'selected':''}>пог.м</option><option ${wt?.unit==='шт'?'selected':''}>шт</option>
      </select>
      <input type="number" id="wtTarget" placeholder="Цель" value="${wt?.targetArea||''}" style="flex:1;padding:10px;background:#222;border:1px solid #333;color:#fff;border-radius:8px">
    </div>
    <div style="margin-bottom:12px"><div class="card-title">🔩 ОСНОВНЫЕ МАТЕРИАЛЫ</div>${matsHtml}<button class="btn-sm" onclick="addCustomMaterialToModal('main')">+ Добавить материал</button></div>
    <div><div class="card-title">🔄 РАСХОДНИКИ</div>${consumHtml}<button class="btn-sm" onclick="addCustomMaterialToModal('consumable')">+ Добавить расходник</button></div>
    <div class="flex" style="margin-top:16px"><button class="btn" onclick="saveWorkTypeModal('${isEdit}', '${wt?.id||''}')">Сохранить</button><button class="btn-outline" onclick="closeModal()">Отмена</button></div>
  </div>`;
  document.body.appendChild(modal);
  window.closeModal=()=>modal.remove();
}

window.deleteMaterialFromModal=(key,type)=>{
  if(type==='main')delete ui.wtMats.main[key];
  else delete ui.wtMats.consumable[key];
  renderWorkTypeModal(false,null);
};

window.addCustomMaterialToModal=(type)=>{
  const customKey='custom_'+Date.now();
  if(type==='main')ui.wtMats.main[customKey]={qty:'',size:''};
  else ui.wtMats.consumable[customKey]={qty:'',size:''};
  renderWorkTypeModal(false,null);
};

window.saveWorkTypeModal=(isEdit,wtId)=>{
  const name=document.getElementById('wtName')?.value;
  if(!name){toast('Введите название');return;}
  const price=parseFloat(document.getElementById('wtPrice')?.value)||0;
  const unit=document.getElementById('wtUnit')?.value||'м²';
  const targetArea=parseFloat(document.getElementById('wtTarget')?.value)||0;
  const mainMats={};
  const consumMats={};
  for(let k in ui.wtMats.main){mainMats[k]={qty:ui.wtMats.main[k].qty||'',size:ui.wtMats.main[k].size||''};}
  for(let k in ui.wtMats.consumable){consumMats[k]={qty:ui.wtMats.consumable[k].qty||'',size:''};}
  const materials={main:mainMats,consumable:consumMats};
  const newWt={id:isEdit?wtId:uid(),name,price,unit,targetArea,materials};
  const bld=getBld();
  if(isEdit){
    const idx=bld.workTypes.findIndex(w=>w.id===wtId);
    if(idx>=0)bld.workTypes[idx]=newWt;
  }else{
    if(!bld.workTypes)bld.workTypes=[];
    bld.workTypes.push(newWt);
  }
  save();
  closeModal();
  render();
};

// ========== ФИКС: КНОПКА РАСХОД НА СКЛАДЕ ==========
function addStockOut(materialKey){
  const qty=prompt(`Списать количество (${getMatLabel(materialKey)}):`);
  if(qty&&parseFloat(qty)>0){
    S.wlog.push({id:uid(),key:materialKey,qty:-Math.abs(parseFloat(qty)),date:today(),time:new Date().toTimeString().slice(0,5),isOut:true});
    save();
    toast(`➖ Списано ${qty} ${getMatLabel(materialKey)}`);
    render();
  }
}

// ========== ИИ-АНАЛИЗ (простая версия) ==========
function runAIAnalysis(){
  const entries=getEnts();
  if(entries.length<3){toast('❓ Добавьте хотя бы 3 записи для анализа');return;}
  const totalVol=entries.reduce((s,e)=>s+e.volume,0);
  const totalEarn=entries.reduce((s,e)=>s+entEarn(e),0);
  const avgPerDay=totalVol/entries.length;
  let rating=5;
  if(avgPerDay>20)rating=9;
  else if(avgPerDay>15)rating=8;
  else if(avgPerDay>10)rating=7;
  else if(avgPerDay>5)rating=6;
  let title=rating>=8?'Профи':rating>=6?'Мастер':'Новичок';
  const forecast=`При текущем темпе ${avgPerDay.toFixed(1)} м²/день вы закроете 100 м² за ${Math.ceil(100/avgPerDay)} дней.`;
  alert(`🤖 ИИ-АНАЛИЗ\n\n⭐ Оценка: ${rating}/10 (${title})\n📊 Выработка: ${avgPerDay.toFixed(1)} м²/день\n💰 Заработано: ${fmtRub(totalEarn)}\n📈 Прогноз: ${forecast}\n\n💪 Сильные стороны: стабильная работа\n🎯 Зона роста: увеличьте ежедневный объём на 20%`);
  track('ai_analysis');
}

// ========== ОТПРАВКА ЗАКАЗЧИКУ ==========
function sendToCustomer(){
  const entries=getEnts();
  if(!entries.length){toast('Нет записей для отчёта');return;}
  let total=0,vol=0;
  entries.forEach(e=>{total+=entEarn(e);vol+=e.volume;});
  let msg=`📋 ОТЧЁТ ПО ОБЪЕКТУ ${getBld()?.name}\n📅 Период: ${entries[0]?.dateFrom||today()} — ${today()}\n📐 Выполнено: ${vol.toFixed(1)} м²\n💰 Сумма к оплате: ${fmtRub(total)}\n\nС уважением, СТРОИТЕЛЬ.ПРО`;
  if(navigator.share){
    navigator.share({title:'Отчёт СТРОИТЕЛЬ.ПРО',text:msg});
  }else{
    navigator.clipboard.writeText(msg);
    toast('📋 Отчёт скопирован, отправьте заказчику');
  }
  track('share_report');
}

// ========== РЕНДЕР ==========
function toast(msg){let t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}

function render(){
  const app=document.getElementById('app');
  if(!app)return;
  
  const freeLimitReached=MODE==='free' && getEnts().length>=S.freeEntryLimit;
  const isPaid=MODE==='pro' || localStorage.getItem('stroipro_pro')==='true';
  
  app.innerHTML=`
    <div class="header">
      <div class="logo">СТРОИТЕЛЬ<span>.ПРО</span></div>
      <div class="flex">
        <button class="btn-sm" onclick="ui.tab='stats';render()">📊</button>
        <button class="btn-sm" onclick="S.theme=S.theme==='dark'?'light':'dark';render()">${S.theme==='dark'?'☀️':'🌙'}</button>
        <button class="btn-sm" onclick="const ds=['mm','cm','m'];S.dimUnit=ds[(ds.indexOf(S.dimUnit)+1)%ds.length];render()">${S.dimUnit.toUpperCase()}</button>
      </div>
    </div>
    
    <div class="container">
      <div class="flex" style="margin-bottom:12px;gap:4px;flex-wrap:wrap">
        ${['journal','warehouse','tasks','earn','settings'].map(t=>`<button class="${ui.tab===t?'btn':'btn-outline'}" style="padding:6px 12px" onclick="ui.tab='${t}';render()">${t==='journal'?'📋 Журнал':t==='warehouse'?'📦 Склад':t==='tasks'?'✅ Задачи':t==='earn'?'💰 Заработок':'⚙️ Настройки'}</button>`).join('')}
      </div>
      
      ${ui.tab==='journal' ? renderJournal(freeLimitReached,isPaid) : 
        ui.tab==='warehouse' ? renderWarehouse() :
        ui.tab==='tasks' ? renderTasks() :
        ui.tab==='earn' ? renderEarn() :
        renderSettings()}
    </div>
  `;
}

function renderJournal(freeLimitReached,isPaid){
  const entries=getEnts();
  const visible=entries.filter(e=>!e.hidden);
  const freeMsg=MODE==='free' && !isPaid && entries.length>=S.freeEntryLimit ? `<div class="card" style="background:#3d1a1a;border-color:#d95f4f"><div class="card-title">⚠️ ЛИМИТ БЕСПЛАТНОЙ ВЕРСИИ</div>Вы добавили ${entries.length} из ${S.freeEntryLimit} бесплатных записей. Оформите PRO для безлимита.<br><button class="btn" style="margin-top:8px" onclick="alert('PRO: @Mark8Numb')">💎 Получить PRO</button></div>` : '';
  
  return `
    ${freeMsg}
    <div class="card"><div class="card-title">📋 ЖУРНАЛ (${visible.length})</div>
    <div class="flex" style="margin-bottom:8px"><button class="btn-sm" onclick="ui.sort=ui.sort==='date_desc'?'date_asc':'date_desc';render()">↕️ Сортировка</button></div>
    ${visible.length ? visible.map(e=>{
      const wt=getWT(e.workTypeId);
      const earn=entEarn(e);
      return `<div class="card" style="margin-bottom:8px;border-left:3px solid ${wt?.color||'#d4920a'}" onclick="ui.exp=ui.exp===e.id?null:e.id;render()">
        <div class="flex" style="justify-content:space-between"><div><b>${wt?.name||'—'}</b><br><span style="font-size:10px;color:#8a7a60">${e.dateFrom} → ${e.dateTo}</span></div><div class="earn">${fmtRub(earn)}</div></div>
        <div class="flex"><span>${e.volume} ${wt?.unit||'м²'}</span></div>
        ${ui.exp===e.id ? `<div class="flex" style="margin-top:8px"><button class="btn-sm" onclick="event.stopPropagation();copyEntry(e.id)">⧉ Коп.</button>
        <button class="btn-sm" onclick="event.stopPropagation();S.entries=S.entries.filter(x=>x.id!==e.id);save();render()">✕ Уд.</button>
        <button class="btn-sm" onclick="event.stopPropagation();e.hidden=!e.hidden;save();render()">👁 Скрыть</button></div>`:''}
      </div>`;
    }).join('') : '<div class="card">Нет записей. Нажмите + для добавления</div>'}
    ${(!freeLimitReached || isPaid) ? `<button class="btn" style="width:100%;margin-top:8px" onclick="addEntry()">+ Добавить работу</button>` : ''}
    </div>
  `;
}

function addEntry(){
  const vol=prompt('Объём (м²):');
  if(vol){
    S.entries.push({id:uid(),buildingId:ui.bid,workTypeId:S.buildings[0]?.workTypes?.[0]?.id||'wt1',volume:parseFloat(vol),dateFrom:today(),dateTo:today(),notes:'',materials:{},noStock:false});
    save();
    track('entry_added',vol);
    render();
  }
}

function copyEntry(id){
  const e=S.entries.find(x=>x.id===id);
  if(e)S.entries.push({...e,id:uid(),dateFrom:today(),dateTo:today()});
  save();
  toast('✅ Запись скопирована');
  render();
}

function renderWarehouse(){
  const mats=['travers','yubka','shpilka','ushi','perim','kronshteyn','tsanga','bolt','gayka','shayba_usl','shayba_ob'];
  return `<div class="card"><div class="card-title">📦 СКЛАД</div>
    ${mats.map(k=>{
      const left=rem(k);
      const warn=left<0;
      return `<div class="card" style="margin-bottom:8px;border-left:3px solid ${warn?'#d95f4f':'#3d9e5c'}">
        <div class="flex" style="justify-content:space-between;align-items:center"><b>${getMatLabel(k)}</b><span class="${warn?'earn':'prod'}">${left} шт</span></div>
        <div class="flex" style="margin-top:8px"><input type="number" id="inp_${k}" placeholder="+/-" style="flex:1;padding:6px;background:#222;border:1px solid #333;color:#fff;border-radius:6px">
        <button class="btn-sm" onclick="addStock('${k}',1)">+ Приход</button>
        <button class="btn-sm" onclick="addStock('${k}',-1)">- Расход</button>
        <button class="btn-sm" onclick="deleteMaterial('${k}')">🗑</button></div>
      </div>`;
    }).join('')}
  </div>`;
}

window.addStock=(k,dir)=>{
  const inp=document.getElementById(`inp_${k}`);
  const qty=parseFloat(inp?.value)||0;
  if(qty<=0){toast('Введите количество');return;}
  S.wlog.push({id:uid(),key:k,qty:dir>0?qty:-qty,date:today(),time:new Date().toTimeString().slice(0,5)});
  save();
  inp.value='';
  toast(`${dir>0?'+ Приход':'➖ Расход'} ${qty} ${getMatLabel(k)}`);
  render();
};

function renderTasks(){
  return `<div class="card"><div class="card-title">✅ ЗАДАЧИ</div>
    ${S.goals.filter(g=>!g.done).map(g=>`<div class="flex" style="justify-content:space-between;margin-bottom:8px"><span>${esc(g.text)} <span style="font-size:10px;color:#8a7a60">${g.date}</span></span><button class="btn-sm" onclick="g.done=true;g.hidden=true;save();render()">✓</button></div>`).join('')}
    <button class="btn" style="width:100%;margin-top:8px" onclick="const t=prompt('Задача:');if(t){S.goals.push({id:uid(),text:t,date:today(),done:false});save();render()}">+ Добавить задачу</button>
  </div>`;
}

function renderEarn(){
  const entries=getEnts();
  const totalEarn=entries.reduce((s,e)=>s+entEarn(e),0);
  const totalVol=entries.reduce((s,e)=>s+e.volume,0);
  const avgEarn=totalVol/entries.length||0;
  return `<div class="card"><div class="card-title">💰 ЗАРАБОТОК</div>
    <div style="font-size:32px;font-weight:800;color:#3d9e5c">${fmtRub(totalEarn)}</div>
    <div class="prod" style="font-size:18px">📐 ${totalVol.toFixed(1)} м²</div>
    <div class="flex" style="margin-top:12px"><button class="btn" onclick="runAIAnalysis()">🤖 ИИ-анализ</button><button class="btn-outline" onclick="sendToCustomer()">📤 Отчёт заказчику</button></div>
  </div>`;
}

function renderSettings(){
  return `<div class="card"><div class="card-title">⚙️ НАСТРОЙКИ</div>
    <div class="flex" style="margin-bottom:12px"><button class="btn" onclick="exportData()">📤 Экспорт</button><button class="btn-outline" onclick="importData()">📥 Импорт</button></div>
    <div class="flex"><button class="btn-outline" onclick="alert('PRO: @Mark8Numb')">💎 Купить PRO (499₽/мес)</button></div>
  </div>`;
}

function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`stroipro_${today()}.json`;
  a.click();
  toast('✅ Экспорт готов');
}

function importData(){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0];
    if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        S={...S,...d};
        save();
        toast('📥 Импорт выполнен');
        render();
      }catch(ex){toast('Ошибка файла');}
    };
    r.readAsText(f);
  };
  inp.click();
}

window.deleteMaterial=deleteMaterial;
window.copyEntry=copyEntry;
window.addEntry=addEntry;
window.addStock=addStock;
window.runAIAnalysis=runAIAnalysis;
window.sendToCustomer=sendToCustomer;
window.exportData=exportData;
window.importData=importData;
window.showAddWorkType=showAddWorkType;
window.showEditWorkType=showEditWorkType;

render();
</script>
</body>
</html>
