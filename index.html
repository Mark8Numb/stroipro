  <meta name="theme-color" content="#0a0a0c"/>
  <title>СТРОИТЕЛЬ.ПРО</title>
  <style>
:root{
  --bg:#0f0f0d; --bg2:#161614; --bg3:#1e1e1a;
  --card:#1a1a17; --card2:#222220;
  --border:#2c2c28; --border2:#383834;
  --text:#ede8dc; --text2:#a09880; --muted:#6a6050;
  --gold:#d4920a; --gold-l:rgba(212,146,10,0.13); --gold-b:rgba(212,146,10,0.28);
  --green:#3d9e5c; --red:#d95f4f; --blue:#4a9fd4;
  --shadow:rgba(0,0,0,0.42);
  --font:-apple-system,"Inter","Segoe UI",sans-serif;
  --nav-h:62px; --r:13px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);font-size:14px;line-height:1.45}
#app{height:100%;display:flex;flex-direction:column}
.main-col{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0}
b,strong{font-weight:700}
s,small{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);display:block;margin-top:2px}
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:max(14px,env(safe-area-inset-top)) 16px 11px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  box-shadow:0 2px 16px var(--shadow)}
.hdr-l{display:flex;flex-direction:column;gap:1px}
.logo{font-size:18px;font-weight:700;letter-spacing:1.2px;color:var(--text);font-family:'Oswald',var(--font)}
.card-title,.shtitle,.ob-title{font-family:'Oswald',var(--font)}
.logo-dot{color:var(--gold)}
.logo-sub{font-size:9px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:10px}
.earn-pill{font-size:13px;font-weight:700;color:var(--gold);
  background:var(--gold-l);border:1px solid var(--gold-b);
  padding:5px 12px;border-radius:18px;letter-spacing:.3px}
.ico-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  width:33px;height:33px;border-radius:50%;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.ico-btn:active{opacity:.7}
.ubar{background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:5px 12px;gap:6px;flex-shrink:0}
.ub{background:var(--gold-l);border:1px solid var(--gold-b);border-radius:14px;
  color:var(--gold);padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}
.ub-off{opacity:.2;cursor:default}
.usave{font-size:13px;color:var(--muted);transition:color .3s}
.usave.ok{color:var(--green)}
.usave.fail{color:var(--red);animation:usave-blink 1s infinite}
@keyframes usave-blink{0%,100%{opacity:1}50%{opacity:.3}}
.shake-fx{animation:screen-shake 0.45s cubic-bezier(.36,.07,.19,.97)}
.tab-fade-in{animation:tab-fade-in .28s ease-out}
@keyframes tab-fade-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes screen-shake{
  10%,90%{transform:translateX(-1px)}
  20%,80%{transform:translateX(2px)}
  30%,50%,70%{transform:translateX(-4px)}
  40%,60%{transform:translateX(4px)}
}
.ubar-dim{margin-left:auto;font-size:9px;letter-spacing:2px;color:var(--muted);font-weight:700;text-transform:uppercase}
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:7px 13px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.pbar::-webkit-scrollbar{display:none}
.ppill{background:var(--bg3);border:1.5px solid var(--border);border-radius:18px;
  color:var(--muted);padding:5px 15px;font-size:12px;font-weight:600;

let S,ui,undoStack=[],redoStack=[];
function mkUi(){
  let _savedSort='date_desc';try{_savedSort=localStorage.getItem('bpro_sort')||'date_desc';}catch(e){}return{tab:'journal',pid:'p1',bid:'b1',exp:null,sort:'date_desc',
  whSub:'list',whHist:null,whBid:'',whBldFilter:'',showHidden:false,showHiddenGoals:false,
  wtActive:null,onboarded:false,earnPeriod:'day',hdrPeriod:'all'};}

function migrate(s){
  // v1→v2: materials {key:'qty'} → {key:{qty,size}}
  (s.entries||[]).forEach(e=>{if(!e.materials)return;
    Object.keys(e.materials).forEach(k=>{const v=e.materials[k];
      if(typeof v==='string'||typeof v==='number')e.materials[k]={qty:String(v),size:''};
    });
  });
  // ensure workTypes have targetArea
  (s.buildings||[]).forEach(b=>{(b.workTypes||[]).forEach(wt=>{
    if(wt.targetArea===undefined)wt.targetArea=b.totalArea||0;
  });});
  // ensure matCfg has kg
  MATS.forEach(m=>{if(s.matCfg?.[m.key]&&!s.matCfg[m.key].kg)s.matCfg[m.key].kg=m.kg||0;});
  if(!s.goals)s.goals=[];
  if(!s.users)s.users=[];if(!s.notes)s.notes=[];if(!s.wlog)s.wlog=[];
  if(!s.matCfg)s.matCfg={};
  if(!s.matKits)s.matKits=[];
  MATS.forEach(m=>{if(!s.matCfg[m.key])s.matCfg[m.key]={pack:m.pack,iLen:m.iLen||0,label:m.label,cat:m.cat,kg:m.kg||0};});
  // migrate old 'ushi' entries to keep compatibility
  if(!s.matCfg.ushi_120)s.matCfg.ushi_120={pack:100,iLen:0,label:'Уши 120 (RA4F)',cat:'main',kg:0.02};
  if(!s.matCfg.ushi_60)s.matCfg.ushi_60={pack:100,iLen:0,label:'Уши 60',cat:'main',kg:0.02};
  s.wlog.forEach(r=>{if(!r.time)r.time='';if(!r.buildingId)r.buildingId='';});
  if(!s.schema)s.schema=SCHEMA;
  if(s.openCount===undefined)s.openCount=0;
  if(!s.hiddenMats)s.hiddenMats=[];
  if(!s.photos)s.photos=[];
  if(!s.timesheet)s.timesheet=[];
  // Конвертация старого dict-формата табеля {date:{uid:status}} в массив [{uid,date,status}]
  if(s.timesheet&&!Array.isArray(s.timesheet)){
    var tsArr=[];
    Object.keys(s.timesheet).forEach(function(date){
      var day=s.timesheet[date];
      if(day&&typeof day==='object'){
        Object.keys(day).forEach(function(uid){
          var raw=day[uid];
          var status=raw==='1'||raw===1?'p':raw==='0.5'||raw===0.5?'h':raw==='sick'?'b':raw==='vacation'?'v':raw==='unpaid'?'u':null;
          if(status)tsArr.push({uid:uid,date:date,status:status});
        });
      }
    });
    s.timesheet=tsArr;
  }
  if(!s.payouts)s.payouts=[];
  if(!s.lang)s.lang='ru';
  if(!s.dimUnit)s.dimUnit='mm';
  return s;
}

function load(){
  try{const raw=localStorage.getItem(KEY);if(raw)return migrate(JSON.parse(raw));}catch(e){}
  // Try to migrate from old key
  for(const oldKey of['bpro_v102','bpro_v11','bpro_v10']){
    try{const raw=localStorage.getItem(oldKey);if(raw){const s=migrate(JSON.parse(raw));s.schema=SCHEMA;return s;}}catch(e){}
  }
  return JSON.parse(JSON.stringify(DEF_STATE));
}

function initState(){
  S=load();ui=mkUi();
  S.openCount=(S.openCount||0)+1;
  const bs=getBldgs(ui.pid);if(bs.length)ui.bid=bs[0].id;
  // Auto-transfer overdue goals
  const td=today();(S.goals||[]).forEach(g=>{if(!g.done&&!g.hidden&&g.date<td)g.date=td;});
  applyTheme();
  // Export reminder every 7 opens
  if(S.openCount%7===0&&S.openCount>0){
    setTimeout(()=>toast('💾 Не забудьте экспортировать данные!',4000),1500);
  }
}

// ── HELPERS ────────────────────────────────────────────────────
const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');};
const nowTime=()=>new Date().toTimeString().slice(0,5);
const uid=()=>String(Date.now())+String(Math.floor(Math.random()*9999));
const fmtRub=n=>Number(n||0).toLocaleString('ru')+' ₽';
const fmtD=d=>{if(!d)return'';const[y,m,day]=d.split('-');return`${day}.${m}.${String(y).slice(2)}`;};
const fmtDt=(d,t)=>`${fmtD(d)}${t?' '+t:''}`;

function getBldgs(pid){return(S.buildings||[]).filter(b=>b.projectId===pid);}
function getEnts(bid){return(S.entries||[]).filter(e=>e.buildingId===bid);}
function getSortedEnts(bid){
  const e=getEnts(bid).slice();const s=ui.sort||'date_desc';
  // Для записей одного дня — сортируем по времени создания (новые сверху)
  function dateThenCreated(a,b){
    const dc=b.dateFrom.localeCompare(a.dateFrom);
    if(dc!==0)return dc;
    return (b.created||'').localeCompare(a.created||'');
  }
  if(s==='date_desc')  return e.sort(dateThenCreated);
  if(s==='date_asc')   return e.sort((a,b)=>{const dc=a.dateFrom.localeCompare(b.dateFrom);return dc!==0?dc:(a.created||'').localeCompare(b.created||'');});
  if(s==='vol_desc')   return e.sort((a,b)=>b.volume-a.volume);
  if(s==='vol_asc')    return e.sort((a,b)=>a.volume-b.volume);
  if(s==='earn_desc')  return e.sort((a,b)=>entEarn(b)-entEarn(a));
  if(s==='mod_desc')   return e.sort((a,b)=>(b.modified||b.created||'').localeCompare(a.modified||a.created||''));
  if(s==='star_first') return e.sort((a,b)=>(b.starred?1:0)-(a.starred?1:0)||b.dateFrom.localeCompare(a.dateFrom));
  return e;
}
function wtOf(bid,wtId){const b=S.buildings.find(x=>x.id===bid);return(b?.workTypes||DEF_WTS).find(w=>w.id===wtId)||DEF_WTS[0];}
function entEarn(e){const w=wtOf(e.buildingId,e.workTypeId);return Number(e.volume)*(w?.price||0);}
function volByWT(bid,wtId){return getEnts(bid).filter(e=>e.workTypeId===wtId).reduce((s,e)=>s+Number(e.volume),0);}
function pctWT(bid,wt){const t=Number(wt.targetArea)||0;if(!t)return null;return Math.min(100,volByWT(bid,wt.id)/t*100);}
function leftWT(bid,wt){const t=Number(wt.targetArea)||0;return Math.max(0,t-volByWT(bid,wt.id));}

// Подготовительные работы: виды с ценой 0₽ = подготовка

function _isPrepEntry(e){
  var b=(S.buildings||[]).find(function(x){return x.id===e.buildingId;});
  if(!b)return false;
  var wt=(b.workTypes||[]).find(function(w){return w.id===e.workTypeId;});
  return wt&&wt.price===0;
}
function getDayVol(){
  var byDay={};
  (S.entries||[]).filter(function(e){return !_isPrepEntry(e);}).forEach(function(e){
    var d=new Date(e.dateFrom+'T12:00:00');if(d.getDay()===0)return;
    byDay[e.dateFrom]=(byDay[e.dateFrom]||0)+Number(e.volume);
  });
  var days=Object.keys(byDay).length||1;
  return (S.entries||[]).filter(function(e){return !_isPrepEntry(e);}).reduce(function(s,e){return s+Number(e.volume);},0)/days;
}
function _prepStats(){
  var days={};var vol=0;var byType={};
  (S.entries||[]).filter(function(e){return _isPrepEntry(e);}).forEach(function(e){
    var d=new Date(e.dateFrom+'T12:00:00');if(d.getDay()!==0)days[e.dateFrom]=1;
    vol+=Number(e.volume);
    var b=(S.buildings||[]).find(function(x){return x.id===e.buildingId;});
    var wt=b&&(b.workTypes||[]).find(function(w){return w.id===e.workTypeId;});
    var nm=wt?wt.name:'Подготовка';
    byType[nm]=(byType[nm]||0)+Number(e.volume);
  });
  return {days:Object.keys(days).length,vol:vol,byType:byType};
}

function getHdrEarn(){
  const p=ui?.hdrPeriod||'all';const now=new Date();const td=today();
  const curM=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  return S.entries.filter(e=>{
    if(p==='all')return true;
    if(p==='day')return e.dateFrom===td;
    if(p==='week'){const d=new Date(e.dateFrom+'T12:00');return(now-d)/864e5<7;}
    if(p==='month')return e.dateFrom.slice(0,7)===curM;
    return true;
  }).reduce((s,e)=>s+entEarn(e),0);
}

function _pickPhotos(opts,cb){
  // opts: {multiple:bool, title:string}
  var title=opts&&opts.title?opts.title:'Добавить фото';
  var multi=opts&&opts.multiple!==false;
  showModal(
    '\x3cdiv class="sheet">\x3cdiv class="shdl">\x3c/div>'
    +'\x3cdiv class="shtitle">'+esc(title)+'\x3c/div>'
    +'\x3cdiv class="shbody" style="padding:16px;display:flex;flex-direction:column;gap:12px">'
      +'\x3cbutton class="btn btn-gold" style="font-size:15px;padding:14px" data-a="photo-pick-cam">📷 Сфотографировать\x3c/button>'
      +'\x3cbutton class="btn btn-ghost" style="font-size:15px;padding:14px" data-a="photo-pick-gal">🖼 Выбрать из галереи'+(multi?' (несколько)':'')+'\x3c/button>'
    +'\x3c/div>'
    +'\x3cdiv class="shfoot">\x3cbutton class="btn btn-ghost" data-a="close-modal">Отмена\x3c/button>\x3c/div>'
  +'\x3c/div>');
  function pick(capture,multiple){
    closeModal();
    var inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';
    if(capture)inp.capture='environment';
    if(multiple)inp.multiple=true;
    inp.onchange=function(){
      var files=Array.from(inp.files||[]);
      if(!files.length)return;
      var pending=files.length;var results=[];
      files.forEach(function(f){
        _compressImg(f,function(dataUrl){
          if(dataUrl)results.push(dataUrl);
          pending--;
          if(pending===0)cb(results);
        });
      });
    };
    inp.click();
  }
  window._photoPickCam=function(){pick(true,false);};
  window._photoPickGal=function(){pick(false,multi);};
}

function _compressImg(file,cb,opts){
  // opts: {maxDim:number, quality:number}
  const maxDim=(opts&&opts.maxDim)||800;
  const quality=(opts&&opts.quality)||0.60;
  const WARN_MB=1.5; // предупреждаем если > 1.5МБ
  if(file.size>WARN_MB*1024*1024){
    toast('⚠ Большое фото — сжимаем до '+maxDim+'px. Экономьте память: делайте Экспорт регулярно.');
  }
  const reader=new FileReader();
  reader.onload=function(ev){
    const img=new Image();
    img.onload=function(){
      let w=img.width,h=img.height;
      const scale=Math.min(1,maxDim/Math.max(w,h));
      w=Math.round(w*scale);h=Math.round(h*scale);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/jpeg',quality);
      // Второй проход если всё ещё большое (> ~150KB base64)
      if(data.length>200000){
        const canvas2=document.createElement('canvas');
        const scale2=Math.min(1,640/Math.max(w,h));
        canvas2.width=Math.round(w*scale2);canvas2.height=Math.round(h*scale2);
        canvas2.getContext('2d').drawImage(canvas,0,0,canvas2.width,canvas2.height);
        try{cb(canvas2.toDataURL('image/jpeg',0.50));}catch(e){cb(data);}
      } else {
        try{cb(data);}catch(e){cb(ev.target.result);}
      }
    };
    img.onerror=function(){cb(ev.target.result);};
    img.src=ev.target.result;
  };
  reader.onerror=function(){cb(null);};
  reader.readAsDataURL(file);
}

function _burstFx(btn,icons,vibrate){
  try{
    icons=icons||['💵','💰','📊','✅','⭐'];
    if(vibrate&&navigator.vibrate)navigator.vibrate([40,30,40,30,80]);
    var r=btn.getBoundingClientRect();
    var cx=r.left+r.width/2,cy=r.top+r.height/2;
    var wrap=document.createElement('div');
    wrap.style.cssText='position:fixed;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:9999';
    document.body.appendChild(wrap);
    icons.forEach(function(ic,i){
      var el=document.createElement('div');
      el.textContent=ic;
      var ang=(i/icons.length)*Math.PI*2 - Math.PI/2;
      var dist=70+Math.random()*40;
      var dx=Math.cos(ang)*dist, dy=Math.sin(ang)*dist;
      el.style.cssText='position:absolute;left:'+cx+'px;top:'+cy+'px;font-size:22px;transform:translate(-50%,-50%);opacity:1;transition:transform 0.9s cubic-bezier(.2,.8,.3,1),opacity 0.9s ease-out;';
      wrap.appendChild(el);
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){
          el.style.transform='translate('+(dx-50)+'%,'+(dy-50)+'%) scale(1.4)';
          el.style.opacity='0';
        });
      });
    });
    setTimeout(function(){wrap.remove();},1100);
  }catch(e){}
}

    _clearStorageFail();
    document.querySelectorAll('.usave').forEach(el=>{
      el.textContent='✓';el.className='usave ok';
      clearTimeout(el._t);el._t=setTimeout(()=>{el.textContent='●';el.className='usave';},1600);

  }

}

function _wpRecalc(){

  if(pcts.length===0){hint.textContent='';return;}

  var allEmpty=pcts.every(function(p){return !p.value;});
  if(allEmpty){hint.textContent='\u0411\u0435\u0437 % \u2014 \u043f\u043e\u0440\u043e\u0432\u043d\u0443 ('+Math.round(100/pcts.length)+'% \u043a\u0430\u0436\u0434\u043e\u043c\u0443)';hint.className='wp-hint';}
  else if(Math.abs(sum-100)>0.5){hint.textContent='\u0421\u0443\u043c\u043c\u0430: '+sum.toFixed(0)+'% (\u043d\u0443\u0436\u043d\u043e 100%)';hint.className='wp-hint wp-warn';}
  else{hint.textContent='\u0421\u0443\u043c\u043c\u0430: 100% \u2713';hint.className='wp-hint wp-ok';}

}

function _matCalcHTML(f){
  var b=S.buildings.find(function(x){return x.id===ui.bid;});if(!b)return '';
  var wtId=(document.getElementById('ew')||{}).value||(f.workTypeId)||((b.workTypes||[])[0]||{}).id;
  var wt=(b.workTypes||[]).find(function(w){return w.id===wtId;});
  if(!wt||!wt.mats)return '';
  var vol=parseFloat((document.getElementById('ev')||{}).value||f.volume||0)||0;
  if(vol<=0)return '\x3cdiv class="mc-hint">Введите объём — покажу сколько нужно материалов\x3c/div>';
  var target=Number(wt.targetArea)||0;
  var keys=Object.keys(wt.mats);
  if(!keys.length)return '';
  var rows=keys.map(function(k){
    var norm=Number(wt.mats[k].qty)||0;
    var iLen2=(typeof getILen==='function')?getILen(k):0;
    var need=0;
    if(target>0&&norm>0){
      need=Math.ceil(norm/target*vol);
    } else if(iLen2>0&&norm<=0){
      // Нет нормы — считаем из пог.м: объём*1000мм / длина штуки
      var unit2=wt.unit||'м²';
      if(unit2.includes('пог')||unit2==='м'||unit2.includes('м')){
        need=Math.ceil(vol*1000/iLen2);
      }
    }
    if(!need)return '';
    var have=(typeof rem==='function')?rem(k):0;
    var lbl=(typeof getMatLabel==='function')?getMatLabel(k):k;
    var enough=have>=need;
    return '\x3cdiv class="mc-row '+(enough?'mc-ok':'mc-low')+'">'
      +'\x3cspan class="mc-name">'+esc(lbl)+'\x3c/span>'
      +'\x3cspan class="mc-need">нужно '+need+' шт\x3c/span>'
      +'\x3cspan class="mc-have">'+(enough?'✓ есть '+have:'⚠ только '+have)+'\x3c/span>'
      +'\x3c/div>';
  }).filter(Boolean).join('');
  if(!rows)return '';
  return '\x3cdiv class="mc-title">🧮 Расчёт: '+vol+' '+(wt.unit||'м²')+'\x3c/div>'+rows;
}

// Форматирует остаток с iLen в метры или штуки
function fmtLen(qty,iLen){
  if(!iLen||iLen<=0)return qty+' шт';
  var totalMm=qty*iLen;

  return totalMm+' мм';
}

    var iLen=getILen(k)||0;
    var need;

function _trackId(){
  try{var id=localStorage.getItem('bpro_uid');if(!id){id='u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);localStorage.setItem('bpro_uid',id);}return id;}catch(e){return 'anon';}

function _track(event,extra){
  if(!TRACK_ON||!TRACK_BOT_TOKEN||!TRACK_CHAT_ID)return;
  var uid=_trackId();
  var msg='📊 '+VER+' | '+uid+'\n'+event+(extra?' · '+extra:'');

}
function _trackQueue(msg){
  try{var q=JSON.parse(localStorage.getItem('bpro_tq')||'[]');q.push(msg);if(q.length>50)q=q.slice(-50);localStorage.setItem('bpro_tq',JSON.stringify(q));}catch(e){}
}
function _trackFlush(){
  if(navigator.onLine===false)return;
  var q=[];try{q=JSON.parse(localStorage.getItem('bpro_tq')||'[]');}catch(e){}
  if(!q.length)return;
  var msg=q.shift();
  try{localStorage.setItem('bpro_tq',JSON.stringify(q));}catch(e){}
  var url='https://api.telegram.org/bot'+TRACK_BOT_TOKEN+'/sendMessage';
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TRACK_CHAT_ID,text:msg})}).then(function(){if(q.length)setTimeout(_trackFlush,400);}).catch(function(){_trackQueue(msg);});
}

function _trackVisit(){

function sheetTsFull(){

  var firstDay=new Date(Y,M,1);var lastDate=new Date(Y,M+1,0).getDate();
  var days=[];
  for(var d=1;d<=lastDate;d++){
    var dd=new Date(Y,M,d);
    if(dd.getDay()!==0)days.push(dd);
  }
  var MONTH_NAMES=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  var DAY_SHORT=['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  var users=S.users||[];

  var STATUS_LBL={p:'П',h:'½',a:'Х',b:'Б',v:'О',u:'С'};
  var STATUS_CLS={p:'ts-p',h:'ts-h',a:'ts-a',b:'ts-b',v:'ts-v',u:'ts-u'};
  // Статистика за месяц по каждому работнику
  function workerStat(uid){
    var p=0,h=0,a=0,b=0,v=0;
    days.forEach(function(d){var st=_tsGet(uid,_ymdLocal(d));if(st==='p')p++;else if(st==='h')h++;else if(st==='a')a++;else if(st==='b')b++;else if(st==='v')v++;});

  }
  var html='\x3cdiv class="sheet" style="max-height:95vh">';
  html+='\x3cdiv class="shdl">\x3c/div>';
  html+='\x3cdiv style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px 8px">';
  html+='\x3cbutton style="background:none;border:none;color:var(--gold);font-size:20px;padding:4px 10px;cursor:pointer" data-a="ts-nav" data-d="-1">‹\x3c/button>';
  html+='\x3cspan style="font-weight:700;font-size:16px">'+MONTH_NAMES[M]+' '+Y+'\x3c/span>';
  html+='\x3cbutton style="background:none;border:none;color:var(--gold);font-size:20px;padding:4px 10px;cursor:pointer" data-a="ts-nav" data-d="1">›\x3c/button>';
  html+='\x3c/div>';
  html+='\x3cdiv class="ts-legend" style="padding:0 16px 8px">П — пришёл · ½ — полдня · Х — прогул · Б — больничный · О — отпуск · С — за свой счёт\x3c/div>';
  html+='\x3cdiv style="overflow:auto;max-height:calc(95vh - 140px)">\x3ctable class="ts-table" style="min-width:max-content">';
  html+='\x3ctr>\x3cth class="ts-name-h" style="position:sticky;left:0;z-index:2;background:var(--bg2)">Работник\x3c/th>';
  days.forEach(function(d){

    html+='\x3cth style="font-size:9px;min-width:28px;'+(isSat?'color:var(--gold)':'')+'">';
    html+=DAY_SHORT[d.getDay()]+'<br>'+d.getDate();
    html+='\x3c/th>';
  });
  html+='\x3cth style="background:var(--bg3);font-size:10px;padding:4px 6px;white-space:nowrap">Итого\x3c/th>\x3c/tr>';

function _tsGet(uid,date){var r=(S.timesheet||[]).find(function(x){return x.uid===uid&&x.date===date;});return r?r.status:null;}
function _tsSet(uid,date,status){
  if(!S.timesheet)S.timesheet=[];
  var r=S.timesheet.find(function(x){return x.uid===uid&&x.date===date;});
  if(r){if(status===null){S.timesheet=S.timesheet.filter(function(x){return x!==r;});}else r.status=status;}
  else if(status!==null)S.timesheet.push({uid:uid,date:date,status:status});
}
// attendance stats for a worker over last N days
function _tsStats(uid,days){
  days=days||30;var now=new Date();var present=0,half=0,absent=0,marked=0,vacation=0,unpaid=0;
  for(var i=0;i<days;i++){
    var d=new Date(now);d.setDate(now.getDate()-i);
    if(d.getDay()===0)continue;
    var dt=_ymdLocal(d);var st=_tsGet(uid,dt);
    if(st==='p'){present++;marked++;}
    else if(st==='h'){half++;marked++;}
    else if(st==='a'){absent++;marked++;}
    else if(st==='b'){absent++;marked++;}
    else if(st==='v'){vacation++;}
    else if(st==='u'){unpaid++;}
  }
  var workDays=present+half*0.5;
  var attendance=marked>0?Math.round((present+half*0.5)/(present+half+absent)*100):null;
  return {present:present,half:half,absent:absent,marked:marked,workDays:workDays,attendance:attendance,vacation:vacation,unpaid:unpaid};
}
// Явка из табеля за ВСЁ ВРЕМЯ — единая шкала для досье и сравнения
function _tsAttendanceAll(uid){
  var ts=S.timesheet||[];
  var userTs=ts.filter(function(r){return r.uid===uid;});
  if(!userTs.length)return null;
  var present=0,half=0,absent=0;
  userTs.forEach(function(r){
    if(r.status==='p')present++;
    else if(r.status==='h')half++;
    else if(r.status==='a'||r.status==='b')absent++;
    // v,u — не считаем как прогул
  });
  var marked=present+half+absent;
  if(!marked)return null;
  return Math.round((present+half*0.5)/marked*100);
}
function _ymdLocal(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
// Worker rating 0-10: combines productivity (vs best) + attendance
function _globalMaxDayVol(){
  if(_globalMaxDayVol._cache)return _globalMaxDayVol._cache;
  var dvs=(S.users||[]).map(function(u){
    var ents=S.entries.filter(function(e){return _wShare(e,u.id)>0;});
    if(!ents.length)return 0;
    var days={};ents.forEach(function(e){if(new Date(e.dateFrom+'T12:00').getDay()!==0)days[e.dateFrom]=1;});
    var dCnt=Object.keys(days).length||1;
    return ents.reduce(function(s,e){return s+Number(e.volume);},0)/dCnt;
  }).filter(function(v){return v>0;});
  var result=dvs.length?Math.max.apply(null,dvs):1;
  _globalMaxDayVol._cache=result;
  setTimeout(function(){_globalMaxDayVol._cache=null;},5000); // сброс через 5с
  return result;
}
function _workerRating(dayVol,maxDayVol,attendance){
  var prod=maxDayVol>0?(dayVol/maxDayVol):0;
  var att=(attendance!=null&&!isNaN(attendance))?Math.min(1,Math.max(0,attendance)):0.8;
  var score=(prod*0.6+att*0.4)*10;
  var s=Math.max(1,Math.min(10,score));
  return isNaN(s)?1:Math.round(s);
}

// Зарплата работников по корпусу (с учётом долей _wShare)
function _salaryByBuilding(bid){
  var byU={};
  // Fast: iterate entries, then only involved workers (not all 200)
  (S.entries||[]).filter(function(e){return e.buildingId===bid;}).forEach(function(e){
    var earn=entEarn(e);var vol=Number(e.volume||0);
    var workers=e.workers&&e.workers.length?e.workers:(e.worker?[{id:e.worker,pct:100}]:[]);
    var tot=workers.reduce(function(s,x){return s+(x.pct||0);},0)||100;
    workers.forEach(function(w){
      var sh=(w.pct||0)/tot;if(sh<=0)return;
      var u=(S.users||[]).find(function(x){return x.id===w.id;});
      if(!u)return;
      if(!byU[u.id])byU[u.id]={id:u.id,name:u.name,team:u.team||'',earn:0,vol:0};
      byU[u.id].earn+=earn*sh;
      byU[u.id].vol+=vol*sh;
    });
  });
  return Object.values(byU).sort(function(a,b){return b.earn-a.earn;});
}
// Зарплата по бригадам (по всем объектам)
function _salaryByBrigade(){
  var byT={};
  (S.entries||[]).forEach(function(e){
    var earn=entEarn(e);var vol=Number(e.volume||0);
    var workers=e.workers&&e.workers.length?e.workers:(e.worker?[{id:e.worker,pct:100}]:[]);
    var tot=workers.reduce(function(s,x){return s+(x.pct||0);},0)||100;
    workers.forEach(function(w){
      var sh=(w.pct||0)/tot;if(sh<=0)return;
      var u=(S.users||[]).find(function(x){return x.id===w.id;});
      if(!u)return;
      var t=u.team||'Без бригады';
      if(!byT[t])byT[t]={team:t,earn:0,vol:0,members:{}};
      byT[t].earn+=earn*sh;
      byT[t].vol+=vol*sh;
      byT[t].members[u.id]=1;
    });
  });
  return Object.values(byT).map(function(t){t.headcount=Object.keys(t.members).length;return t;}).sort(function(a,b){return b.earn-a.earn;});
}

function _syncEntryNote(entryId,bldId,noteTxt,dateStr,projName){
  if(!S.notes)S.notes=[];
  const n=S.notes.find(function(x){return x.entryId===entryId;});
  if(noteTxt){
    if(n){n.text=noteTxt;n.date=dateStr;n.buildingId=bldId;}
    else S.notes.push({id:uid(),text:noteTxt,date:dateStr,buildingId:bldId,source:projName||'',entryId:entryId});
  }else if(n){
    S.notes=S.notes.filter(function(x){return x.entryId!==entryId;});
  }
  if(!S.goals)S.goals=[];
  const g=S.goals.find(function(x){return x.entryId===entryId;});
  if(noteTxt){
    if(!g){S.goals.push({id:uid(),text:noteTxt,date:dateStr,time:'',buildingId:bldId,done:false,hidden:false,fromNote:true,entryId:entryId});}
    else if(!g.done){g.text=noteTxt;g.date=dateStr;}
  }else if(g&&!g.done&&g.fromNote){
    S.goals=S.goals.filter(function(x){return x.id!==g.id;});
  }
}

function renderShifts(){
  const today=_ymdLocal(new Date());
  const rateUsers=(S.users||[]).filter(u=>u.mode==='rate'||u.team==='Уборка/Ставка');
  const allUsers=rateUsers.length?rateUsers:(S.users||[]);

  // Быстрый табель сегодня
  let tsHtml='<div class="card"><div class="card-title">📋 Табель сегодня</div>';
  tsHtml+='<div class="ts-scroll"><table class="ts-table"><tr><th class="ts-name-h"></th><th>Сегодня</th></tr>';
  allUsers.forEach(u=>{
    const st=_tsGet(u.id,today);
    const cls=st==='p'?'ts-cell ts-p':st==='h'?'ts-cell ts-h':st==='a'?'ts-cell ts-a':st==='b'?'ts-cell ts-b':'ts-cell';
    const lbl=st==='p'?'П':st==='h'?'½':st==='a'?'Х':st==='b'?'Б':'';
    tsHtml+=`\x3ctr>\x3ctd class="ts-name">${esc(u.name.split(' ')[0])}\x3c/td>\x3ctd class="${cls}" data-a="ts-tap" data-uid="${u.id}" data-date="${today}">${lbl}\x3c/td>\x3c/tr>`;
  });
  tsHtml+='</table></div><div class="ts-legend" style="margin-top:8px">П — пришёл · ½ — полдня · Х — прогул · Б — больничный</div></div>';

  // Наряды — записи журнала с mode=rate или из b_rate1
  const rateEntries=(S.entries||[]).filter(e=>e.mode==='rate'||e.buildingId==='b_rate1')
    .sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom));

  // Группируем по дате
  const byDate={};
  rateEntries.forEach(e=>{
    if(!byDate[e.dateFrom])byDate[e.dateFrom]=[];
    byDate[e.dateFrom].push(e);
  });

  let naryadHtml='<div class="card"><div class="card-title">🧾 Наряды</div>';
  const dates=Object.keys(byDate).sort().reverse().slice(0,30);
  if(!dates.length){
    naryadHtml+='<div style="color:var(--text-dim);font-size:13px;padding:8px 0">Нет записей. Добавьте через Журнал.</div>';
  } else {
    dates.forEach(dt=>{
      naryadHtml+=`\x3cdiv class="ts-h s-dim" style="margin-top:10px;font-size:12px">${dt}\x3c/div>`;
      byDate[dt].forEach(e=>{
        const bld=S.buildings.find(b=>b.id===e.buildingId);
        const wt=bld?(bld.workTypes||[]).find(w=>w.id===e.workTypeId):null;
        const wtName=wt?wt.name:e.workTypeId;
        const earnTotal=entEarn(e);
        const wNames=(e.workers||[]).map(w=>{const u=S.users.find(x=>x.id===w.id);return u?u.name.split(' ')[0]:'?';}).join(', ');
        const shift=e.shift?` · ${e.shift}`:'';
        const times=(e.timeFrom&&e.timeTo)?` ${e.timeFrom}–${e.timeTo}`:'';
        naryadHtml+=`\x3cdiv class="entry-row" style="flex-direction:column;align-items:flex-start;gap:4px">
          \x3cdiv style="display:flex;justify-content:space-between;width:100%">
            \x3cspan style="font-weight:600">${esc(wtName)}${shift}${times}\x3c/span>
            \x3cspan class="earn-val">${fmtRub(Math.round(earnTotal))}\x3c/span>
          \x3c/div>
          \x3cdiv style="font-size:12px;color:var(--text-dim)">${esc(wNames)}${e.notes?' · '+esc(e.notes):''}\x3c/div>
        \x3c/div>`;
      });
    });
  }
  naryadHtml+='</div>';

  return `\x3cdiv class="scroll-pad">${tsHtml}${naryadHtml}\x3c/div>`;
}

  // Main stock list — tabs by material category
  const catTab=ui.whCat||'main';

  const _lastTs=(k)=>{const rs=(S.wlog||[]).filter(r=>r.key===k);if(!rs.length)return 0;return Math.max(...rs.map(r=>new Date((r.date||'2000-01-01')+'T'+(r.time||'00:00')).getTime()||0));};

  const matRows=mats.map(m=>{
    const inn=totalIn(m.key,bldFilter),out=totalOut(m.key,bldFilter),left=rem(m.key,bldFilter);
    const pSz=getPack(m.key),iLen=getILen(m.key),kgUnit=getKg(m.key);
    const crit=left<0,warn=inn>0&&left>=0&&left<pSz*2;
    const leftKg=(left*kgUnit).toFixed(2);
    const wlogK=(S.wlog||[]).filter(r=>r.key===m.key).slice().reverse();
    const isOpen=ui.whOpen===m.key;
    const leftM=iLen>0?left*iLen/1000:left;
    const stColor=crit?'var(--red)':leftM<10?'#e74c3c':leftM<50?'#f39c12':leftM<100?'#27ae60':leftM>=500?'#3498db':'var(--green)';
    const compactHead=`\x3cdiv class="wr-compact" data-a="toggle-wr" data-key="${m.key}">

      \x3cdiv class="wrc-right">
        \x3cdiv class="wrc-stock" style="color:${stColor}">${iLen>0?((left*iLen/1000).toFixed(left*iLen%1000===0?0:1)):left}\x3cspan class="wrc-unit">${iLen>0?'пог.м':'шт'}\x3c/span>${iLen>0?'\x3cspan class="wrc-pcs"> ('+left+' шт)\x3c/span>':''}\x3c/div>
        \x3cspan class="wrc-arr">${isOpen?'▲':'▼'}\x3c/span>

    }
    return`\x3cdiv class="wr" style="border-left:3px solid ${stColor}">
      ${compactHead}
      \x3cdiv class="wr-acts-row">
        \x3cbutton class="act-s" data-a="edit-mat" data-key="${m.key}">⚙ Настр.\x3c/button>
        ${(inn>0||out>0)?`\x3cbutton class="act-s" data-a="del-mat-all" data-key="${m.key}">🧹 Очистить\x3c/button>`:''}

      \x3c/div>
      ${inn>0||out>0?`\x3cdiv class="wr-nums">
        \x3cdiv class="wn"><b class="wn-in">+${inn}\x3c/b><s>Приход\x3c/s>\x3c/div>
        \x3cdiv class="wn"><b class="wn-out">−${out}\x3c/b><s>Расход\x3c/s>\x3c/div>
        \x3cdiv class="wn"><b class="${crit?'wn-crit':warn?'wn-warn':'wn-ok'}">${left}\x3c/b><s>Остаток\x3c/s>\x3c/div>
        \x3cdiv class="wn"><b>${(left/pSz).toFixed(1)}\x3c/b><s>Пачек\x3c/s>\x3c/div>
        ${kgUnit>0?`\x3cdiv class="wn"><b>${leftKg}\x3c/b><s>кг\x3c/s>\x3c/div>`:''}
      \x3c/div>`:`\x3cdiv class="wr-empty">Нет данных — добавьте приход\x3c/div>`}
      ${((S.matCfg[m.key]||{}).kit||[]).length?`\x3cdiv class="kit-inline">
        <span class="kit-inline-lbl">📦 В сборе:</span>
        ${((S.matCfg[m.key]||{}).kit||[]).map(c=>{
          const cLeft=rem(c.key,ui.whBldFilter||'');
          const cLow=cLeft<c.qty;
          return `<span class="kit-inline-comp ${cLow?'kit-low':'kit-ok'}"><b>${c.qty}×</b> ${esc(getMatLabel(c.key))} <span class="kit-stock">[${Math.round(cLeft)}]</span></span>`;
        }).join('')}
        <span style="font-size:10px;color:var(--muted)"> · при Приходе добавится автоматически</span>
      \x3c/div>`:''}
      \x3cdiv class="wr-add">
        \x3cinput type="number" data-wk="${m.key}" placeholder="кол-во" inputmode="numeric" class="wr-qty-inp" style="width:72px;padding:7px 8px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text);font-size:13px">
        \x3cbutton class="wr-btn" data-a="add-wh" data-key="${m.key}">+ Приход\x3c/button>
        \x3cbutton class="wr-btn wr-move" data-a="move-mat" data-key="${m.key}">\ud83d\udd04 Перем\x3c/button>
        \x3cbutton class="wr-btn wr-adj" data-a="adj-mat" data-key="${m.key}">\u270f \u041e\u0441\u0442\u0430\u0442\u043e\u043a\x3c/button>
        \x3cbutton class="wr-btn wr-exp" data-a="sub-wh" data-key="${m.key}">− Расход\x3c/button>
      \x3c/div>
      ${wlogK.length?`\x3cdiv class="wh-hist">
        ${wlogK.map(r=>`\x3cdiv class="wh-r">
          \x3cspan class="wh-d">${fmtDt(r.date,r.time)}\x3c/span>

          ${r.kit?`\x3cspan class="wh-bld" style="color:var(--gold)">📦 ${esc(r.kit)}\x3c/span>`:r.buildingId?`\x3cspan class="wh-bld">${esc((S.buildings.find(b=>b.id===r.buildingId)||{name:'?'}).name)}\x3c/span>`:''}
          \x3cbutton class="act-s act-s-del" data-a="del-wlog" data-id="${r.id}">✕\x3c/button>
        \x3c/div>`).join('')}
      \x3c/div>`:''}
    \x3c/div>`;
  }).join('');

  return bldBar+tabBar+`\x3cdiv class="wh-search-row">
    <input type="text" placeholder="🔍 Поиск по складу..." value="${esc(ui.whSearch||'')}" oninput="var _v=this.value;ui.whSearch=_v;clearTimeout(window._whSearchTimer);window._whSearchTimer=setTimeout(function(){render();setTimeout(function(){var el=document.getElementById('wh-search-inp');if(el){el.focus();el.setSelectionRange(_v.length,_v.length);}},0);},350)" class="wh-search-inp" id="wh-search-inp">
  </div>\x3cdiv class="cat-tabs">

}


function renderWorkerCard(uid){
  const u=(S.users||[]).find(x=>x.id===uid);
  if(!u)return;
  const uEntries=(S.entries||[]).filter(e=>(e.workers||[]).some(w=>w.id===uid)||(e.worker===uid));
  const totalEarn=uEntries.reduce((s,e)=>{
    const w=(e.workers||[]).find(x=>x.id===uid);
    const pct=w?w.pct/100:1;
    return s+entEarn(e)*pct;
  },0);
  const totalVol=uEntries.reduce((s,e)=>{
    const w=(e.workers||[]).find(x=>x.id===uid);
    const pct=w?w.pct/100:1;
    return s+Number(e.volume||0)*pct;
  },0);
  const workDays=new Set(uEntries.map(e=>e.dateFrom)).size;
  const lastEntry=uEntries.slice().sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom))[0];
  const avgDay=workDays?totalVol/workDays:0;
  const initials=u.avatar||((u.name||'?').split(' ').map(p=>p[0]||'').join('').slice(0,2).toUpperCase()||'?');
  // По видам работ
  const wtBreak={};
  uEntries.forEach(e=>{
    const bld=S.buildings.find(b=>b.id===e.buildingId);
    const wt=bld?(bld.workTypes||[]).find(w=>w.id===e.workTypeId):null;
    const name=wt?wt.name:e.workTypeId;
    if(!wtBreak[name])wtBreak[name]={earn:0,vol:0};
    const w=(e.workers||[]).find(x=>x.id===uid);
    const pct=w?w.pct/100:1;
    wtBreak[name].earn+=entEarn(e)*pct;
    wtBreak[name].vol+=Number(e.volume||0)*pct;
  });
  const topWts=Object.entries(wtBreak).sort((a,b)=>b[1].earn-a[1].earn).slice(0,5);
  // Последние записи
  const recent=uEntries.slice().sort((a,b)=>b.dateFrom.localeCompare(a.dateFrom)).slice(0,8);
  // Единая шкала с "Сравнением работников" — явка из табеля за всё время
  var _globalMaxDv=_globalMaxDayVol();
  var _attAll=_tsAttendanceAll(uid);
  var _attendance=_attAll!==null?_attAll/100:workDays/(workDays+3||1);
  const ratingScore=_workerRating(avgDay,_globalMaxDv,_attendance);

  showModal(`<div class="sheet"><div class="shdl"></div>
    <div class="shtitle">Досье работника</div>
    <div class="shbody"><div class="worker-card-modal">
      <div class="wc-header">
        <div class="wc-avatar">${initials}</div>
        <div><div class="wc-name">${esc(u.name)}</div>
        <div class="wc-team">${esc(u.team||'Без бригады')}</div>
        <div class="wc-rating">${'★'.repeat(Math.round(+ratingScore||0))}${'☆'.repeat(10-Math.round(+ratingScore||0))} <span style="font-size:11px;color:var(--text-dim)">${(+ratingScore||0).toFixed(1)}/10</span></div></div>
      </div>
      <div class="wc-stats">
        <div class="wc-stat" style="background:rgba(52,152,219,.13);border:1px solid rgba(52,152,219,.3)"><div class="wc-stat-v" style="color:#3498db">${fmtRub(Math.round(totalEarn))}</div><div class="wc-stat-l">Заработок</div></div>
        <div class="wc-stat" style="background:rgba(39,174,96,.13);border:1px solid rgba(39,174,96,.3)"><div class="wc-stat-v" style="color:#27ae60">${fmtRub(Math.round(totalEarn*_taxMul()))}</div><div class="wc-stat-l">${_taxPctLbl()} (на руки)</div></div>
        <div class="wc-stat"><div class="wc-stat-v">${totalVol.toFixed(1)} <span style="font-size:13px">м²</span></div><div class="wc-stat-l">Выработка</div></div>
        <div class="wc-stat"><div class="wc-stat-v">${workDays}</div><div class="wc-stat-l">Рабочих дней</div></div>
        <div class="wc-stat"><div class="wc-stat-v">${avgDay.toFixed(1)}</div><div class="wc-stat-l">м²/день</div></div>
        <div class="wc-stat"><div class="wc-stat-v">${uEntries.length}</div><div class="wc-stat-l">Записей</div></div>
      </div>
      ${topWts.length?`<div class="wc-section">Виды работ</div>${topWts.map(([n,w])=>{
        const bld2=S.buildings.find(b=>(b.workTypes||[]).some(wt=>wt.name===n));
        const wtObj=bld2?(bld2.workTypes||[]).find(wt=>wt.name===n):null;
        const clr=wtObj?wtObj.color:'var(--gold)';
        return `<div class="wc-entry-row" style="border-left:3px solid ${clr};padding-left:8px"><span>${esc(n)}</span><span class="wc-entry-earn" style="color:${clr}">${fmtRub(Math.round(w.earn))}</span></div>`;
      }).join('')}`:''}
      <div class="wc-section">Примечание</div>
      <div style="position:relative">
        <textarea id="wc-note-${uid}" placeholder="Заметки о работнике..." style="width:100%;min-height:70px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--text);font-size:13px;font-family:var(--font);resize:vertical;box-sizing:border-box">${esc((S.userNotes&&S.userNotes[uid])||'')}</textarea>
        <button onclick="_saveWorkerNote('${uid}')" style="margin-top:4px;background:var(--gold);color:#1a1a1a;border:none;border-radius:8px;padding:6px 16px;font-weight:700;cursor:pointer;font-size:13px;font-family:var(--font)">💾 Сохранить</button>
      </div>
      ${recent.length?`<div class="wc-section">Последние записи</div>${recent.map(e=>{const bld=S.buildings.find(b=>b.id===e.buildingId);const wt=bld?(bld.workTypes||[]).find(w=>w.id===e.workTypeId):null;const pw=(e.workers||[]).find(x=>x.id===uid);const pct=pw?pw.pct/100:1;return `<div class="wc-entry-row"><div><div>${esc(wt?wt.name:e.workTypeId)} · ${Number(e.volume||0).toFixed(1)} м²</div><div class="wc-entry-date">${e.dateFrom}${bld?' · '+esc(bld.name):''}</div></div><span class="wc-entry-earn">${fmtRub(Math.round(entEarn(e)*pct))}</span></div>`;}).join('')}`:'<div style="color:var(--text-dim);font-size:13px;padding:8px 0">Нет записей</div>'}
    </div></div>
    <div class="shfoot"><button class="btn btn-ghost" data-a="close-modal">Закрыть</button></div>
  </div>`);
}

const _AVATARS=['👷','👷‍♀️','🧱','🔨','⚒️','🪚','🔧','🪛','👤','🧔','🧑‍🔧','👩‍🔧'];


function _bindUserBtns(){
  // Вешаем обработчики на кнопки удаления/редактирования работников напрямую
  document.querySelectorAll('[data-bind-del-user]').forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var uid=btn.dataset.bindDelUser;
      var u=(S.users||[]).find(function(x){return x.id===uid;});

      if(!confirm('Удалить '+u.name+'?'))return;
      act(function(){S.users=(S.users||[]).filter(function(x){return x.id!==uid;});});
      toast('🗑 Удалён');
    };
  });
  document.querySelectorAll('[data-bind-edit-user]').forEach(function(btn){
    btn.onclick=function(e){
      e.stopPropagation();
      var uid=btn.dataset.bindEditUser;
      var u=(S.users||[]).find(function(x){return x.id===uid;});
      if(u)_showUserForm(u);
    };
  });
}

function renderWhLow(){
  const deficit=MATS.filter(m=>rem(m.key)<0);
  const warning=MATS.filter(m=>{const r=rem(m.key),p=getPack(m.key);return totalIn(m.key)>0&&r>=0&&r<p*2;});
  if(!deficit.length&&!warning.length)return`\x3cdiv class="sp">\x3c/div>`+emptyScreen('✅','Всё в норме','Дефицита нет');
  const rows=(grp,title,cls)=>!grp.length?'':
    `\x3cdiv class="low-sec">
      \x3cdiv class="low-title ${cls}">${title}\x3c/div>
      \x3cdiv class="low-hdr">
        \x3cspan>Материал\x3c/span>
        \x3cspan>В наличии\x3c/span>
        \x3cspan>Пачек\x3c/span>
        \x3cspan>\x3c/span>
      \x3c/div>
      ${grp.map(m=>{
        const left=rem(m.key),inn=totalIn(m.key),out=totalOut(m.key);
        const pSz=getPack(m.key);
        const packs=(left/pSz).toFixed(1);
        const iLen=getILen(m.key);
        const meters=iLen>0&&left>0?' · '+(left*iLen/1000).toFixed(1)+'м':'';
        const crit=left<0;
        return`\x3cdiv class="low-row">
          \x3cdiv class="low-name">${esc(getMatLabel(m.key))}\x3c/div>
          \x3cdiv class="low-stock">
            \x3cspan class="low-num ${cls}">${left<0?'−'+Math.abs(left):'+'+inn+' − '+out+' = '+left}\x3c/span>
            \x3cspan class="low-unit">шт${meters}\x3c/span>
          \x3c/div>
          \x3cdiv class="low-packs ${crit?'low-crit':'low-warn'}">${left<0?'дефицит':packs+' пач'}\x3c/div>
          \x3cdiv style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
            \x3cbutton class="wr-btn" style="padding:5px 10px;font-size:11px" data-a="add-wh-for" data-key="${m.key}">+ Приход\x3c/button>
            \x3cbutton class="low-edit-btn" data-a="edit-mat" data-key="${m.key}">✏ Ред.\x3c/button>
          \x3c/div>
        \x3c/div>`;
      }).join('')}
    \x3c/div>`;
  return rows(deficit,'❌ Закончилось','low-crit')+rows(warning,'⚠ Заканчивается','low-warn')+`\x3cdiv class="sp">\x3c/div>`;
}

// ── EARN ──────────────────────────────────────────────────────

function _earnChartData(){
  const mode=ui.chartMode||'month';
  const now=new Date();
  const _ymd=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd;};
  let days=[];
  if(mode==='all'){
    const months={};
    (S.entries||[]).forEach(e=>{if(e.dateFrom){const mk=e.dateFrom.slice(0,7);if(!months[mk])months[mk]={vol:0,earn:0};months[mk].vol+=Number(e.volume||0);months[mk].earn+=entEarn(e);}});
    const keys=Object.keys(months).sort();
    let cum=0;let cumV=0;
    return keys.map(mk=>{cum+=months[mk].earn;cumV+=months[mk].vol;const[y,m]=mk.split('-');return{date:m+'.'+y.slice(2),vol:months[mk].vol,earn:Math.round(months[mk].earn),cum:Math.round(cum),cumVol:Math.round(cumV),isMonth:true};});
  }
  // month mode = last 30 days by day
  const N=30;
  for(let i=N-1;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(_ymd(d));}
  const startYmd=days[0];
  let cum=(S.entries||[]).reduce((s,e)=>(e.dateFrom&&e.dateFrom<startYmd)?s+entEarn(e):s,0);
  let cumV=(S.entries||[]).reduce((s,e)=>(e.dateFrom&&e.dateFrom<startYmd&&!_isPrepEntry(e))?s+Number(e.volume||0):s,0);
  return days.map(dt=>{
    const ents=S.entries.filter(e=>e.dateFrom===dt);
    const workEnts=ents.filter(e=>!_isPrepEntry(e));
    const prepEnts=ents.filter(e=>_isPrepEntry(e));
    const vol=workEnts.reduce((s,e)=>s+Number(e.volume),0);
    const prepVol=prepEnts.reduce((s,e)=>s+Number(e.volume),0);
    const earn=ents.reduce((s,e)=>s+entEarn(e),0);
    cum+=earn;cumV+=vol;
    return{date:dt.slice(8,10)+'.'+dt.slice(5,7),vol,prepVol,earn,cum,cumVol:cumV};
  });
}

function renderEarnChart(){
  const data=_earnChartData();
  const hasData=data.some(d=>d.vol>0||d.earn>0);
  if(!hasData)return'';
  const W=320,H=180,padL=34,padR=44,padT=14,padB=28;
  const cw=W-padL-padR,ch=H-padT-padB;
  const maxVol=Math.max(...data.map(d=>d.vol),1);
  const maxCum=Math.max(...data.map(d=>d.cum),1);
  const maxCumVol=Math.max(...data.map(d=>d.cumVol||0),1);
  const n=data.length;
  const bw=cw/n*0.6;
  const xAt=i=>padL+cw/n*(i+0.5);
  const barH=v=>v/maxVol*ch;
  const yLine=v=>padT+ch-(v/maxCum*ch);
  const yCumVolLine=v=>padT+ch-(v/maxCumVol*ch);
  // Bars (vol) — рабочий объём, синим
  const bars=data.map((d,i)=>{
    const hWork=barH(d.vol);
    const x=xAt(i)-bw/2;
    const yWork=padT+ch-hWork;
    return d.vol>0?`\x3crect x="${x.toFixed(1)}" y="${yWork.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,hWork).toFixed(1)}" rx="2" fill="#4a9fd4" opacity="0.85"/>`:'';
  }).join('');
  // Cumulative earn line
  const pts=data.map((d,i)=>`${xAt(i).toFixed(1)},${yLine(d.cum).toFixed(1)}`).join(' ');
  const dots=data.map((d,i)=>`\x3ccircle cx="${xAt(i).toFixed(1)}" cy="${yLine(d.cum).toFixed(1)}" r="3" fill="#d4920a"/>`).join('');
  // Cumulative volume line (накопленный объём, своя шкала)
  const ptsV=data.map((d,i)=>`${xAt(i).toFixed(1)},${yCumVolLine(d.cumVol||0).toFixed(1)}`).join(' ');
  const lastCumVol=data[data.length-1]?.cumVol||0;
  const cumVolLabel=`\x3ctext x="${(xAt(n-1)-4).toFixed(1)}" y="${(yCumVolLine(lastCumVol)-6).toFixed(1)}" font-size="8" fill="#2dd4bf" text-anchor="end">${lastCumVol.toFixed(0)} м²\x3c/text>`;
  // X labels (every other day to avoid clutter)
  const xlabels=data.map((d,i)=>{
    if(n>14&&i%3!==0)return'';if(n>8&&n<=14&&i%2!==0)return'';
    return`\x3ctext x="${xAt(i).toFixed(1)}" y="${H-8}" font-size="8" fill="var(--muted)" text-anchor="middle">${d.date}\x3c/text>`;
  }).join('');
  // Y axis left (vol) — 3 ticks
  const ylabelsL=[0,0.5,1].map(f=>{
    const v=(maxVol*f);const y=padT+ch-(f*ch);
    return`\x3ctext x="${padL-4}" y="${(y+3).toFixed(1)}" font-size="8" fill="#4a9fd4" text-anchor="end">${v.toFixed(0)}\x3c/text>`
      +`\x3cline x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.5" opacity="0.5"/>`;
  }).join('');
  // Y axis right (cum)
  const ylabelsR=[0,0.5,1].map(f=>{
    const v=(maxCum*f);const y=padT+ch-(f*ch);
    const lbl=v>=1000?(v/1000).toFixed(0)+'к':v.toFixed(0);
    return`\x3ctext x="${W-padR+4}" y="${(y+3).toFixed(1)}" font-size="8" fill="#d4920a" text-anchor="start">${lbl}\x3c/text>`;
  }).join('');
  const svg=`\x3csvg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    ${ylabelsL}${ylabelsR}${bars}
    \x3cpolyline points="${ptsV}" fill="none" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="3,3" stroke-linejoin="round" opacity="0.85"/>
    \x3cpolyline points="${pts}" fill="none" stroke="#d4920a" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${cumVolLabel}${xlabels}
  \x3c/svg>`;
  const chartMode=ui.chartMode||'month';
  return`\x3cdiv class="card chart-card">
    \x3cdiv class="card-title" style="display:flex;justify-content:space-between;align-items:center">
      \x3cspan>📊 Динамика ${chartMode==='all'?'за весь период':'за месяц'}\x3c/span>
      \x3cdiv style="display:flex;gap:5px">
        \x3cbutton class="psw${chartMode==='month'?' psw-on':''}" data-a="chart-mode" data-m="month" style="font-size:11px;padding:4px 10px">30 дн.\x3c/button>
        \x3cbutton class="psw${chartMode==='all'?' psw-on':''}" data-a="chart-mode" data-m="all" style="font-size:11px;padding:4px 10px">Год ↗\x3c/button>
      \x3c/div>
    \x3c/div>
    \x3cdiv class="chart-legend">
      \x3cspan class="cl-item">\x3cspan class="cl-dot" style="background:#4a9fd4">\x3c/span>Выработка м²\x3c/span>
      \x3cspan class="cl-item">\x3cspan class="cl-line" style="background:#2dd4bf">\x3c/span>Накоплено м²\x3c/span>
      \x3cspan class="cl-item">\x3cspan class="cl-line" style="background:#d4920a">\x3c/span>Накоплено ₽\x3c/span>
    \x3c/div>
    ${svg}
    \x3cbutton class="btn-distribute${ui&&ui.showDistrib?' on':''}" data-a="toggle-distrib" id="distrib-btn">${ui&&ui.showDistrib?'✕ Скрыть равномерное распределение':'📐 Распределить объём'}\x3c/button>
    ${ui&&ui.showDistrib?renderDistribChart(data):''}
  \x3c/div>`;
}

function renderDistribChart(data){
  // Равномерно распределяем суммарный объём и заработок месяца по рабочим дням (без воскресений)
  const totalVol=data.reduce((s,d)=>s+d.vol+(d.prepVol||0),0);
  const totalEarn=data.reduce((s,d)=>s+d.earn,0);
  const workDays=data.filter(d=>{
    // d.date формат "ДД.ММ" — нужен реальный день недели; восстановим из последовательности дней
    return true; // дни уже отфильтрованы выше (последние 30 дней), воскресенья учтём по индексу
  });
  // Считаем реальные рабочие дни (без воскресений) среди последних 30 дней
  const now=new Date();
  const N=data.length;
  const realDates=[];
  for(let i=N-1;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);realDates.push(d);}
  const wdCount=realDates.filter(d=>d.getDay()!==0).length||1;
  const perDayVol=totalVol/wdCount;
  const perDayEarn=totalEarn/wdCount;

  const W=320,H=150,padL=34,padR=44,padT=14,padB=28;
  const cw=W-padL-padR,ch=H-padT-padB;
  const n=data.length;
  const bw=cw/n*0.6;
  const xAt=i=>padL+cw/n*(i+0.5);
  const maxVol=perDayVol*1.2||1;
  const maxEarn=perDayEarn*1.2||1;
  const barH=v=>v/maxVol*ch;
  const yLine=v=>padT+ch-(v/maxEarn*ch);

  const bars=data.map((d,i)=>{
    const dt=realDates[i];
    const isSun=dt&&dt.getDay()===0;
    const v=isSun?0:perDayVol;
    const h=barH(v);const x=xAt(i)-bw/2;const y=padT+ch-h;
    return v>0?`\x3crect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="2" fill="#9b59b6" opacity="0.85"/>`:'';
  }).join('');
  const pts=data.map((d,i)=>{
    const dt=realDates[i];const isSun=dt&&dt.getDay()===0;
    return `${xAt(i).toFixed(1)},${yLine(isSun?0:perDayEarn).toFixed(1)}`;
  }).join(' ');
  const xlabels=data.map((d,i)=>{
    if(n>14&&i%3!==0)return'';if(n>8&&n<=14&&i%2!==0)return'';
    return`\x3ctext x="${xAt(i).toFixed(1)}" y="${H-8}" font-size="8" fill="var(--muted)" text-anchor="middle">${d.date}\x3c/text>`;
  }).join('');

  const svg2=`\x3csvg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;max-width:100%">
    ${bars}
    \x3cpolyline points="${pts}" fill="none" stroke="#e67e22" stroke-width="2.5" stroke-linejoin="round"/>
    ${xlabels}
  \x3c/svg>`;

  return `\x3cdiv class="distrib-wrap">
    \x3cdiv class="distrib-title">📐 Равномерно по рабочим дням (без воскресений)\x3c/div>
    \x3cdiv class="chart-legend">
      \x3cspan class="cl-item">\x3cspan class="cl-dot" style="background:#9b59b6">\x3c/span>Объём/день\x3c/span>
      \x3cspan class="cl-item">\x3cspan class="cl-line" style="background:#e67e22">\x3c/span>Заработок/день\x3c/span>
    \x3c/div>
    \x3cdiv class="chart-scroll">${svg2}\x3c/div>
    \x3cdiv class="distrib-stats">
      \x3cdiv class="distrib-stat">\x3cb>${perDayVol.toFixed(1)} м²\x3c/b>\x3cspan>в день\x3c/span>\x3c/div>
      \x3cdiv class="distrib-stat">\x3cb>${fmtRub(Math.round(perDayEarn))}\x3c/b>\x3cspan>в день\x3c/span>\x3c/div>
      \x3cdiv class="distrib-stat">\x3cb>${wdCount}\x3c/b>\x3cspan>раб. дней\x3c/span>\x3c/div>
    \x3c/div>
  \x3c/div>`;
}

function _renderCalendarCard(){
  var ym=(ui&&ui.calMonth)||today().slice(0,7);
  var parts=ym.split('-');var Y=parseInt(parts[0],10),M=parseInt(parts[1],10)-1;
  var first=new Date(Y,M,1);
  var lastDate=new Date(Y,M+1,0).getDate();
  var startWd=(first.getDay()+6)%7; // понедельник = 0
  var td=today();
  var dayMap={};
  (S.entries||[]).forEach(function(e){
    if(e.dateFrom&&e.dateFrom.slice(0,7)===ym){
      if(!dayMap[e.dateFrom])dayMap[e.dateFrom]={earn:0};
      dayMap[e.dateFrom].earn+=entEarn(e);
    }
  });
  var maxEarn=0;Object.keys(dayMap).forEach(function(k){if(dayMap[k].earn>maxEarn)maxEarn=dayMap[k].earn;});if(!maxEarn)maxEarn=1;
  var monthNames=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  var cells=[];
  for(var i=0;i<startWd;i++)cells.push('\x3cdiv>\x3c/div>');
  for(var d=1;d<=lastDate;d++){
    var ds=ym+'-'+String(d).padStart(2,'0');
    var isFuture=ds>td;
    var isToday=ds===td;
    var dayOfWeek=new Date(ds+'T12:00:00').getDay(); // 0=Sun,6=Sat
    var isWeekend=(dayOfWeek===0||dayOfWeek===6);
    var info=dayMap[ds];
    var style;
    if(isFuture){
      style='background:var(--bg3);color:var(--muted);opacity:.35';
    }else if(!info||info.earn<=0){
      var baseColor=isWeekend?'var(--gold-l)':'var(--bg3)';
      var textColor=isWeekend?'var(--gold)':'var(--text2)';
      style='background:'+baseColor+';color:'+textColor+(isToday?';box-shadow:0 0 0 2px var(--gold) inset':'');
    }else{
      var ratio=Math.min(1,info.earn/maxEarn);
      style='background:var(--green);opacity:'+(0.25+0.65*ratio).toFixed(2)+';color:#fff'+(isToday?';box-shadow:0 0 0 2px var(--gold) inset':'');
    }
    var clickAttr=isFuture?'':' data-a="cal-day" data-date="'+ds+'"';
    cells.push('\x3cdiv'+clickAttr+' style="aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:'+(isFuture?'default':'pointer')+';'+style+'">'+d+'\x3c/div>');
  }
  var monthLabel=monthNames[M]+' '+Y;
  var allTimeTotal=(S.entries||[]).reduce(function(s,e){return s+entEarn(e);},0);
  return '\x3cdiv class="card">'

function sheetCalDay(dateStr){
  var ents=(S.entries||[]).filter(function(e){return e.dateFrom===dateStr;});
  var earn=ents.reduce(function(s,e){return s+entEarn(e);},0);
  var vol=ents.reduce(function(s,e){return s+Number(e.volume||0);},0);
  var rows=ents.map(function(e){
    var b=S.buildings.find(function(x){return x.id===e.buildingId;});
    var wt=wtOf(e.buildingId,e.workTypeId);
    return '\x3cdiv class="earn-row">\x3cdiv class="er-l">\x3cspan>'+esc(b?b.name:'')+' · '+esc(wt?wt.name:'')+'\x3c/span>\x3c/div>\x3cspan class="er-r">\x3cb>'+fmtRub(Math.round(entEarn(e)))+'\x3c/b>\x3cspan class="er-vol">'+Number(e.volume).toFixed(1)+'\x3c/span>\x3c/span>\x3c/div>'
      +(e.notes?'\x3cdiv style="font-size:12px;color:var(--muted);padding:2px 0 8px">'+esc(e.notes)+'\x3c/div>':'')
      +((e.photos&&e.photos.length)?'\x3cdiv style="display:flex;gap:6px;flex-wrap:wrap;margin:0 0 10px">'+e.photos.map(function(src,pi){return '\x3cimg src="'+src+'" data-a="view-ent-photo" data-id="'+e.id+'" data-idx="'+pi+'" style="width:56px;height:56px;object-fit:cover;border-radius:8px;cursor:pointer">';}).join('')+'\x3c/div>':'');
  }).join('');

  // Задачи и примечания за этот день
  var goals=(S.goals||[]).filter(function(g){return g.date===dateStr&&!g.hidden;});
  var goalsHtml=goals.length?('\x3cdiv style="margin-top:12px">\x3cdiv style="font-size:10px;letter-spacing:2px;color:var(--gold);font-weight:700;margin-bottom:6px">✅ ЗАДАЧИ / ПРИМЕЧАНИЯ</div>'
    +goals.map(function(g){
      var icon=g.isNote?'📝':g.done?'✅':'☐';
      return '\x3cdiv style="display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:1px solid var(--border)">'
        +'\x3cspan style="font-size:14px;flex-shrink:0">'+icon+'\x3c/span>'
        +'\x3cdiv>\x3cdiv style="font-size:13px;color:'+(g.done?'var(--muted)':'var(--text)')+'">'+esc(g.text)+'\x3c/div>'
        +(g.time?'\x3cdiv style="font-size:10px;color:var(--muted)">🕐 '+esc(g.time)+'\x3c/div>':'')
        +'\x3c/div>\x3c/div>';
    }).join('')+'\x3c/div>'):'' ;

  // Движения по складу за этот день
  var wlogDay=(S.wlog||[]).filter(function(r){return r.date===dateStr;});
  var whHtml=wlogDay.length?('\x3cdiv style="margin-top:12px">\x3cdiv style="font-size:10px;letter-spacing:2px;color:var(--gold);font-weight:700;margin-bottom:6px">📦 СКЛАД\x3c/div>'
    +wlogDay.slice(0,20).map(function(r){
      var lbl=getMatLabel(r.key);
      var bld=r.buildingId?(S.buildings.find(function(b){return b.id===r.buildingId;})||{}).name:'';
      return '\x3cdiv style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px">'
        +'\x3cspan style="color:var(--text2);max-width:65%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(lbl)+(bld?' · '+esc(bld):'')+'\x3c/span>'
        +'\x3cspan style="font-weight:700;color:'+(r.qty>=0?'var(--green)':'var(--red)')+'">'+(r.qty>=0?'+':'')+r.qty+' шт\x3c/span>'
        +'\x3c/div>';
    }).join('')+'\x3c/div>'):'' ;

  // Табель за этот день
  var STATUS_LBL={p:'✅ Пришёл',h:'½ Полдня',a:'❌ Прогул',b:'🤒 Больничный',v:'🏖 Отпуск',u:'🏠 За свой счёт'};
  var STATUS_CLR={p:'var(--green)',h:'var(--gold)',a:'var(--red)',b:'#e69','v':'#4af','u':'var(--muted)'};
  var tsRows=(S.users||[]).map(function(u){
    var st=_tsGet(u.id,dateStr);
    if(!st)return '';
    var clr=STATUS_CLR[st]||'var(--muted)';
    var lbl=STATUS_LBL[st]||st;
    return '\x3cdiv style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border)">'
      +'\x3cspan style="font-size:13px">'+esc(u.name)+(u.team?'\x3cspan style="font-size:10px;color:var(--muted)"> · '+esc(u.team)+'\x3c/span>':'')+'\x3c/span>'
      +'\x3cspan style="font-size:12px;font-weight:700;color:'+clr+'">'+lbl+'\x3c/span>'
      +'\x3c/div>';
  }).filter(Boolean).join('');

  // Обновляем глобальную переменную для возврата к дню после просмотра фото
  window._calDayOpen=dateStr;

  showModal('\x3cdiv class="sheet" style="max-height:88vh">\x3cdiv class="shdl">\x3c/div>\x3cdiv class="shtitle">'+fmtD(dateStr)+'\x3c/div>\x3cdiv class="shbody" style="overflow-y:auto;max-height:calc(88vh - 110px)">'
    +'\x3cdiv style="display:flex;gap:16px;margin-bottom:10px">\x3cdiv>\x3cb style="font-size:20px;color:var(--green)">'+fmtRub(Math.round(earn))+'\x3c/b>\x3cdiv style="font-size:11px;color:var(--muted)">заработано\x3c/div>\x3c/div>\x3cdiv>\x3cb style="font-size:20px">'+vol.toFixed(1)+' м²\x3c/b>\x3cdiv style="font-size:11px;color:var(--muted)">объём\x3c/div>\x3c/div>\x3c/div>'
    +(rows||'\x3cdiv style="color:var(--muted);font-size:13px;margin-bottom:10px">Нет записей за этот день\x3c/div>')
    +goalsHtml
    +whHtml
    +(tsRows?'\x3cdiv style="margin-top:12px">\x3cdiv style="font-size:10px;letter-spacing:2px;color:var(--gold);font-weight:700;margin-bottom:6px">📋 ТАБЕЛЬ\x3c/div>'+tsRows+'\x3c/div>':'')
    +'\x3c/div>\x3cdiv class="shfoot">\x3cbutton class="btn btn-gold" data-a="close-modal">Закрыть\x3c/button>\x3c/div>\x3c/div>');
}

function renderEarn(){
  const total=S.entries.reduce((s,e)=>s+entEarn(e),0);
  const _exclPrep=!!(ui&&ui.earnExclPrep);
  const totalVol=S.entries.reduce((s,e)=>{if(_exclPrep&&_isPrepEntry(e))return s;return s+Number(e.volume);},0);
  const dayEarn=getDayEarn(), dayVol=getDayVol();
  // REAL data per period (not forecast)
  const _now=new Date();const _td=today();
  const _inPeriod=(dateStr,per)=>{
    if(per==='day')return dateStr===_td;
    const d=new Date(dateStr+'T12:00:00');
    if(per==='week'){const diff=(_now-d)/864e5;return diff>=0&&diff<7;}
    if(per==='month'){return d.getMonth()===_now.getMonth()&&d.getFullYear()===_now.getFullYear();}
    return true;
  };
  const _periodStats=(per)=>{
    const ents=S.entries.filter(e=>_inPeriod(e.dateFrom,per));
    return{earn:ents.reduce((s,e)=>s+entEarn(e),0),vol:ents.reduce((s,e)=>s+Number(e.volume),0)};
  };
  const periods={
    day:  {label:'День',  ..._periodStats('day')},
    week: {label:'Неделя',..._periodStats('week')},
    month:{label:'Месяц', ..._periodStats('month')},
    total:{label:'Всего', ..._periodStats('total')},
  };
  const p=periods[ui.earnPeriod||'day'];
  const satEarn=S.entries.filter(e=>{const d=new Date(e.dateFrom+'T12:00:00');return d.getDay()===6;}).reduce((s,e)=>s+entEarn(e),0);
  const satVol=S.entries.filter(e=>{const d=new Date(e.dateFrom+'T12:00:00');return d.getDay()===6;}).reduce((s,e)=>s+Number(e.volume),0);
  const byBld=S.buildings.map(b=>{const ents=getEnts(b.id);return{...b,earn:ents.reduce((s,e)=>s+entEarn(e),0),vol:ents.reduce((s,e)=>s+Number(e.volume),0)};});
  const wtStats={};S.buildings.forEach(b=>(b.workTypes||[]).forEach(wt=>{const k=wt.name;if(!wtStats[k])wtStats[k]={earn:0,vol:0,unit:wt.unit,color:wt.color};wtStats[k].earn+=volByWT(b.id,wt.id)*wt.price;wtStats[k].vol+=volByWT(b.id,wt.id);}));
  const wdCnt=Object.keys((()=>{const d={};S.entries.forEach(e=>{if(new Date(e.dateFrom+'T12:00').getDay()!==0)d[e.dateFrom]=1;});return d;})()).length||1;
  const paidPeriod=_payoutsSum(ui.earnPeriod||'day');
  const netExpected=Math.round(p.earn*_taxMul());
  const remainNet=netExpected-paidPeriod;

  return`\x3cdiv class="earn-wrap">
    \x3cdiv class="earn-hero">
      \x3cdiv class="eh-top">
        \x3cdiv>\x3cdiv class="eh-val">${fmtRub(total)}\x3c/div>\x3cdiv class="eh-sub">всего · ${_taxPctLbl()} ${fmtRub(Math.round(total*_taxMul()))}\x3c/div>\x3cdiv class="naryad-line" data-a="naryad-set">\ud83d\udcc5 \u0414\u043e \u0441\u0434\u0430\u0447\u0438 \u043d\u0430\u0440\u044f\u0434\u043e\u0432: ${_naryadLeft().days} \u0434\u043d. (${_naryadLeft().date})\x3c/div>\x3cbutton class="tax-toggle" data-a="tax-toggle">${(ui&&ui.taxOn===false)?'\u2611 \u041d\u0430\u043b\u043e\u0433 '+(ui.taxPct!=null?ui.taxPct:13)+'%':'\u2610 \u0423\u0431\u0440\u0430\u0442\u044c \u043d\u0430\u043b\u043e\u0433'}\x3c/button>\x3c/div>
        \x3cdiv class="eh-div">\x3c/div>
        \x3cdiv>\x3cdiv class="eh-val eh-vol">${totalVol.toFixed(1)} м²\x3c/div>\x3cdiv class="eh-sub">всего выработка \x3cbutton class="vol-filter-btn${_exclPrep?' on':''}" data-a="toggle-excl-prep" title="Скрыть работы по 0₽ из объёма">${_exclPrep?'✓ без 0₽':'без 0₽'}\x3c/button>\x3c/div>\x3c/div>
      \x3c/div>
    \x3c/div>

    \x3cdiv class="period-switcher">
      ${['day','week','month','total'].map(pid=>`\x3cbutton class="psw${(ui.earnPeriod||'day')===pid?' psw-on':''}" data-a="earn-period" data-p="${pid}">${periods[pid].label}\x3c/button>`).join('')}
    \x3c/div>

    \x3cdiv class="period-card">
      \x3cdiv class="pc-row">
        \x3cspan class="pc-lbl">💰 Заработок\x3c/span>
        \x3cspan class="pc-val pc-green">${fmtRub(p.earn)}\x3c/span>
      \x3c/div>
      \x3cdiv class="pc-row">
        \x3cspan class="pc-lbl">📐 Выработка\x3c/span>
        \x3cspan class="pc-val pc-orange">${p.vol.toFixed(1)} м²\x3c/span>
      \x3c/div>
      \x3cdiv class="pc-row pc-net-row">
        \x3cspan class="pc-lbl">💵 ${_taxPctLbl()}\x3c/span>
        \x3cspan class="pc-val pc-net">${fmtRub(netExpected)}\x3c/span>
      \x3c/div>
      \x3cdiv class="pc-row">
        \x3cspan class="pc-lbl">📥 Получено (аванс+зп)\x3c/span>
        \x3cspan class="pc-val pc-blue">${fmtRub(paidPeriod)}\x3c/span>
      \x3c/div>
      \x3cdiv class="pc-row pc-net-row">
        \x3cspan class="pc-lbl">🎯 Осталось получить\x3c/span>
        \x3cspan class="pc-val ${remainNet>=0?'pc-net':'pc-orange'}">${fmtRub(remainNet)}\x3c/span>
      \x3c/div>
      \x3cdiv class="pc-note">${wdCnt} раб. дней · по ${(totalVol/wdCnt).toFixed(1)} м²/день\x3c/div>
      ${(ui.earnPeriod==='day'&&satEarn>0)?`\x3cdiv class="pc-sat">Суббота: ${fmtRub(satEarn)} · ${satVol.toFixed(1)} м² (склад)\x3c/div>`:'' }
    \x3c/div>

    \x3cdiv class="card">\x3cdiv class="card-title" style="display:flex;justify-content:space-between;align-items:center">\x3cspan>💸 Выплаты (аванс / зп)\x3c/span>\x3cbutton class="btn-ghost" style="font-size:11px;padding:5px 10px" data-a="add-payout">+ Добавить\x3c/button>\x3c/div>
      ${(function(){
        var totalPaid=(S.payouts||[]).reduce(function(s,p){return s+Number(p.amount||0);},0);
        var totalEarned=S.entries.reduce(function(s,e){return s+entEarn(e);},0);
        var toPayOut=Math.max(0,totalEarned*_taxMul()-totalPaid);
        return '\x3cdiv style="display:flex;gap:12px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)">'
          +'\x3cdiv style="flex:1;background:rgba(232,164,40,.08);border-radius:8px;padding:8px 10px">'
          +'\x3cdiv style="font-size:18px;font-weight:800;color:var(--text)">'+fmtRub(Math.round(totalPaid))+'\x3c/div>'
          +'\x3cdiv style="font-size:10px;color:var(--muted)">Выплачено\x3c/div>\x3c/div>'
          +'\x3cdiv style="flex:1;background:rgba(42,176,106,.1);border-radius:8px;padding:8px 10px">'
          +'\x3cdiv style="font-size:18px;font-weight:800;color:var(--green)">'+fmtRub(Math.round(toPayOut))+'\x3c/div>'
          +'\x3cdiv style="font-size:10px;color:var(--muted)">Осталось выдать\x3c/div>\x3c/div>'
          +'\x3c/div>';
      })()}
      ${(S.payouts||[]).slice().sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,50).map(function(po){
        return `\x3cdiv class="earn-row">\x3cspan>${po.type==='advance'?'🔸 Аванс':'🔹 ЗП'} \x3cspan class="er-vol">${fmtD(po.date)}\x3c/span>\x3c/span>\x3cspan class="er-r">\x3cb>${fmtRub(po.amount)}\x3c/b>\x3cbutton class="act-del-ico" data-a="del-payout" data-id="${po.id}">✕\x3c/button>\x3c/span>\x3c/div>`;
      }).join('')||'\x3cdiv style="padding:8px 0;color:var(--muted);font-size:12px">Пока нет записей об авансах и зп\x3c/div>'}
    \x3c/div>

    ${renderEarnChart()}
    \x3cdiv class="card">\x3cdiv class="card-title">По корпусам\x3c/div>
      ${byBld.map(b=>{var open=(ui.earnOpenBld===b.id);var sal=open?_salaryByBuilding(b.id):[];var rows=open?sal.map(function(s){return `\x3cdiv class="earn-sub-row">\x3cspan>${esc(s.name)}${s.team?(' \x3cspan class="esr-team">'+esc(s.team)+'\x3c/span>'):''}\x3c/span>\x3cspan class="esr-r">${fmtRub(Math.round(s.earn))} \x3cspan class="esr-net">(${_taxPctLbl()} ${fmtRub(Math.round(s.earn*_taxMul()))})\x3c/span>\x3c/span>\x3c/div>`;}).join(''):'';return `\x3cdiv class="earn-row earn-row-tap" data-a="earn-bld" data-bid="${b.id}">\x3cspan>${open?'\u25be':'\u25b8'} ${esc(b.name)}\x3c/span>\x3cspan class="er-r">\x3cb>${fmtRub(b.earn)}\x3c/b>\x3cspan class="er-vol">${b.vol.toFixed(1)} м²\x3c/span>\x3c/span>\x3c/div>${rows}`;}).join('')}
    \x3c/div>
    \x3cdiv class="card">\x3cdiv class="card-title">По видам работ\x3c/div>
      ${Object.entries(wtStats).map(([n,w])=>`\x3cdiv class="earn-row">\x3cdiv class="er-l">\x3cspan class="er-dot" style="background:${w.color}">\x3c/span>\x3cspan>${esc(n)}\x3c/span>\x3c/div>\x3cspan class="er-r">\x3cb>${fmtRub(w.earn)}\x3c/b>\x3cspan class="er-vol">${w.vol.toFixed(1)} ${esc(w.unit)}\x3c/span>\x3c/span>\x3c/div>`).join('')}
    \x3c/div>
    ${(S.users&&S.users.length)?`\x3cdiv class="card">\x3cdiv class="card-title">\ud83c\udfd7 \u0417\u0430\u0440\u043f\u043b\u0430\u0442\u0430 \u043f\u043e \u0431\u0440\u0438\u0433\u0430\u0434\u0430\u043c\x3c/div>${_salaryByBrigade().map(function(t){return `\x3cdiv class="earn-row">\x3cspan>${esc(t.team)} \x3cspan class="er-vol">${t.headcount} \u0447\u0435\u043b\x3c/span>\x3c/span>\x3cspan class="er-r">\x3cb>${fmtRub(Math.round(t.earn))}\x3c/b>\x3cspan class="er-vol">${t.vol.toFixed(1)} \u043c\u00b2\x3c/span>\x3c/span>\x3c/div>`;}).join('')}\x3c/div>`:''}
  \x3c/div>`;
}

// ── PER-WT FORECAST WITH PREP-DAY AWARENESS ──
function _renderForecast(){
  var today=new Date();
  function addBD(d,n){var r=new Date(d);var a=0;while(a<n){r.setDate(r.getDate()+1);if(r.getDay()!==0)a++;}return r;}
  function fmtD(d){return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');}

  var rows=S.buildings.flatMap(function(b){
    return (b.workTypes||[]).map(function(wt){
      if(wt.price===0)return null;
      var target=Number(wt.targetArea)||0;
      if(!target)return null;
      var done=volByWT(b.id,wt.id);
      var left=Math.max(0,target-done);
      if(left<=0)return null;

      // Entries for this WT
      var wtEnts=getEnts(b.id).filter(function(e){return e.workTypeId===wt.id;});
      // Prep entries for this building (price=0)
      var prepEnts=getEnts(b.id).filter(function(e){return _isPrepEntry(e);});
      var prepDays={};
      prepEnts.forEach(function(e){if(new Date(e.dateFrom+'T12:00').getDay()!==0)prepDays[e.dateFrom]=1;});
      var nPrep=Object.keys(prepDays).length;

      // Working days on this WT (exclude prep days and sundays)
      var wtDays={};
      wtEnts.forEach(function(e){
        var ds=e.dateFrom;
        if(new Date(ds+'T12:00').getDay()!==0&&!prepDays[ds])wtDays[ds]=1;
      });
      var nWtDays=Object.keys(wtDays).length||1;

      // Vol done on this WT (excluding prep entries)
      var wtVol=wtEnts.reduce(function(s,e){return s+Number(e.volume);},0);

      // Per-worker daily rate on this WT
      var wRates={};var wNames=[];
      wtEnts.forEach(function(e){
        (S.users||[]).forEach(function(u){
          var sh=_wShare(e,u.id);if(sh<=0)return;
          if(!wRates[u.id])wRates[u.id]={vol:0,days:{}};
          wRates[u.id].vol+=Number(e.volume)*sh;
          if(!prepDays[e.dateFrom])wRates[u.id].days[e.dateFrom]=1;
        });
      });
      var teamRate=0;
      Object.keys(wRates).forEach(function(uid){
        var dCnt=Object.keys(wRates[uid].days).length||1;
        var pDv=wRates[uid].vol/dCnt;
        var att=_tsStats(uid,30);
        var attF=att.attendance!==null?Math.max(0.5,att.attendance/100):0.85;
        teamRate+=pDv*attF;
        var u=(S.users||[]).find(function(x){return x.id===uid;});
        if(u&&pDv>0)wNames.push(u.name.split(' ')[0]+' '+pDv.toFixed(1)+'м/д');
      });
      if(teamRate<=0){
        var gDv=getDayVol();
        teamRate=gDv>0?gDv*0.8:5;
      }

      var dLeftRaw=Math.ceil(left/teamRate);
      var hBuf=Math.max(1,Math.round(dLeftRaw*0.15));
      var dLeft=dLeftRaw+hBuf;
      var fin=addBD(today,dLeft);
      var urgency=dLeft<=3?'fc-red':dLeft<=10?'fc-gold':'fc-green';
      var pct=Math.min(100,Math.round(done/(target||1)*100));

      return {
        bname:b.name,wname:wt.name,color:wt.color,
        left:left,done:done,pct:pct,
        dLeft:dLeft,finS:fmtD(fin),hBuf:hBuf,
        earnLeft:left*wt.price,
        rate:teamRate,wNames:wNames,
        urgency:urgency,nPrep:nPrep
      };
    }).filter(function(x){return x;});
  }).sort(function(a,b){return a.dLeft-b.dLeft;});

  if(!rows.length)return '';
  var h='<div class="card">';
  h+='<div class="card-title">📆 Прогноз сдачи видов работ</div>';
  if(rows.some(function(r){return r.nPrep>0;}))
    h+='<div class="fc-note">⚙ Подготовительные дни учтены в выработке</div>';
  rows.slice(0,10).forEach(function(f){
    var fid='fc-'+f.bname+'-'+f.wname;
    h+='<div class="fc-row" data-a="show-forecast-detail" data-fid="'+encodeURIComponent(JSON.stringify({bname:f.bname,wname:f.wname,color:f.color,left:f.left,done:f.done,pct:f.pct,dLeft:f.dLeft,finS:f.finS,hBuf:f.hBuf,earnLeft:f.earnLeft,rate:f.rate,wNames:f.wNames,nPrep:f.nPrep}))+'" style="cursor:pointer">';
      h+='<div class="fc-head">';
        h+='<span class="fc-dot" style="background:'+f.color+'"></span>';
        h+='<span class="fc-name">'+esc(f.bname)+' / '+esc(f.wname)+'</span>';
        h+='<span class="fc-date '+f.urgency+'">📅 '+f.finS+' (~'+f.dLeft+' дн.)</span>';
      h+='</div>';
      h+='<div class="fc-bar-bg"><div class="fc-bar-fill" style="width:'+f.pct+'%"></div></div>';
      h+='<div class="fc-meta">';
        h+='<span>Осталось '+f.left.toFixed(1)+' м² · '+fmtRub(Math.round(f.earnLeft))+' · +'+f.hBuf+' дн. (человеческий фактор)</span>';
        if(f.wNames.length)h+='<span class="fc-workers">👷 '+f.wNames.slice(0,3).join(', ')+'</span>';
      h+='</div>';
    h+='</div>';
  });
  h+='</div>';
  return h;
}

function renderAI(){

    if(p==='week'){var diff=(now-d)/864e5;return diff>=0&&diff<7;}
    if(p==='month'){return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
    return true;
  };
  var pEnts=S.entries.filter(function(e){return _inPeriod(e.dateFrom,per);});

  var pVol=pEnts.reduce(function(s,e){return s+Number(e.volume);},0);

  var avgDayEarn=total/wdCnt;
  var avgDayVol=totalVol/wdCnt;

      if(!wtStats[k])wtStats[k]={earn:0,vol:0,unit:wt.unit||'м²',color:wt.color||'#d4920a'};

      wtStats[k].vol+=ents.reduce(function(s,e){return s+Number(e.volume);},0);
    });

  // Worker stats

      var ents=S.entries.filter(function(e){return _wShare(e,u.id)>0;});

    }).filter(function(w){return w.cnt>0;}).sort(function(a,b){return b.dayVol-a.dayVol;});
    if(wStats.length)maxDv=_globalMaxDayVol();

    wStats._maxDv=maxDv;

  var h='';

  var _weekE=_weekEnts.reduce(function(s,e){return s+entEarn(e);},0);
  var _weekV=_weekEnts.reduce(function(s,e){return s+Number(e.volume);},0);
  var _monE=_monEnts.reduce(function(s,e){return s+entEarn(e);},0);
  var _monV=_monEnts.reduce(function(s,e){return s+Number(e.volume);},0);

  h+='<div class="card">';

  h+='</div>';

  h+='<div class="sp"></div>';
  return '<div class="scroll-pad">'+h+'</div>';
}

    lines.push('🏗 ' + b.name + ': ' + vol.toFixed(1) + ' м² · ' + Math.round(earn).toLocaleString('ru') + ' ₽');
  });
  // Подготовительные работы — отдельная колонка, без сумм (это этап, не отдельная оплата)
  if(prepEnts.length){
    var prepDays={};var prepVolByBld={};
    prepEnts.forEach(function(e){
      if(new Date(e.dateFrom+'T12:00').getDay()!==0)prepDays[e.dateFrom]=1;
      var b=S.buildings.find(function(x){return x.id===e.buildingId;});
      var bn=b?b.name:'?';
      prepVolByBld[bn]=(prepVolByBld[bn]||0)+Number(e.volume||0);
    });
    lines.push('');
    lines.push('⚙ Подготовка (замеры, подвоз материала): ' + Object.keys(prepDays).length + ' дн.');
    Object.keys(prepVolByBld).forEach(function(bn){
      lines.push('   ' + bn + ': ' + prepVolByBld[bn].toFixed(1) + ' м²');
    });
  }
  lines.push('');
  lines.push('📱 Строитель.ПРО');
  var text=lines.join('\n');
  if(navigator.share){
    navigator.share({title:'Отчёт '+pn,text:text}).catch(function(){});
  } else {
    var a=document.createElement('textarea');
    a.value=text;document.body.appendChild(a);a.select();
    try{document.execCommand('copy');toast('📋 Отчёт скопирован');}catch(e){}
    document.body.removeChild(a);
  }
  if(typeof _track==='function')_track('📤 Share');
}
