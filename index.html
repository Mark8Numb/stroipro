  <style>
    /* ═══════════════════════════════════════════════════════ */
    :root{
      --bg:#0f0f0d; --bg2:#161614; --bg3:#1e1e1a;
      --card:#1a1a17; --card2:#222220;
      --border:#2c2c28; --border2:#383834;
      --text:#ede8dc; --text2:#a09880; --muted:#6a6050;
      --gold:#d4920a; --gold-l:rgba(212,146,10,0.13); --gold-b:rgba(212,146,10,0.28);
      --green:#3d9e5c; --red:#d95f4f; --blue:#4a9fd4;
      --shadow:rgba(0,0,0,0.42);
      --font:-apple-system,'Inter','Segoe UI',sans-serif;
      --nav-h:62px; --r:13px; --rs:8px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{font-family:var(--font);color:var(--text);font-size:14px;line-height:1.45}
    #app{height:100%;display:flex;flex-direction:column}
    /* ── HEADER ── */
    .hdr{background:var(--bg2);border-bottom:1px solid var(--border);
      padding:max(14px,env(safe-area-inset-top)) 16px 11px;
      display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
      box-shadow:0 2px 16px var(--shadow)}
    .hdr-l{display:flex;flex-direction:column;gap:1px}
    .logo{font-size:18px;font-weight:900;letter-spacing:1.2px;color:var(--text)}
    .logo-dot{color:var(--gold)}
    .logo-sub{font-size:9px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase}
    .hdr-r{display:flex;align-items:center;gap:10px}
    .earn-pill{font-size:13px;font-weight:700;color:var(--gold);
      background:var(--gold-l);border:1px solid var(--gold-b);
      padding:5px 12px;border-radius:18px;letter-spacing:.3px}
    .ico-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);
      width:33px;height:33px;border-radius:50%;cursor:pointer;font-size:15px;
      display:flex;align-items:center;justify-content:center;transition:opacity .15s}
    /* ── UNDO BAR ── */
    .ubar{background:var(--bg2);border-bottom:1px solid var(--border);
      display:flex;align-items:center;padding:5px 12px;gap:6px;flex-shrink:0}
    .ub{background:var(--gold-l);border:1px solid var(--gold-b);border-radius:14px;
      color:var(--gold);padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer}
    .ub-off{opacity:.2;cursor:default}
    .usave{font-size:13px;color:var(--muted)}
    .ubar-dim{margin-left:auto;font-size:9px;color:var(--muted)}
    /* ── PROJECT BAR ── */
    .pbar{background:var(--bg2);border-bottom:1px solid var(--border);
      padding:7px 13px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
    .pbar::-webkit-scrollbar{display:none}
    .ppill{background:var(--bg3);border:1.5px solid var(--border);border-radius:18px;
      color:var(--muted);padding:5px 15px;font-size:12px;font-weight:600;
      white-space:nowrap;cursor:pointer;flex-shrink:0}
    .ppill.on{background:var(--gold);color:#0a0800;border-color:var(--gold);font-weight:800}
    .ppill-add{border-style:dashed}
    /* ── BUILDING TABS ── */
    .btabs{background:var(--bg2);border-bottom:1px solid var(--border2);
      display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px;flex-shrink:0}
    .btabs::-webkit-scrollbar{display:none}
    .btab{padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;
      border-bottom:2px solid transparent;color:var(--muted);flex-shrink:0;
      display:flex;align-items:center;gap:6px;min-width:70px;background:none;border:none}
    .btab.on{color:var(--gold);border-bottom-color:var(--gold)}
    .btab-pct{font-size:9px;color:var(--gold);background:var(--gold-l);padding:1px 6px;border-radius:8px}
    .btab-add{opacity:.3;font-size:16px;min-width:40px}
    /* ── SCROLL ── */
    .scroll{flex:1;overflow-y:auto;padding:14px 14px calc(var(--nav-h) + 14px)}
    /* ── BOTTOM NAV ── */
    .bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
    .bnav-in{background:var(--bg2);border-top:1px solid var(--border);height:var(--nav-h);display:flex;align-items:flex-start;padding-top:7px;overflow-x:auto;scrollbar-width:none}
    .bnav-in::-webkit-scrollbar{display:none}
    .nb{flex:1;min-width:58px;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:3px 0}
    .ni{font-size:18px}
    .nl{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase}
    .nb.on .nl{color:var(--gold)}
    /* ── FAB ── */
    .fab{position:fixed;bottom:calc(var(--nav-h) + 12px);right:16px;z-index:200;
      width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,#e0a010,#c47c08);
      border:none;color:#0a0800;font-size:25px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900}
    /* ── CARDS ── */
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
    .card-title{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;font-weight:700}
    .btn{padding:12px 18px;border-radius:11px;border:none;font-size:14px;font-weight:700;cursor:pointer}
    .btn-gold{background:linear-gradient(145deg,#e0a010,#c47c08);color:#0a0800}
    .btn-ghost{background:var(--gold-l);color:var(--gold);border:1px solid var(--gold-b)}
    .empty{text-align:center;padding:46px 20px;color:var(--muted)}
    .toast{position:fixed;top:58px;left:50%;transform:translateX(-50%);
      background:linear-gradient(135deg,#e0a010,#c47c08);color:#0a0800;
      padding:9px 20px;border-radius:18px;font-size:12px;font-weight:800;
      z-index:9999;opacity:0;transition:opacity .25s;pointer-events:none}
    .toast.show{opacity:1}
  </style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════
// СТРОИТЕЛЬ.ПРО v2.2 — ИСПРАВЛЕНА ОШИБКА NaN

const KEY='bpro_v22', VER='v2.2', SCHEMA=3;

    {id:1780393168748,buildingId:'b1',dateFrom:'2026-06-01',dateTo:'2026-06-02',workTypeId:'carcass',volume:32.98,notes:'50% коридора, мешает линолеум',noStock:true,created:'2026-06-01T08:00:00Z',materials:{}},

  notes:[],
  matCfg:Object.fromEntries(MATS.map(m=>[m.key,{pack:m.pack,iLen:m.iLen||0,label:m.label,cat:m.cat,kg:m.kg||0}])),
  dimUnit:'cm',lastNoStock:false,theme:'premium-dark',openCount:0

let S,ui,undoStack=[],redoStack=[];
function mkUi(){return{tab:'journal',pid:'p1',bid:'b1',exp:null,sort:'date_desc',whSub:'list',whHist:null,whBldFilter:'',showHidden:false,showHiddenGoals:false,wtActive:null,earnPeriod:'day',hdrPeriod:'all'};}
function uid(){return String(Date.now())+String(Math.floor(Math.random()*9999));}
function today(){return new Date().toISOString().slice(0,10);}
function nowTime(){return new Date().toTimeString().slice(0,5);}
function fmtRub(n){return Number(n||0).toLocaleString('ru')+' ₽';}
function fmtD(d){if(!d)return'';const[y,m,day]=d.split('-');return`${day}.${m}.${y.slice(2)}`;}
function esc(s){return String(s||'').split('&').join('&amp;').split('<').join('&lt;').split('>').join('&gt;').split('"').join('&quot;');}
function getBldgs(pid){return S.buildings.filter(b=>b.projectId===pid);}
function getEnts(bid){return S.entries.filter(e=>e.buildingId===bid);}
function wtOf(bid,wtId){const b=S.buildings.find(x=>x.id===bid);return b?.workTypes.find(w=>w.id===wtId)||b?.workTypes[0];}
function entEarn(e){const w=wtOf(e.buildingId,e.workTypeId);return w ? Number(e.volume)*(w.price||0) : 0;}
function volByWT(bid,wtId){return getEnts(bid).filter(e=>e.workTypeId===wtId).reduce((s,e)=>s+Number(e.volume),0);}
function getPack(k){return S.matCfg[k]?.pack||MATS.find(m=>m.key===k)?.pack||100;}
function getMatLabel(k){return S.matCfg[k]?.label||MATS.find(m=>m.key===k)?.label||k;}
function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(S));}catch(e){}}
function act(fn){undoStack.push(JSON.stringify({S:JSON.parse(JSON.stringify(S)),ui:JSON.parse(JSON.stringify(ui))}));redoStack=[];fn();persist();render();}
function undo(){if(!undoStack.length)return;redoStack.push(JSON.stringify({S:JSON.parse(JSON.stringify(S)),ui:JSON.parse(JSON.stringify(ui))}));const p=JSON.parse(undoStack.pop());S=p.S;ui=p.ui;persist();render();toast('↩ Отменено');}
function redo(){if(!redoStack.length)return;undoStack.push(JSON.stringify({S:JSON.parse(JSON.stringify(S)),ui:JSON.parse(JSON.stringify(ui))}));const p=JSON.parse(redoStack.pop());S=p.S;ui=p.ui;persist();render();toast('↪ Повторено');}
function load(){try{const raw=localStorage.getItem(KEY);if(raw)return JSON.parse(raw);}catch(e){}return JSON.parse(JSON.stringify(DEF_STATE));}

function applyTheme(){
  const t=S.theme||'premium-dark';
  const themes={'premium-dark':{bg:'#0f0f0d',bg2:'#161614',bg3:'#1e1e1a',card:'#1a1a17',border:'#2c2c28',text:'#ede8dc',muted:'#6a6050',gold:'#d4920a',green:'#3d9e5c',red:'#d95f4f'},'premium-light':{bg:'#f5f2ec',bg2:'#fdfcf8',bg3:'#ede8de',card:'#ffffff',border:'#d8d0c0',text:'#1a1610',muted:'#9a8c70',gold:'#c07808',green:'#2a7a40',red:'#c03030'}};
  const th=themes[t]||themes['premium-dark'];
  const r=document.documentElement;
  r.style.setProperty('--bg',th.bg);r.style.setProperty('--bg2',th.bg2);r.style.setProperty('--bg3',th.bg3);
  r.style.setProperty('--card',th.card);r.style.setProperty('--border',th.border);r.style.setProperty('--text',th.text);
  r.style.setProperty('--muted',th.muted);r.style.setProperty('--gold',th.gold);r.style.setProperty('--green',th.green);
  r.style.setProperty('--red',th.red);
}

function initState(){S=load();ui=mkUi();const bs=getBldgs(ui.pid);if(bs.length)ui.bid=bs[0].id;applyTheme();}
function render(){
  const app=document.getElementById('app');
  if(!S.projects.find(p=>p.id===ui.pid)){ui.pid=S.projects[0]?.id||'';}
  if(!getBldgs(ui.pid).find(b=>b.id===ui.bid)){ui.bid=getBldgs(ui.pid)[0]?.id||'';}
  const fab=ui.tab==='journal'?`<button class="fab" data-a="add-entry">+</button>`:ui.tab==='tasks'?`<button class="fab" data-a="add-goal">+</button>`:'';
  app.innerHTML=renderHdr()+renderUbar()+renderPbar()+renderBtabs()+`<div class="scroll" id="scroll">${renderTab()}</div>`+fab+renderBnav();
}
function renderHdr(){const earn=S.entries.reduce((s,e)=>s+entEarn(e),0);return`<div class="hdr"><div class="hdr-l"><div class="logo">СТРОИТЕЛЬ<span class="logo-dot">.</span>ПРО</div><div class="logo-sub">${VER}</div></div><div class="hdr-r"><div class="earn-pill" data-a="cycle-hdr-period">${fmtRub(earn)}</div><button class="ico-btn dim-btn" data-a="cycle-dim">${S.dimUnit.toUpperCase()}</button><button class="ico-btn" data-a="toggle-theme">☀️</button></div></div>`;}
function renderUbar(){return`<div class="ubar"><button class="ub${undoStack.length?'':' ub-off'}" data-a="undo">↩</button><button class="ub${redoStack.length?'':' ub-off'}" data-a="redo">↪</button><span class="usave">●</span><span class="ubar-dim">${S.dimUnit}</span></div>`;}
function renderPbar(){return`<div class="pbar">${S.projects.map(p=>`<button class="ppill${p.id===ui.pid?' on':''}" data-a="sel-proj" data-id="${p.id}">${esc(p.name)}</button>`).join('')}<button class="ppill ppill-add" data-a="new-proj">+</button></div>`;}
function renderBtabs(){const bldgs=getBldgs(ui.pid);if(!bldgs.length)return`<div class="btabs"><span class="btab-empty">Нет корпусов</span></div>`;return`<div class="btabs">${bldgs.map(b=>{const allVol=b.workTypes.reduce((s,wt)=>s+volByWT(b.id,wt.id),0);const pct=b.totalArea>0?Math.min(100,Math.round(allVol/b.totalArea*100)):null;return`<button class="btab${b.id===ui.bid?' on':''}" data-a="sel-bld" data-id="${b.id}"><span>${esc(b.name)}</span>${pct!==null?`<span class="btab-pct">${pct}%</span>`:''}</button>`;}).join('')}<button class="btab btab-add" data-a="new-bld">＋</button></div>`;}
function renderBnav(){const tabs=[['journal','🔨','Журнал'],['warehouse','📦','Склад'],['tasks','✅','Задачи'],['earn','💰','Заработок'],['settings','⚙️','Настройки']];return`<nav class="bnav"><div class="bnav-in">${tabs.map(([id,ic,lb])=>`<button class="nb${ui.tab===id?' on':''}" data-a="nav" data-tab="${id}"><span class="ni">${ic}</span><span class="nl">${lb}</span></button>`).join('')}</div></nav>`;}
function renderTab(){if(ui.tab==='journal')return renderJournal();if(ui.tab==='warehouse')return renderWh();if(ui.tab==='tasks')return renderTasks();if(ui.tab==='earn')return renderEarn();if(ui.tab==='settings')return renderSettings();return '';}
function renderJournal(){
  const b=S.buildings.find(x=>x.id===ui.bid);
  if(!b)return'<div class="empty">🏗 Выберите корпус</div>';
  const wts=b.workTypes;
  const allEnts=getEnts(ui.bid);
  const visEnts=allEnts.filter(e=>!e.hidden||ui.showHidden);
  return`<div class="j-wrap"><div class="wt-grid">${wts.map(wt=>{const done=volByWT(ui.bid,wt.id);const pct=wt.targetArea>0?Math.min(100,done/wt.targetArea*100):null;return`<div class="wtc" data-a="toggle-wt" data-wtid="${wt.id}"><div class="wtc-top"><div class="wtc-dot" style="background:${wt.color}"></div><div class="wtc-name">${esc(wt.name)}</div><div class="wtc-pct" style="color:${pct!==null?(pct>=100?'var(--green)':wt.color):'var(--muted)'}">${pct!==null?pct.toFixed(0)+'%':'—'}</div></div><div class="wtc-nums"><span>${done.toFixed(1)}<small> ${wt.unit}</small></span><span class="wtc-earn">${fmtRub(done*wt.price)}</span></div></div>`;}).join('')}</div><div class="j-bar"><span class="j-cnt">${allEnts.filter(e=>!e.hidden).length} записей</span><button class="sort-btn" data-a="sort-next">↕ ${ui.sort==='date_desc'?'Дата ↓':ui.sort==='date_asc'?'Дата ↑':ui.sort==='vol_desc'?'Объём ↓':ui.sort==='vol_asc'?'Объём ↑':'Сумма ↓'}</button></div><div class="tl">${visEnts.map(e=>{const wt=wts.find(w=>w.id===e.workTypeId);if(!wt)return'';const pay=entEarn(e);const exp=String(ui.exp)===String(e.id);return`<div class="ec"><div class="ec-h" data-a="toggle-ent" data-id="${e.id}"><div class="ec-bar" style="background:${wt.color}"></div><div class="ec-m"><div class="ec-title">${esc(wt.name)}</div><div class="ec-date">${fmtD(e.dateFrom)}${e.dateTo&&e.dateTo!==e.dateFrom?' – '+fmtD(e.dateTo):''}</div></div><div class="ec-n"><div class="ec-vol">${e.volume}<span class="ec-unit"> ${wt.unit}</span></div><div class="ec-earn">${fmtRub(pay)}</div></div><span class="ec-chev">${exp?'▲':'▼'}</span></div>${exp?`<div class="ec-b"><div class="ec-acts"><button class="act-s act-edit" data-a="edit-ent" data-id="${e.id}">✎ Ред.</button><button class="act-s act-copy" data-a="copy-ent" data-id="${e.id}">+ Коп.</button><button class="act-s" data-a="hide-ent" data-id="${e.id}">🙈 Скрыть</button><button class="act-s act-s-del" data-a="del-ent" data-id="${e.id}">✕ Уд.</button></div></div>`:''}</div>`;}).join('')}</div></div>`;}
function renderWh(){return`<div class="card"><div class="card-title">📦 Склад</div><div class="text-muted">Приходов: ${S.wlog.length}</div><button class="btn btn-gold" data-a="add-wh-sheet">+ Добавить приход</button></div>`;}
function renderTasks(){return`<div class="card"><div class="card-title">✅ Задачи</div>${S.goals.filter(g=>!g.done).map(g=>`<div class="tr"><button class="tck" data-a="toggle-goal" data-id="${g.id}"></button><div class="tr-b"><div class="tr-txt">${esc(g.text)}</div><div class="tr-meta">${fmtD(g.date)}</div></div></div>`).join('')}<button class="btn btn-gold" data-a="add-goal">+ Добавить задачу</button></div>`;}
function renderEarn(){const total=S.entries.reduce((s,e)=>s+entEarn(e),0);return`<div class="card text-center"><div class="card-title">💰 Заработок</div><div class="eh-val">${fmtRub(total)}</div><div class="eh-sub">всего</div></div>`;}
function renderSettings(){return`<div class="card"><div class="card-title">⚙️ Настройки</div><button class="btn btn-gold" data-a="export">📤 Экспорт JSON</button><button class="btn btn-ghost" data-a="import">📥 Импорт</button><button class="btn btn-ghost" data-a="reset">🗑 Сброс</button><div class="text-muted mt-2">📬 Telegram: @Mark8Numb</div></div>`;}
function emptyScreen(icon,title,sub){return`<div class="empty"><span class="ei">${icon}</span><div class="et">${title}</div><div class="es">${sub}</div></div>`;}

function sheetEntry(prefill){/* упрощённо для демо */toast('Форма добавления — в разработке');}
function sheetAddWh(){toast('Форма добавления прихода — в разработке');}
function sheetGoal(gid){toast('Форма задачи — в разработке');}
function sheetProj(pid){const name=prompt('Название объекта:');if(name)act(()=>S.projects.push({id:uid(),name}));}
function sheetBld(bid,pid){const name=prompt('Название корпуса:');if(name)act(()=>S.buildings.push({id:uid(),projectId:pid||ui.pid,name,totalArea:0,workTypes:JSON.parse(JSON.stringify(S.buildings[0]?.workTypes||[]))}));}
function exportData(){const blob=new Blob([JSON.stringify(S)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`stroitel-pro-${today()}.json`;a.click();toast('📤 Экспорт');}
function importData(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const f=e.target.files[0];const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);act(()=>{S=d;if(!S.entries)S.entries=[];if(!S.wlog)S.wlog=[];persist();});toast('📥 Импорт');}catch(ex){toast('Ошибка');}};r.readAsText(f);};inp.click();}
function resetData(){if(prompt('Введите УДАЛИТЬ:')==='УДАЛИТЬ'){localStorage.removeItem(KEY);initState();undoStack=[];redoStack=[];render();toast('🗑 Сброшено');}}

document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-a]');
  if(!btn)return;
  const a=btn.dataset.a;
  if(a==='nav'){ui.tab=btn.dataset.tab;render();}
  else if(a==='undo'&&undoStack.length)undo();
  else if(a==='redo'&&redoStack.length)redo();
  else if(a==='toggle-theme'){const th=['premium-dark','premium-light'];S.theme=th[(th.indexOf(S.theme)+1)%th.length];applyTheme();persist();render();}
  else if(a==='cycle-dim'){const ds=['mm','cm','m'];S.dimUnit=ds[(ds.indexOf(S.dimUnit)+1)%ds.length];persist();render();}
  else if(a==='sel-proj'){ui.pid=btn.dataset.id;ui.bid=getBldgs(ui.pid)[0]?.id||'';render();}
  else if(a==='sel-bld'){ui.bid=btn.dataset.id;render();}
  else if(a==='new-proj'){sheetProj();}
  else if(a==='new-bld'){sheetBld();}
  else if(a==='toggle-ent'){const id=btn.dataset.id;ui.exp=String(ui.exp)===id?null:id;render();}
  else if(a==='del-ent'){act(()=>S.entries=S.entries.filter(x=>String(x.id)!==btn.dataset.id));}
  else if(a==='sort-next'){const c=['date_desc','date_asc','vol_desc','vol_asc','earn_desc'];const i=c.indexOf(ui.sort);ui.sort=c[(i+1)%c.length];render();}
  else if(a==='export')exportData();
  else if(a==='import')importData();
  else if(a==='reset')resetData();
  else if(a==='add-entry')sheetEntry();
  else if(a==='add-wh-sheet')sheetAddWh();
  else if(a==='add-goal')sheetGoal();
  else if(a==='cycle-hdr-period'){const c=['all','day','week','month'];ui.hdrPeriod=c[(c.indexOf(ui.hdrPeriod||'all')+1)%c.length];render();}
});

document.addEventListener('change',e=>{if(e.target.dataset.a==='set-dim')S.dimUnit=e.target.value;});

initState();render();
</script>
</body>
</html>
