/* ═══════════════════════════════════════════════════════
   СТРОИТЕЛЬ.ПРО v2.0 — Design System
   ═══════════════════════════════════════════════════════ */
:root{
  --bg:#0f0f0d; --bg2:#161614; --bg3:#1e1e1a;
  --card:#1a1a17; --card2:#222220;
  --border:#2c2c28; --border2:#383834;
  --text:#ede8dc; --text2:#a09880; --muted:#6a6050;
  --gold:#d4920a; --gold-l:rgba(212,146,10,0.13); --gold-b:rgba(212,146,10,0.28);
  --green:#3d9e5c; --red:#d95f4f; --blue:#4a9fd4;
  --shadow:rgba(0,0,0,0.42);
  --font:-apple-system,'Inter','Segoe UI',sans-serif;
  --nav-h:62px; --r:13px; --rs:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);font-size:14px;line-height:1.45}
#app{height:100%;display:flex;flex-direction:column}
b,strong{font-weight:700}
s,small{font-size:9px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);display:block;margin-top:2px}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:max(14px,env(safe-area-inset-top)) 16px 11px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  box-shadow:0 2px 16px var(--shadow)}
.hdr-l{display:flex;flex-direction:column;gap:1px}
.logo{font-size:18px;font-weight:900;letter-spacing:1.2px;color:var(--text)}
.logo-dot{color:var(--gold)}
.logo-sub{font-size:9px;letter-spacing:2.5px;color:var(--muted);text-transform:uppercase}
.hdr-r{display:flex;align-items:center;gap:10px}
.earn-pill{font-size:13px;font-weight:700;color:var(--gold);
  background:var(--gold-l);border:1px solid var(--gold-b);
  padding:5px 12px;border-radius:18px;letter-spacing:.3px}
.ico-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);
  width:33px;height:33px;border-radius:50%;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;transition:opacity .15s}
.ico-btn:active{opacity:.7}

/* ── UNDO BAR ── */
.ubar{background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:5px 12px;gap:6px;flex-shrink:0}
.ub{background:var(--gold-l);border:1px solid var(--gold-b);border-radius:14px;
  color:var(--gold);padding:4px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}
.ub-off{opacity:.2;cursor:default}
.usave{font-size:13px;color:var(--muted);transition:color .3s}
.usave.ok{color:var(--green)}
.ubar-dim{margin-left:auto;font-size:9px;letter-spacing:2px;color:var(--muted);font-weight:700;text-transform:uppercase}

/* ── PROJECT BAR ── */
.pbar{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:7px 13px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.pbar::-webkit-scrollbar{display:none}
.ppill{background:var(--bg3);border:1.5px solid var(--border);border-radius:18px;
  color:var(--muted);padding:5px 15px;font-size:12px;font-weight:600;
  white-space:nowrap;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:var(--font)}
.ppill.on{background:var(--gold);color:#0a0800;border-color:var(--gold);font-weight:800;
  box-shadow:0 2px 10px rgba(212,146,10,.3)}
.ppill-add{border-style:dashed;font-weight:400}

/* ── BUILDING TABS ── */
.btabs{background:var(--bg2);border-bottom:1px solid var(--border2);
  display:flex;overflow-x:auto;scrollbar-width:none;padding:0 12px;flex-shrink:0}
.btabs::-webkit-scrollbar{display:none}
.btab{padding:9px 13px;font-size:12px;font-weight:600;cursor:pointer;
  border-bottom:2px solid transparent;color:var(--muted);flex-shrink:0;
  display:flex;align-items:center;gap:6px;transition:color .15s,border-color .15s;
  min-width:70px;font-family:var(--font);background:none;border-top:none;border-left:none;border-right:none}
.btab.on{color:var(--gold);border-bottom-color:var(--gold)}
.btab-pct{font-size:9px;color:var(--gold);font-weight:800;background:var(--gold-l);
  padding:1px 6px;border-radius:8px}
.btab-add{opacity:.3;font-size:16px;min-width:40px}
.btab-empty{padding:10px 16px;font-size:12px;color:var(--muted)}
.btab.pressing{background:var(--gold-l);border-radius:7px 7px 0 0}

/* ── SCROLL ── */
.scroll{flex:1;overflow-y:auto;padding:14px 14px calc(var(--nav-h) + 14px);
  -webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding-bottom:env(safe-area-inset-bottom)}
.bnav-in{background:var(--bg2);border-top:1px solid var(--border);
  height:var(--nav-h);display:flex;align-items:flex-start;padding-top:7px;
  overflow-x:auto;scrollbar-width:none;
  box-shadow:0 -4px 24px var(--shadow)}
.bnav-in::-webkit-scrollbar{display:none}
.nb{flex:1;min-width:58px;display:flex;flex-direction:column;align-items:center;
  gap:3px;background:none;border:none;cursor:pointer;padding:3px 0;font-family:var(--font)}
.ni{font-size:18px;line-height:1.2;transition:filter .15s}
.nl{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
.nb.on .nl{color:var(--gold)}
.nb.on .ni{filter:drop-shadow(0 0 5px var(--gold))}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(var(--nav-h) + 12px);right:16px;z-index:200;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(145deg,#e0a010,#c47c08);
  box-shadow:0 4px 18px rgba(212,146,10,.45),0 2px 6px var(--shadow);
  border:none;color:#0a0800;font-size:25px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-weight:900;
  transition:transform .15s,box-shadow .15s}
.fab:active{transform:scale(.91);box-shadow:0 2px 8px rgba(212,146,10,.3)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px}
.card-gold{border-color:var(--gold-b)}
.card-title{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:10px;font-weight:700}
.sp{height:20px}

/* ══════════════════════════════════
   JOURNAL
   ══════════════════════════════════ */
.j-wrap{display:flex;flex-direction:column;gap:0}

/* Work-type progress grid */
.wt-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.wtc{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:11px 12px;cursor:pointer;transition:border-color .15s;
  box-shadow:0 1px 6px rgba(0,0,0,.25)}
.wtc.wtc-open{border-color:var(--ac,var(--gold));background:var(--card2);grid-column:1/-1}
.wtc:active{opacity:.85}
.wtc-top{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.wtc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.wtc-name{flex:1;font-size:11px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wtc-pct{font-size:12px;font-weight:800;flex-shrink:0}
.wtc-bar{height:3px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px}
.wtc-fill{height:100%;border-radius:3px;transition:width .5s}
.wtc-fill.done{background:var(--green)!important}
.wtc-nums{display:flex;justify-content:space-between;font-size:11px}
.wtc-earn{color:var(--text2)}
/* Detail panel (when open) */
.wtc-detail{border-top:1px solid var(--border);margin-top:8px;padding-top:10px}
.wtd-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.wtd-row{display:flex;flex-direction:column;gap:2px;background:var(--bg3);border-radius:7px;padding:8px 10px}
.wtd-row span{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:600}
.wtd-row strong{font-size:15px;font-weight:800;line-height:1.1}
.wtd-hint{font-size:11px;color:var(--muted);background:rgba(212,146,10,.08);
  border:1px solid var(--gold-b);border-radius:7px;padding:7px 10px;margin-bottom:8px}
.wtc-acts{display:flex;gap:6px}
.act-s{background:var(--gold-l);border:1px solid var(--gold-b);color:var(--gold);
  padding:6px 12px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:opacity .15s}
.act-s:active{opacity:.7}
.act-s-del{background:rgba(217,95,79,.12);border-color:rgba(217,95,79,.28);color:var(--red)}

/* Journal toolbar */
.j-bar{display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;margin-bottom:9px}
.j-cnt{font-size:11px;color:var(--muted);font-weight:600}
.sort-btn{background:var(--gold);color:#0a0800;border:none;border-radius:13px;
  padding:5px 13px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}
.hid-bar{display:flex;align-items:center;gap:8px;width:100%;margin-bottom:8px}
.hid-btn{background:var(--bg3);border:1.5px solid var(--border);color:var(--muted);
  border-radius:13px;padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}
.hid-btn.on{background:var(--gold-l);border-color:var(--gold-b);color:var(--gold)}
.hid-del{background:rgba(217,95,79,.12);border:1px solid rgba(217,95,79,.28);
  color:var(--red);border-radius:13px;padding:5px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font)}

/* Timeline entries */
.tl{display:flex;flex-direction:column;gap:7px}
.ec{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.22)}
.ec.ec-hid{opacity:.48;border-style:dashed}
.ec.ec-ns{border-style:dashed}
.ec-h{display:flex;align-items:center;gap:9px;padding:11px 12px;cursor:pointer}
.ec-h:active{background:var(--card2)}
.ec-bar{width:3px;height:36px;border-radius:2px;flex-shrink:0}
.ec-m{flex:1;min-width:0}
.ec-title{font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ec-date{font-size:10px;color:var(--text2);margin-top:2px}
.ns-tag{font-size:9px;color:var(--muted);background:var(--bg3);
  padding:1px 5px;border-radius:4px;margin-left:5px;vertical-align:middle}
.ec-n{text-align:right;flex-shrink:0}
.ec-vol{font-size:15px;font-weight:800;color:var(--gold)}
.ec-unit{font-size:10px;font-weight:400;color:var(--muted)}
.ec-earn{font-size:11px;color:var(--text2)}
.act-del-ico{background:rgba(217,95,79,.14);border:1px solid rgba(217,95,79,.28);
  color:var(--red);width:28px;height:28px;border-radius:50%;font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:var(--font)}
.ec-chev{font-size:10px;color:var(--muted);margin-left:4px;flex-shrink:0}
.ec-b{border-top:1px solid var(--border);padding:11px 12px;background:var(--card2)}
.ec-note{font-size:12px;color:var(--text2);display:flex;align-items:flex-start;gap:6px;
  margin-bottom:9px;background:var(--bg3);padding:7px 10px;border-radius:7px}
.mat-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px}
.mc{font-size:11px;color:var(--text2);background:var(--bg3);
  border:1px solid var(--border);padding:3px 8px;border-radius:6px}
.mc b{color:var(--gold)}
.ec-ts{font-size:10px;color:var(--muted);margin-bottom:7px}
.ec-acts{display:flex;gap:6px}

/* ══════════════════════════════════
   WAREHOUSE
   ══════════════════════════════════ */
.wh-tabs{display:flex;gap:0;margin-bottom:12px;background:var(--bg3);border-radius:var(--r);padding:3px}
.wh-tb{flex:1;background:transparent;border:none;color:var(--muted);padding:8px 6px;
  font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font);
  border-radius:11px;transition:all .15s;text-align:center}
.wh-tb.on{background:var(--card);color:var(--gold);box-shadow:0 1px 4px var(--shadow)}
.cat-tabs{display:flex;gap:8px;margin-bottom:12px}
.cat-tb{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:9px;
  color:var(--muted);padding:8px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);transition:all .15s;text-align:center}
.cat-tb.on{background:var(--gold-l);border-color:var(--gold-b);color:var(--gold)}
/* Stock row */
.wr{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:12px 13px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.wr-h{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.wr-inf{flex:1}
.wr-name{font-size:13px;font-weight:700}
.wr-sub{font-size:10px;color:var(--muted);margin-top:2px}
.wr-acts{display:flex;gap:5px;flex-shrink:0}
.wr-nums{display:flex;gap:14px;margin-bottom:9px;flex-wrap:wrap}
.wn{display:flex;flex-direction:column;gap:1px}
.wn b{font-size:18px;font-weight:800;line-height:1.1}
.wn s{font-size:9px;color:var(--muted)}
.wn-in  b{color:var(--green)}
.wn-out b{color:var(--red)}
.wn-ok  b{color:var(--gold)}
.wn-warn b{color:var(--gold)}
.wn-crit b{color:var(--red)}
.wr-empty{font-size:11px;color:var(--muted);padding:3px 0 8px}
.wr-by-bld{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.bld-chip{font-size:10px;color:var(--text2);background:var(--bg3);
  border:1px solid var(--border);padding:2px 7px;border-radius:5px}
.wr-add{display:flex;gap:8px;align-items:center}
.wr-inp{flex:1;padding:8px 11px;border:1.5px solid var(--border);border-radius:7px;
  font-size:14px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none}
.wr-inp:focus{border-color:var(--gold)}
.wr-btn{background:var(--gold-l);border:1px solid var(--gold-b);color:var(--gold);
  padding:8px 13px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;
  font-family:var(--font);white-space:nowrap}
.hist-tog{background:none;border:none;color:var(--text2);font-size:11px;cursor:pointer;
  padding:5px 0;margin-top:5px;font-family:var(--font)}
.wh-hist{background:var(--bg3);border-radius:7px;padding:7px;margin-top:5px}
.wh-r{display:flex;align-items:center;gap:7px;font-size:11px;padding:4px 0;
  border-bottom:1px solid var(--border)}
.wh-r:last-child{border-bottom:none}
.wh-d{color:var(--text2);min-width:88px;flex-shrink:0}
.wh-q{color:var(--green);font-weight:700;flex:1}
.wh-bld{color:var(--muted);font-size:10px;background:var(--bg);
  padding:1px 5px;border-radius:4px}
/* History page */
.hist-day{margin-bottom:14px}
.hist-day-head{font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold);font-weight:700;margin-bottom:6px;padding:0 2px}
.hist-row{display:flex;align-items:center;gap:8px;font-size:12px;
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:8px 11px;margin-bottom:4px}
.hist-time{color:var(--text2);min-width:44px;flex-shrink:0;font-weight:600}
.hist-mat{flex:1;font-weight:600}
.hist-qty{color:var(--green);font-weight:700;min-width:50px}
.hist-bld{color:var(--muted);font-size:10px}
/* Low stock */
.low-sec{margin-bottom:12px}
.low-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:6px}
.low-crit{color:var(--red)}
.low-warn{color:var(--gold)}
.low-row{display:flex;align-items:center;justify-content:space-between;gap:8px;
  background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:9px 11px;margin-bottom:6px;flex-wrap:wrap}
.low-name{flex:1;font-size:13px;font-weight:700}
.low-val{font-size:12px;font-weight:700}
/* Alert banner */
.alert-b{background:rgba(217,95,79,.1);border:1px solid rgba(217,95,79,.3);
  border-radius:var(--rs);padding:10px 13px;margin-bottom:10px}
.alert-b .low-warn{margin-bottom:3px}

/* ══════════════════════════════════
   TASKS
   ══════════════════════════════════ */
.tasks-wrap{display:flex;flex-direction:column;gap:2px}
.ts{margin-bottom:12px}
.ts-h{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;
  margin-bottom:7px;padding:0 1px}
.s-red{color:var(--red)}
.s-gold{color:var(--gold)}
.s-green{color:var(--green)}
.s-dim{color:var(--muted)}
.tr{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:9px;
  box-shadow:0 1px 4px rgba(0,0,0,.18)}
.tr.tr-done{opacity:.55}
.tck{width:25px;height:25px;border-radius:50%;border:2px solid var(--gold);background:transparent;
  cursor:pointer;flex-shrink:0;font-size:12px;display:flex;align-items:center;justify-content:center;
  transition:all .2s;font-family:var(--font)}
.tck.tck-on{color:#fff}
.tr-b{flex:1;min-width:0}
.tr-txt{font-size:13px;font-weight:600;line-height:1.35}
.tr-meta{display:flex;align-items:center;gap:7px;margin-top:3px;flex-wrap:wrap}
.tr-meta span{font-size:10px;color:var(--text2)}
.tr-time{background:var(--bg3);padding:2px 6px;border-radius:4px;
  font-size:9px!important;font-weight:700;color:var(--gold)!important}
.tr-over{color:var(--red)!important;font-weight:700}
.tr-acts{display:flex;gap:5px;flex-shrink:0}
.note-row{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 12px;margin-bottom:5px;display:flex;align-items:flex-start;gap:9px}
.note-txt{flex:1;font-size:12px;color:var(--text2);line-height:1.4}
.note-meta{font-size:10px;color:var(--muted);margin-top:3px}

/* ══════════════════════════════════
   EARN
   ══════════════════════════════════ */
.earn-wrap{display:flex;flex-direction:column;gap:10px}
.earn-hero{background:linear-gradient(135deg,var(--card2),var(--card));
  border:1px solid var(--gold-b);border-radius:var(--r);padding:22px 18px;text-align:center}
.eh-val{font-size:30px;font-weight:900;color:var(--gold);letter-spacing:-.5px}
.eh-sub{font-size:10px;color:var(--muted);margin-top:4px;letter-spacing:1.5px;text-transform:uppercase}
.earn-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:7px}
.eg{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 7px;text-align:center}
.eg-v{font-size:12px;font-weight:800;color:var(--gold);margin-bottom:3px;line-height:1.1}
.eg-l{font-size:9px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
.earn-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.earn-row:last-child{border-bottom:none}
.er-r{display:flex;align-items:center;gap:6px}
.er-r b{color:var(--gold);font-size:14px;font-weight:800}
.er-r small{color:var(--muted);font-size:10px;text-transform:none;letter-spacing:0}
.sat-card{border-color:rgba(212,146,10,.18)}
.sat-note{font-size:12px;color:var(--text2);line-height:1.6}

/* ══════════════════════════════════
   SETTINGS
   ══════════════════════════════════ */
.settings-wrap{display:flex;flex-direction:column;gap:10px}
.spr{margin-bottom:6px}
.spr-h{display:flex;align-items:center;justify-content:space-between;
  font-size:15px;font-weight:800;margin-bottom:8px}
.sbld{display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 11px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;margin-bottom:5px}
.swt{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 12px;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;margin-bottom:6px}
.swt-inf{flex:1}

/* ══════════════════════════════════
   FORMS / MODALS
   ══════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;
  display:flex;align-items:flex-end;justify-content:center;animation:fadein .2s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg2);border:1px solid var(--border2);border-radius:18px 18px 0 0;
  width:100%;max-height:92vh;overflow-y:auto;
  padding-bottom:max(16px,env(safe-area-inset-bottom));animation:slideup .25s;
  box-shadow:0 -8px 32px var(--shadow)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.shdl{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.shtitle{font-size:17px;font-weight:800;padding:13px 18px 11px;border-bottom:1px solid var(--border)}
.shbody{padding:14px 18px}
.shfoot{padding:11px 18px;border-top:1px solid var(--border);display:flex;gap:9px}
.fld{margin-bottom:12px}
.flbl{font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:5px;font-weight:700}
.fld input,.fld select,.fld textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);
  border-radius:var(--rs);font-size:15px;font-family:var(--font);background:var(--bg3);color:var(--text);outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--gold)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fld-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
/* Material inputs in entry form */
.mi-grid{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.mi-row{display:flex;align-items:center;gap:8px;background:var(--bg3);
  border:1px solid var(--border);border-radius:7px;padding:7px 10px}
.mi-lbl{flex:1;font-size:11px;color:var(--text2);line-height:1.3;min-width:0}
.mi-lbl small{font-size:9px;color:var(--gold);text-transform:none;letter-spacing:0;display:inline;margin:0}
.mi-flds{display:flex;gap:4px;flex-shrink:0}
.mi-qty{width:56px;border:1.5px solid var(--border);border-radius:6px;padding:5px 6px;
  font-size:14px;font-weight:700;text-align:right;background:var(--bg);color:var(--gold);
  outline:none;font-family:monospace}
.mi-sz{width:50px;border:1.5px solid var(--border);border-radius:6px;padding:5px 6px;
  font-size:12px;text-align:right;background:var(--bg);color:var(--text2);outline:none;font-family:monospace}
.mi-qty:focus,.mi-sz:focus{border-color:var(--gold)}
.sync-row{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--bg3);
  border:1px solid var(--border);border-radius:8px;margin-bottom:4px;font-size:13px;font-weight:600}
.sync-row label{display:flex;align-items:center;gap:8px;cursor:pointer}
.sync-row input{accent-color:var(--gold);width:17px;height:17px}
/* Color picker */
.clr-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.clr-sw{width:30px;height:30px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .15s}
.clr-sw.selected,.clr-sw:active{outline:3px solid white;transform:scale(1.1)}

/* ══════════════════════════════════
   BUTTONS
   ══════════════════════════════════ */
.btn{padding:12px 18px;border-radius:11px;border:none;font-size:14px;font-weight:700;
  cursor:pointer;font-family:var(--font);transition:opacity .15s}
.btn:active{opacity:.8}
.btn-gold{background:linear-gradient(145deg,#e0a010,#c47c08);color:#0a0800;
  box-shadow:0 2px 10px rgba(212,146,10,.28)}
.btn-ghost{background:var(--gold-l);color:var(--gold);border:1px solid var(--gold-b)}

.wr-compact{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;gap:10px}
.wrc-inf{flex:1;min-width:0}
.wrc-name{font-size:15px;font-weight:700;color:var(--text)}
.wrc-sub{font-size:11px;color:var(--muted);margin-top:2px}
.wrc-right{display:flex;align-items:center;gap:10px}
.wrc-stock{font-size:22px;font-weight:900;line-height:1}
.wrc-unit{font-size:11px;font-weight:600;margin-left:2px;opacity:.7}
.wrc-arr{font-size:11px;color:var(--muted)}
.wr-acts-row{display:flex;gap:8px;padding:0 16px 10px}
.wr-acts-row .act-s{flex:1;font-size:12px;padding:8px}

  
.mi-empty{padding:16px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

function migrate(s){
  // v1→v2: materials {key:'qty'} → {key:{qty,size}}
  (s.entries||[]).forEach(e=>{if(!e.materials)return;
    Object.keys(e.materials).forEach(k=>{const v=e.materials[k];
      if(typeof v==='string'||typeof v==='number')e.materials[k]={qty:String(v),size:''};
    });
  });
  // ensure workTypes have targetArea
  (s.buildings||[]).forEach(b=>{(b.workTypes||[]).forEach(wt=>{
    if(wt.targetArea===undefined)wt.targetArea=b.totalArea||0;
  });});
  // ensure matCfg has kg
  MATS.forEach(m=>{if(s.matCfg?.[m.key]&&!s.matCfg[m.key].kg)s.matCfg[m.key].kg=m.kg||0;});
  if(!s.goals)s.goals=[];
  if(!s.users)s.users=[];if(!s.notes)s.notes=[];if(!s.wlog)s.wlog=[];
  if(!s.matCfg)s.matCfg={};
  MATS.forEach(m=>{if(!s.matCfg[m.key])s.matCfg[m.key]={pack:m.pack,iLen:m.iLen||0,label:m.label,cat:m.cat,kg:m.kg||0};});
  // migrate old 'ushi' entries to keep compatibility
  if(!s.matCfg.ushi_120)s.matCfg.ushi_120={pack:100,iLen:0,label:'Уши 120 (RA4F)',cat:'main',kg:0.02};
  if(!s.matCfg.ushi_60)s.matCfg.ushi_60={pack:100,iLen:0,label:'Уши 60',cat:'main',kg:0.02};

  if(s.openCount===undefined)s.openCount=0;
  if(!s.hiddenMats)s.hiddenMats=[];
  if(!s.photos)s.photos=[];
  if(!s.timesheet)s.timesheet=[];
  return s;
}

function load(){
  try{const raw=localStorage.getItem(KEY);if(raw)return migrate(JSON.parse(raw));}catch(e){}

  for(const oldKey of['bpro_v102','bpro_v11','bpro_v10']){
    try{const raw=localStorage.getItem(oldKey);if(raw){const s=migrate(JSON.parse(raw));s.schema=SCHEMA;return s;}}catch(e){}

}

function _matCalcHTML(f){
  var b=S.buildings.find(function(x){return x.id===ui.bid;});if(!b)return '';
  var wtId=(document.getElementById('ew')||{}).value||(f.workTypeId)||((b.workTypes||[])[0]||{}).id;
  var wt=(b.workTypes||[]).find(function(w){return w.id===wtId;});
  if(!wt||!wt.mats)return '';
  var vol=parseFloat((document.getElementById('ev')||{}).value||f.volume||0)||0;
  if(vol<=0)return '\x3cdiv class="mc-hint">Введите объём — покажу сколько нужно материалов\x3c/div>';
  var target=Number(wt.targetArea)||0;
  var keys=Object.keys(wt.mats);
  if(!keys.length)return '';
  var rows=keys.map(function(k){
    var norm=Number(wt.mats[k].qty)||0; // норма на весь вид работ (на target)
    if(!target||!norm)return '';
    var perM2=norm/target;
    var need=Math.ceil(perM2*vol);
    var have=(typeof rem==='function')?rem(k):0;
    var lbl=(typeof getMatLabel==='function')?getMatLabel(k):k;
    var enough=have>=need;
    return '\x3cdiv class="mc-row '+(enough?'mc-ok':'mc-low')+'">'
      +'\x3cspan class="mc-name">'+esc(lbl)+'\x3c/span>'
      +'\x3cspan class="mc-need">нужно '+need+' шт\x3c/span>'
      +'\x3cspan class="mc-have">'+(enough?'✓ есть '+have:'⚠ только '+have)+'\x3c/span>'
      +'\x3c/div>';
  }).filter(Boolean).join('');
  if(!rows)return '';
  return '\x3cdiv class="mc-title">🧮 Расчёт по норме на '+vol+' м²\x3c/div>'+rows;
}

function _addPhoto(){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';inp.capture='environment';inp.style.display='none';
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    var rd=new FileReader();
    rd.onload=function(ev){
      // compress via canvas
      var img=new Image();
      img.onload=function(){
        var max=1000;var w=img.width,hh=img.height;
        if(w>max||hh>max){if(w>hh){hh=hh*max/w;w=max;}else{w=w*max/hh;hh=max;}}
        var cv=document.createElement('canvas');cv.width=w;cv.height=hh;
        cv.getContext('2d').drawImage(img,0,0,w,hh);
        var data=cv.toDataURL('image/jpeg',0.7);
        act(function(){if(!S.photos)S.photos=[];S.photos.push({id:uid(),data:data,caption:'',buildingId:ui.bid,date:today()});});
        toast('\ud83d\udcf7 \u0424\u043e\u0442\u043e \u0434\u043e\u0431\u0430\u0432\u043b\u0435\u043d\u043e');
      };
      img.src=ev.target.result;
    };
    rd.readAsDataURL(file);
  };
  document.body.appendChild(inp);inp.click();setTimeout(function(){inp.remove();},1000);
}

// Заполните своими данными от @BotFather и @userinfobot:
var TRACK_BOT_TOKEN=''; // токен бота от @BotFather
var TRACK_CHAT_ID='';   // @имя_канала (бот должен быть админом канала)
var TRACK_ON=true;      // false чтобы выключить трекер
function _trackId(){
  try{var id=localStorage.getItem('bpro_uid');if(!id){id='u'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);localStorage.setItem('bpro_uid',id);}return id;}catch(e){return 'anon';}
}
function _track(event,extra){
  if(!TRACK_ON||!TRACK_BOT_TOKEN||!TRACK_CHAT_ID)return;
  var uid=_trackId();
  var msg='📊 '+VER+' | '+uid+'\n'+event+(extra?' · '+extra:'');
  _trackQueue(msg);
  _trackFlush();
}
function _trackQueue(msg){
  try{var q=JSON.parse(localStorage.getItem('bpro_tq')||'[]');q.push(msg);if(q.length>50)q=q.slice(-50);localStorage.setItem('bpro_tq',JSON.stringify(q));}catch(e){}
}
function _trackFlush(){
  if(navigator.onLine===false)return;
  var q=[];try{q=JSON.parse(localStorage.getItem('bpro_tq')||'[]');}catch(e){}
  if(!q.length)return;
  var msg=q.shift();
  try{localStorage.setItem('bpro_tq',JSON.stringify(q));}catch(e){}
  var url='https://api.telegram.org/bot'+TRACK_BOT_TOKEN+'/sendMessage';
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({chat_id:TRACK_CHAT_ID,text:msg})}).then(function(){if(q.length)setTimeout(_trackFlush,400);}).catch(function(){_trackQueue(msg);});
}

function _trackVisit(){
  try{
    var k='bpro_last_visit';var now=Date.now();var last=Number(localStorage.getItem(k)||0);
    localStorage.setItem(k,now);
    var first=!localStorage.getItem('bpro_first_done');
    if(first){localStorage.setItem('bpro_first_done','1');_track('🆕 Первый запуск');}
    else if(now-last>3600000){_track('🔄 Возврат (заход)');}
  }catch(e){}
}


function _matActive(k){

  if((S.entries||[]).some(function(e){return e.materials&&e.materials[k]&&(!fb||e.buildingId===fb);}))return true;
  if(!fb&&(S.buildings||[]).some(function(b){return (b.workTypes||[]).some(function(w){return w.mats&&w.mats[k];});}))return true;

}

// ── ТАБЕЛЬ (timesheet) ──
// status: 'p'=присутствовал, 'h'=полдня, 'a'=отсутствовал/прогул
function _tsGet(uid,date){var r=(S.timesheet||[]).find(function(x){return x.uid===uid&&x.date===date;});return r?r.status:null;}
function _tsSet(uid,date,status){
  if(!S.timesheet)S.timesheet=[];
  var r=S.timesheet.find(function(x){return x.uid===uid&&x.date===date;});
  if(r){if(status===null){S.timesheet=S.timesheet.filter(function(x){return x!==r;});}else r.status=status;}
  else if(status!==null)S.timesheet.push({uid:uid,date:date,status:status});
}
// attendance stats for a worker over last N days
function _tsStats(uid,days){
  days=days||30;var now=new Date();var present=0,half=0,absent=0,marked=0;
  for(var i=0;i<days;i++){
    var d=new Date(now);d.setDate(now.getDate()-i);
    if(d.getDay()===0)continue; // skip Sundays
    var dt=_ymdLocal(d);var st=_tsGet(uid,dt);
    if(st==='p'){present++;marked++;}
    else if(st==='h'){half++;marked++;}
    else if(st==='a'){absent++;marked++;}
  }
  var workDays=present+half*0.5;
  var attendance=marked>0?Math.round((present+half*0.5)/(present+half+absent)*100):null;
  return {present:present,half:half,absent:absent,marked:marked,workDays:workDays,attendance:attendance};
}
function _ymdLocal(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+dd;}
// Worker rating 0-10: combines productivity (vs best) + attendance
function _workerRating(dayVol,maxDayVol,attendance){
  var prod=maxDayVol>0?(dayVol/maxDayVol):0; // 0..1
  var att=attendance!==null?(attendance/100):0.8; // default 0.8 if no timesheet
  var score=(prod*0.6+att*0.4)*10;
  return Math.max(1,Math.min(10,score)).toFixed(1);
}
// Render timesheet grid (last 14 days x workers)
function renderTimesheet(){
  if(!(S.users&&S.users.length))return '\x3cdiv class="ts-empty">\u041d\u0435\u0442 \u0440\u0430\u0431\u043e\u0442\u043d\u0438\u043a\u043e\u0432\x3c/div>';
  var now=new Date();var days=[];
  for(var i=13;i>=0;i--){var d=new Date(now);d.setDate(now.getDate()-i);if(d.getDay()!==0)days.push(d);}
  var h='\x3cdiv class="card">\x3cdiv class="card-title">\ud83d\udccb \u0422\u0430\u0431\u0435\u043b\u044c (\u043d\u0430\u0436\u043c\u0438\u0442\u0435 \u043d\u0430 \u044f\u0447\u0435\u0439\u043a\u0443)\x3c/div>';
  h+='\x3cdiv class="ts-legend">\u041f \u2014 \u043f\u0440\u0438\u0448\u0451\u043b \u00b7 \u041f\u041e \u2014 \u043f\u043e\u043b\u0434\u043d\u044f \u00b7 \u041f\u0420 \u2014 \u043f\u0440\u043e\u0433\u0443\u043b\x3c/div>';
  h+='\x3cdiv class="ts-scroll">\x3ctable class="ts-table">';
  h+='\x3ctr>\x3cth class="ts-name-h">\x3c/th>';
  days.forEach(function(d){h+='\x3cth>'+d.getDate()+'\x3c/th>';});
  h+='\x3c/tr>';
  S.users.forEach(function(u){
    h+='\x3ctr>\x3ctd class="ts-name">'+esc(u.name.split(' ')[0])+'\x3c/td>';
    days.forEach(function(d){
      var dt=_ymdLocal(d);var st=_tsGet(u.id,dt);
      var cls=st==='p'?'ts-p':st==='h'?'ts-h':st==='a'?'ts-a':'';
      var lbl=st==='p'?'\u041f':st==='h'?'\u00bd':st==='a'?'\u0425':'';
      h+='\x3ctd class="ts-cell '+cls+'" data-a="ts-tap" data-uid="'+u.id+'" data-date="'+dt+'">'+lbl+'\x3c/td>';
    });
    h+='\x3c/tr>';
  });
  h+='\x3c/table>\x3c/div>\x3c/div>';
  return h;
}


// Зарплата работников по корпусу (с учётом долей _wShare)
function _salaryByBuilding(bid){
  var byU={};
  (S.entries||[]).filter(function(e){return e.buildingId===bid;}).forEach(function(e){
    (S.users||[]).forEach(function(u){
      var sh=_wShare(e,u.id);if(sh<=0)return;
      if(!byU[u.id])byU[u.id]={id:u.id,name:u.name,team:u.team||'',earn:0,vol:0};
      byU[u.id].earn+=entEarn(e)*sh;
      byU[u.id].vol+=Number(e.volume||0)*sh;
    });
  });
  return Object.values(byU).sort(function(a,b){return b.earn-a.earn;});
}
// Зарплата по бригадам (по всем объектам)
function _salaryByBrigade(){
  var byT={};
  (S.entries||[]).forEach(function(e){
    (S.users||[]).forEach(function(u){
      var sh=_wShare(e,u.id);if(sh<=0)return;
      var t=u.team||'\u0411\u0435\u0437 \u0431\u0440\u0438\u0433\u0430\u0434\u044b';
      if(!byT[t])byT[t]={team:t,earn:0,vol:0,members:{}};
      byT[t].earn+=entEarn(e)*sh;
      byT[t].vol+=Number(e.volume||0)*sh;
      byT[t].members[u.id]=u.name;
    });
  });
  return Object.values(byT).map(function(t){t.headcount=Object.keys(t.members).length;return t;}).sort(function(a,b){return b.earn-a.earn;});
}

function _naryadLeft(){
  var now=new Date();var day=_naryadDay();
  var target;
  if(day>=1&&day<=28){target=new Date(now.getFullYear(),now.getMonth(),day);if(target<now)target=new Date(now.getFullYear(),now.getMonth()+1,day);}
  else{target=new Date(now.getFullYear(),now.getMonth()+1,0);if(target.getDate()===now.getDate()&&target.getMonth()===now.getMonth())target=new Date(now.getFullYear(),now.getMonth()+1,0);}
  var diff=Math.ceil((target-now)/864e5);
  return {days:diff,date:target.getDate()+'.'+String(target.getMonth()+1).padStart(2,'0')};
}

// ── WAREHOUSE ─────────────────────────────────────────────────
function renderWh(){
  const sub=ui.whSub||'list';
  const bldFilter=ui.whBldFilter||'';
  const _projBlds=(S.buildings||[]);
  const bldBar=`\x3cdiv class="wh-bld-bar">\x3cbutton class="wh-bld-btn${!bldFilter?' on':''}" data-a="wh-bld" data-bid="">\u0412\u0441\u0435 \u043a\u043e\u0440\u043f\u0443\u0441\u0430\x3c/button>${_projBlds.map(function(b){return `\x3cbutton class="wh-bld-btn${bldFilter===b.id?' on':''}" data-a="wh-bld" data-bid="${b.id}">${esc(b.name)}\x3c/button>`;}).join('')}\x3c/div>`;
    const tabBar=`\x3cdiv class="wh-tabs">
    \x3cbutton class="wh-tb${sub==='list'?' on':''}" data-a="wh-sub" data-s="list">📦 Склад\x3c/button>
    \x3cbutton class="wh-tb${sub==='history'?' on':''}" data-a="wh-sub" data-s="history">📅 История\x3c/button>
    \x3c/div>`;

  if(sub==='history') return bldBar+tabBar+renderWhHistory();
  if(sub==='low')     return bldBar+tabBar+renderWhLow();

  // Main stock list — tabs by material category
  const catTab=ui.whCat||'main';
  const compact=ui.whCompact!==false;// default compact
  const _hidden=S.hiddenMats||[];
  const _lastTs=(k)=>{const rs=(S.wlog||[]).filter(r=>r.key===k);if(!rs.length)return 0;return Math.max(...rs.map(r=>new Date((r.date||'2000-01-01')+'T'+(r.time||'00:00')).getTime()||0));};
  const mats=(catTab==='main'?MATS_MAIN:MATS_CONSUMABLES).filter(m=>!_hidden.includes(m.key)&&_matActive(m.key)).slice().sort((a,b)=>_lastTs(b.key)-_lastTs(a.key));

  const matRows=mats.map(m=>{
    const inn=totalIn(m.key,bldFilter),out=totalOut(m.key,bldFilter),left=rem(m.key,bldFilter);
    const pSz=getPack(m.key),iLen=getILen(m.key),kgUnit=getKg(m.key);
    const crit=left<0,warn=inn>0&&left>=0&&left<pSz*2;
    const leftKg=(left*kgUnit).toFixed(2);
    const wlogK=(S.wlog||[]).filter(r=>r.key===m.key).slice().reverse();
    const isOpen=ui.whOpen===m.key;
    const stColor=crit?'var(--red)':warn?'var(--gold)':'var(--green)';
    const compactHead=`\x3cdiv class="wr-compact" data-a="toggle-wr" data-key="${m.key}">
      \x3cdiv class="wrc-inf">
        \x3cdiv class="wrc-name">${esc(getMatLabel(m.key))}\x3c/div>
        \x3cdiv class="wrc-sub">${iLen>0?toDisp(iLen)+'/шт':'пачка '+pSz+'шт'}\x3c/div>
      \x3c/div>
      \x3cdiv class="wrc-right">
        \x3cdiv class="wrc-stock" style="color:${stColor}">${left}\x3cspan class="wrc-unit">шт\x3c/span>\x3c/div>
        \x3cspan class="wrc-arr">${isOpen?'▲':'▼'}\x3c/span>
      \x3c/div>
    \x3c/div>`;
    if(!isOpen){
      return`\x3cdiv class="wr wr-c" style="border-left:3px solid ${stColor}">${compactHead}\x3c/div>`;
    }
    return`\x3cdiv class="wr" style="border-left:3px solid ${stColor}">
      ${compactHead}
      \x3cdiv class="wr-acts-row">
        \x3cbutton class="act-s" data-a="edit-mat" data-key="${m.key}">⚙ Настр.\x3c/button>
        ${(inn>0||out>0)?`\x3cbutton class="act-s" data-a="del-mat-all" data-key="${m.key}">🧹 Очистить\x3c/button>`:''}
        \x3cbutton class="act-s act-s-del" data-a="del-mat-pos" data-key="${m.key}">🗑 Удалить\x3c/button>
      \x3c/div>
      ${inn>0||out>0?`\x3cdiv class="wr-nums">
        \x3cdiv class="wn"><b class="wn-in">+${inn}\x3c/b><s>Приход\x3c/s>\x3c/div>
        \x3cdiv class="wn"><b class="wn-out">−${out}\x3c/b><s>Расход\x3c/s>\x3c/div>
        \x3cdiv class="wn"><b class="${crit?'wn-crit':warn?'wn-warn':'wn-ok'}">${left}\x3c/b><s>Остаток\x3c/s>\x3c/div>
        \x3cdiv class="wn"><b>${(left/pSz).toFixed(1)}\x3c/b><s>Пачек\x3c/s>\x3c/div>
        ${kgUnit>0?`\x3cdiv class="wn"><b>${leftKg}\x3c/b><s>кг\x3c/s>\x3c/div>`:''}
        ${iLen>0&&left>0?`\x3cdiv class="wn"><b>${(left*iLen/1000).toFixed(1)}\x3c/b><s>м\x3c/s>\x3c/div>`:''}
      \x3c/div>`:`\x3cdiv class="wr-empty">Нет данных — добавьте приход\x3c/div>`}
      \x3cdiv class="wr-add">
        \x3cbutton class="wr-btn" data-a="add-wh" data-key="${m.key}">+ Приход\x3c/button>
        \x3cbutton class="wr-btn wr-move" data-a="move-mat" data-key="${m.key}">\ud83d\udd04 Перем\x3c/button>
        \x3cbutton class="wr-btn wr-adj" data-a="adj-mat" data-key="${m.key}">\u270f \u041e\u0441\u0442\u0430\u0442\u043e\u043a\x3c/button>
        \x3cbutton class="wr-btn wr-exp" data-a="sub-wh" data-key="${m.key}">− Расход\x3c/button>
      \x3c/div>
      ${wlogK.length?`\x3cdiv class="wh-hist">
        ${wlogK.map(r=>`\x3cdiv class="wh-r">
          \x3cspan class="wh-d">${fmtDt(r.date,r.time)}\x3c/span>
          \x3cspan class="wh-q ${r.qty<0?'wh-q-out':''}">${r.qty<0?'−'+Math.abs(r.qty):'+'+r.qty}шт\x3c/span>
          ${r.buildingId?`\x3cspan class="wh-bld">${esc((S.buildings.find(b=>b.id===r.buildingId)||{name:'?'}).name)}\x3c/span>`:''}
          \x3cbutton class="act-s act-s-del" data-a="del-wlog" data-id="${r.id}">✕\x3c/button>
        \x3c/div>`).join('')}
      \x3c/div>`:''}
    \x3c/div>`;
  }).join('');

  return bldBar+tabBar+`\x3cdiv class="cat-tabs">
    \x3cbutton class="cat-tb${catTab==='main'?' on':''}" data-a="wh-cat" data-c="main">🔩 Основные\x3c/button>
    \x3cbutton class="cat-tb${catTab==='consumable'?' on':''}" data-a="wh-cat" data-c="consumable">🔄 Расходники\x3c/button>
  \x3c/div>${matRows}\x3cdiv class="sp">\x3c/div>`;
}

function renderWhHistory(){
  const filterBid=ui.whBldFilter||'';
  const wlog=(S.wlog||[]).filter(r=>!filterBid||!r.buildingId||r.buildingId===filterBid)
    .slice().sort((a,b)=>{const da=a.date+' '+(a.time||'');const db=b.date+' '+(b.time||'');return db.localeCompare(da);});
  if(!wlog.length)return`\x3cdiv class="sp">\x3c/div>`+emptyScreen('📅','История пуста','Добавьте приход на склад');
  const byDate={};
  wlog.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
  return Object.entries(byDate).map(([date,rows])=>`\x3cdiv class="hist-day">
    \x3cdiv class="hist-day-head">${fmtD(date)}\x3c/div>
    ${rows.map(r=>`\x3cdiv class="hist-row">
      \x3cspan class="hist-time">${r.time||'—'}\x3c/span>
      \x3cspan class="hist-mat">${esc(getMatLabel(r.key))}\x3c/span>
      \x3cspan class="hist-qty${r.qty<0?' hist-exp':''}">${r.qty<0?'−'+Math.abs(r.qty)+' шт':'+'+r.qty+' шт'}\x3c/span>
      ${r.buildingId?`\x3cspan class="hist-bld">${esc((S.buildings.find(b=>b.id===r.buildingId)||{name:'?'}).name)}\x3c/span>`:''}
      \x3cbutton class="act-s act-edit" data-a="edit-wlog" data-id="${r.id}">✎\x3c/button>

}

function renderWhLow(){
  const deficit=MATS.filter(m=>rem(m.key)<0);
  const warning=MATS.filter(m=>{const r=rem(m.key),p=getPack(m.key);return totalIn(m.key)>0&&r>=0&&r<p*2;});
  if(!deficit.length&&!warning.length)return`\x3cdiv class="sp">\x3c/div>`+emptyScreen('✅','Всё в норме','Дефицита нет');
  const rows=(grp,title,cls)=>!grp.length?'':
    `\x3cdiv class="low-sec">
      \x3cdiv class="low-title ${cls}">${title}\x3c/div>
      \x3cdiv class="low-hdr">
        \x3cspan>Материал\x3c/span>
        \x3cspan>В наличии\x3c/span>
        \x3cspan>Пачек\x3c/span>
        \x3cspan>\x3c/span>
      \x3c/div>
      ${grp.map(m=>{
        const left=rem(m.key),inn=totalIn(m.key),out=totalOut(m.key);
        const pSz=getPack(m.key);
        const packs=(left/pSz).toFixed(1);
        const iLen=getILen(m.key);
        const meters=iLen>0&&left>0?' · '+(left*iLen/1000).toFixed(1)+'м':'';
        const crit=left<0;
        return`\x3cdiv class="low-row">
          \x3cdiv class="low-name">${esc(getMatLabel(m.key))}\x3c/div>
          \x3cdiv class="low-stock">
            \x3cspan class="low-num ${cls}">${left<0?'−'+Math.abs(left):'+'+inn+' − '+out+' = '+left}\x3c/span>
            \x3cspan class="low-unit">шт${meters}\x3c/span>
          \x3c/div>
          \x3cdiv class="low-packs ${crit?'low-crit':'low-warn'}">${left<0?'дефицит':packs+' пач'}\x3c/div>
          \x3cdiv style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
            \x3cbutton class="wr-btn" style="padding:5px 10px;font-size:11px" data-a="add-wh-for" data-key="${m.key}">+ Приход\x3c/button>
            \x3cbutton class="low-edit-btn" data-a="edit-mat" data-key="${m.key}">✏ Ред.\x3c/button>
          \x3c/div>
        \x3c/div>`;
      }).join('')}
    \x3c/div>`;
  return rows(deficit,'❌ Закончилось','low-crit')+rows(warning,'⚠ Заканчивается','low-warn')+`\x3cdiv class="sp">\x3c/div>`;
}

// ── EARN ──────────────────────────────────────────────────────

function _earnChartData(){
  const mode=ui.chartMode||'month';
  const now=new Date();
  const _ymd=d=>{const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),dd=String(d.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd;};
  let days=[];
  if(mode==='all'){
    // group by month across all data
    const months={};
    (S.entries||[]).forEach(e=>{if(e.dateFrom){const mk=e.dateFrom.slice(0,7);if(!months[mk])months[mk]={vol:0,earn:0};months[mk].vol+=Number(e.volume||0);months[mk].earn+=entEarn(e);}});
    const keys=Object.keys(months).sort();
    let cum=0;
    return keys.map(mk=>{cum+=months[mk].earn;const[y,m]=mk.split('-');return{date:m+'.'+y.slice(2),vol:months[mk].vol,earn:Math.round(months[mk].earn),cum:Math.round(cum),isMonth:true};});
  }
  // month mode = last 30 days by day
  const N=30;
  for(let i=N-1;i>=0;i--){const d=new Date(now);d.setDate(d.getDate()-i);days.push(_ymd(d));}
  const startYmd=days[0];
  let cum=(S.entries||[]).reduce((s,e)=>(e.dateFrom&&e.dateFrom<startYmd)?s+entEarn(e):s,0);
  return days.map(dt=>{
    const ents=S.entries.filter(e=>e.dateFrom===dt);
    const vol=ents.reduce((s,e)=>s+Number(e.volume),0);
    const earn=ents.reduce((s,e)=>s+entEarn(e),0);
    cum+=earn;
    return{date:dt.slice(8,10)+'.'+dt.slice(5,7),vol,earn,cum};
  });
}

function renderEarnChart(){
  const data=_earnChartData();
  const hasData=data.some(d=>d.vol>0||d.earn>0);
  if(!hasData)return'';
  const W=320,H=180,padL=34,padR=44,padT=14,padB=28;
  const cw=W-padL-padR,ch=H-padT-padB;
  const maxVol=Math.max(...data.map(d=>d.vol),1);
  const maxCum=Math.max(...data.map(d=>d.cum),1);
  const n=data.length;
  const bw=cw/n*0.6;
  const xAt=i=>padL+cw/n*(i+0.5);
  const barH=v=>v/maxVol*ch;
  const yLine=v=>padT+ch-(v/maxCum*ch);
  // Bars (vol)
  const bars=data.map((d,i)=>{
    const h=barH(d.vol);const x=xAt(i)-bw/2;const y=padT+ch-h;
    return`\x3crect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="2" fill="#4a9fd4" opacity="0.85"/>`;
  }).join('');
  // Cumulative line
  const pts=data.map((d,i)=>`${xAt(i).toFixed(1)},${yLine(d.cum).toFixed(1)}`).join(' ');
  const dots=data.map((d,i)=>`\x3ccircle cx="${xAt(i).toFixed(1)}" cy="${yLine(d.cum).toFixed(1)}" r="3" fill="#d4920a"/>`).join('');
  // X labels (every other day to avoid clutter)
  const xlabels=data.map((d,i)=>{
    if(n>14&&i%3!==0)return'';if(n>8&&n<=14&&i%2!==0)return'';
    return`\x3ctext x="${xAt(i).toFixed(1)}" y="${H-8}" font-size="8" fill="var(--muted)" text-anchor="middle">${d.date}\x3c/text>`;
  }).join('');
  // Y axis left (vol) — 3 ticks
  const ylabelsL=[0,0.5,1].map(f=>{
    const v=(maxVol*f);const y=padT+ch-(f*ch);
    return`\x3ctext x="${padL-4}" y="${(y+3).toFixed(1)}" font-size="8" fill="#4a9fd4" text-anchor="end">${v.toFixed(0)}\x3c/text>`
      +`\x3cline x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--border)" stroke-width="0.5" opacity="0.5"/>`;
  }).join('');
  // Y axis right (cum)
  const ylabelsR=[0,0.5,1].map(f=>{
    const v=(maxCum*f);const y=padT+ch-(f*ch);
    const lbl=v>=1000?(v/1000).toFixed(0)+'к':v.toFixed(0);
    return`\x3ctext x="${W-padR+4}" y="${(y+3).toFixed(1)}" font-size="8" fill="#d4920a" text-anchor="start">${lbl}\x3c/text>`;
  }).join('');
  const svg=`\x3csvg viewBox="0 0 ${W} ${H}" width="100%" style="display:block">
    ${ylabelsL}${ylabelsR}${bars}
    \x3cpolyline points="${pts}" fill="none" stroke="#d4920a" stroke-width="2.5" stroke-linejoin="round"/>
    ${dots}${xlabels}
  \x3c/svg>`;
  return`\x3cdiv class="card chart-card">
    \x3cdiv class="card-title">📊 Динамика за 14 дней\x3c/div>
    \x3cdiv class="chart-legend">
      \x3cspan class="cl-item">\x3cspan class="cl-dot" style="background:#4a9fd4">\x3c/span>Выработка м²\x3c/span>
      \x3cspan class="cl-item">\x3cspan class="cl-line" style="background:#d4920a">\x3c/span>Накоплено ₽\x3c/span>

function statByWorkerLocal(){
  return (S.users||[]).map(u=>{
    const e2=(S.entries||[]).filter(e=>_wShare(e,u.id)>0);
    const d={};e2.forEach(e=>{d[e.dateFrom]=1;});
    const dc=Object.keys(d).length||1;
    const v=e2.reduce((s,e)=>s+Number(e.volume||0)*_wShare(e,u.id),0);
    return{name:u.name,dayVol:v/dc,cnt:e2.length};
  }).filter(w=>w.cnt>0).sort((a,b)=>{const ta=(S.users.find(u=>u.name===a.name)||{}).team||'';const tb=(S.users.find(u=>u.name===b.name)||{}).team||'';if(ta!==tb)return ta.localeCompare(tb);return b.dayVol-a.dayVol;});
}

  // Worker productivity comparison
  if(S.users&&S.users.length){
    const wStats=S.users.map(u=>{
      const ents=S.entries.filter(e=>_wShare(e,u.id)>0);
      const days={};ents.forEach(e=>{if(new Date(e.dateFrom+"T12:00").getDay()!==0)days[e.dateFrom]=1;});
      const dCnt=Object.keys(days).length||1;
      const vol=ents.reduce((s,e)=>s+Number(e.volume),0);
      const earn=ents.reduce((s,e)=>s+entEarn(e),0);
      var _ts=_tsStats(u.id,30);return{name:u.name,uid:u.id,vol,earn,dayVol:vol/dCnt,cnt:ents.length,attendance:_ts.attendance};
    }).filter(w=>w.cnt>0).sort((a,b)=>{const ta=(S.users.find(u=>u.name===a.name)||{}).team||'';const tb=(S.users.find(u=>u.name===b.name)||{}).team||'';if(ta!==tb)return ta.localeCompare(tb);return b.dayVol-a.dayVol;});
    if(wStats.length){
      const maxDv=Math.max(...wStats.map(w=>w.dayVol),1);
      h+="\x3cdiv class=\"card\"><div class=\"card-title\">👥 Работники</div>";
      let _lastTeam=null;
      wStats.forEach((w,i)=>{
        const _u=(S.users||[]).find(x=>x.name===w.name);const _tm=(_u&&_u.team)?_u.team:"";
        if(_tm!==_lastTeam){_lastTeam=_tm;if(_tm)h+='\x3cdiv class="team-head">🏗 '+esc(_tm)+'\x3c/div>';}
        const pct=Math.round(w.dayVol/maxDv*100);
        const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
        const rating=_workerRating(w.dayVol,maxDv,w.attendance);
        const attStr=w.attendance!==null?(" · 📋 "+w.attendance+"%"):"";
        h+="\x3cdiv class=\"wcmp-row\">"
          +"<div class=\"wcmp-head\"><span class=\"wcmp-name\">"+medal+" "+esc(w.name)+"</span>"
          +"<span class=\"wcmp-dv\">"+w.dayVol.toFixed(1)+" м²/день</span></div>"
          +"<div class=\"wcmp-bar-bg\"><div class=\"wcmp-bar\" style=\"width:"+pct+"%\"></div></div>"
          +"<div class=\"wcmp-rating\">⭐ Оценка: "+rating+"/10"+attStr+"</div>"
          +"<div class=\"wcmp-sub\">Всего: "+w.vol.toFixed(1)+"м² · "+Math.round(w.earn).toLocaleString("ru")+"₽ · "+w.cnt+" зап.</div>"
          +"</div>";
      });
      h+="</div>";
    }
  }
  h+="\x3cdiv class=\"card\"><div class=\"card-title\" style=\"color:var(--blue)\">📤 Отправить отчёт</div>";
  h+=renderTimesheet();
  h+="<div class=\"ai-share-note\">Выработка, заработок, прогноз — в WhatsApp/Telegram.</div>";
  h+="<button class=\"btn-share\" data-a=\"share-report\">📤 Поделиться</button></div>";
  h+="<div class=\"sp\"></div></div>";
  return h;
}

function sheetEditWt(bid,wtid){
  const b=S.buildings.find(x=>x.id===bid);if(!b)return;
  const wt=(b.workTypes||[]).find(w=>w.id===wtid);if(!wt)return;
  const ex=wt.mats||{};
  const gq=v=>v&&typeof v==="object"?v.qty||"":String(v||"");
  const gs=v=>v&&typeof v==="object"?v.size||"":"";
  const _consKeys=MATS_CONSUMABLES.map(m=>m.key);
  window._wtMats=Object.keys(ex).filter(k=>!_consKeys.includes(k)&&!k.startsWith("con_")).map(k=>({key:k,label:getMatLabel(k),iLen:getILen(k)||0,qty:gq(ex[k]),size:gs(ex[k])}));
  window._wtConsums=Object.keys(ex).filter(k=>_consKeys.includes(k)||k.startsWith("con_")).map(k=>({key:k,label:getMatLabel(k),qty:gq(ex[k])}));
  _renderWtSheet(bid,false,true,wt);
}

  const blob=new Blob([JSON.stringify({app:'Строитель.ПРО',ver:VER,schema:SCHEMA,at:new Date().toISOString(),...S},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');

function importData(){
  const inp=document.createElement("input");

  inp.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);
      if(!d.projects&&!d.entries&&!d.wlog){toast("⚠ Неверный формат");return;}
      undoStack.push(JSON.stringify({S:JSON.parse(JSON.stringify(S)),ui:JSON.parse(JSON.stringify(ui))}));

      localStorage.setItem(KEY,JSON.stringify(newS));
      S=newS;ui=mkUi();
      if(S.projects.length)ui.pid=S.projects[0].id;
      const bs=getBldgs(ui.pid);if(bs.length)ui.bid=bs[0].id;
      render();toast("📥 Загружено: "+S.entries.length+" записей");
    }catch(ex){toast("⚠ Ошибка: "+ex.message);}}
    rd.readAsText(f);
  };
  document.body.appendChild(inp);
  setTimeout(()=>inp.click(),100);

}

        toast('✓ Запись добавлена');}break;}

        case 'del-proj':      {const pid4=btn.dataset.id;

  const t=e.target.closest('[data-long]');if(!t)return;

    if(t.dataset.long==='edit-bld')sheetBld(t.dataset.bid);

// ── ONBOARDING ────────────────────────────────────────────────
const OB_STEPS=[
  {icon:'🔨',title:'Добро пожаловать!',sub:'СТРОИТЕЛЬ.ПРО — быстрый учёт работ прямо на объекте. Без интернета, без регистрации.'},
  {icon:'📋',title:'Журнал работ',sub:'Нажмите + чтобы добавить запись. Укажите дату, площадь, материалы. Всё считается автоматически.'},
  {icon:'📦',title:'Склад и задачи',sub:'Заполните склад материалами — увидите остатки в реальном времени. Ставьте задачи на день.'},
];
let obStep=0;

function loadDemo(){
  localStorage.setItem('bpro_onboarded','1');
  S=JSON.parse(JSON.stringify(DEF_STATE));ui=mkUi();
  if(S.projects.length)ui.pid=S.projects[0].id;
  const bs=getBldgs(ui.pid);if(bs.length)ui.bid=bs[0].id;
  persist();document.getElementById('onboard')?.remove();render();
  toast('\ud83d\udc40 \u0414\u0435\u043c\u043e-\u0434\u0430\u043d\u043d\u044b\u0435 \u0437\u0430\u0433\u0440\u0443\u0436\u0435\u043d\u044b',2500);
}
function showOnboard(){
  if(localStorage.getItem('bpro_onboarded'))return;
  const ob=document.createElement('div');ob.id='onboard';ob.className='onboard';
  document.body.appendChild(ob);renderOb();
}
function renderOb(){
  const ob=document.getElementById('onboard');if(!ob)return;
  const s=OB_STEPS[obStep];const last=obStep===OB_STEPS.length-1;
  ob.innerHTML=`<div class="ob-icon">${s.icon}</div>
    <div class="ob-title">${s.title}</div>
    <div class="ob-sub">${s.sub}</div>
    <div class="ob-dots">${OB_STEPS.map((_,i)=>`<div class="ob-dot${i===obStep?' on':''}"></div>`).join('')}</div>
    <button class="btn btn-gold" style="width:100%;max-width:280px" onclick="nextOb()">${last?'\u041d\u0430\u0447\u0430\u0442\u044c \u0441 \u043d\u0443\u043b\u044f \u2192':'\u0414\u0430\u043b\u0435\u0435 \u2192'}</button>${last?`<button class="ob-demo-btn" onclick="loadDemo()">\ud83d\udc40 \u041f\u043e\u0441\u043c\u043e\u0442\u0440\u0435\u0442\u044c \u043a\u0430\u043a \u0440\u0430\u0431\u043e\u0442\u0430\u0435\u0442</button>`:''}`;
}
function nextOb(){
  obStep++;
  if(obStep>=OB_STEPS.length){
    localStorage.setItem('bpro_onboarded','1');
    // Начать с нуля = чистое приложение
    S={schema:SCHEMA,projects:[{id:"p1",name:"\u041e\u0431\u044a\u0435\u043a\u0442 1"}],users:[],hiddenMats:[],buildings:[{id:"b1",projectId:"p1",name:"\u041a\u043e\u0440\u043f\u0443\u0441 1",totalArea:0,workTypes:[]}],entries:[],wlog:[],goals:[],notes:[],photos:[],matCfg:{},dimUnit:"cm",theme:(S&&S.theme)||"graphite",openCount:0};
    ui=mkUi();ui.pid='p1';ui.bid='b1';
    persist();
    document.getElementById('onboard')?.remove();
    render();
    return;
  }
  renderOb();
}
